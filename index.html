      // Seed: parse Excel (per-periodo) e popola Supabase. Svuota prima per evitare duplicati.
      const seedFoglio = async(file)=>{
        if(!sbReady()){ setFoglioMsg("Configura Supabase prima del seed."); return; }
        if(!window.XLSX){ setFoglioMsg("Libreria Excel non caricata."); return; }
        if(!confirm("Importare l'Excel nel database? Verranno SOSTITUITI i dati attuali del foglio (clienti+proforme).")) return;
        setFoglioSeed("running"); setFoglioMsg("");
        try{
          const buf=await file.arrayBuffer(); const wb=XLSX.read(buf,{type:"array"});
          const grid=n=>{ const ws=wb.Sheets[n]; return ws?XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""}):[]; };
          // svuota
          await sbDelete("proforme","id=not.is.null");
          await sbDelete("clienti","id=not.is.null");
          // bilancio non pagati -> 600
          const bilset=new Set();
          (grid("BILANCIO")||[]).slice(1).forEach(r=>{ const nm=String(r[0]||"").trim(); if(nm.length<2) return; const flags=r.slice(1).join(" ").toUpperCase(); if(!flags.includes("PAGAT")) bilset.add(normName(nm)); });
          const hasBil=nm=>{ const n=normName(nm); return [...bilset].some(b=>b===n||b.startsWith(n.slice(0,6))||n.startsWith(b.slice(0,6))); };
          let nC=0,nP=0;
          const pushClient = async(nome,categoria,arretrati,tariffa,inact,periods)=>{
            const ins=await sbInsert("clienti",[{nome,categoria,arretrati:arretrati||0,tariffa:tariffa||"",stato:inact?"uscito":"attivo"}]);
            const cid=ins[0].id; nC++;
            const rows=[];
            for(const [periodo,importo,pagato] of periods){ if(importo>0||pagato) rows.push({cliente_id:cid,anno:2026,periodo,importo:importo||0,pagato:!!pagato}); }
            if(rows.length){ await sbInsert("proforme",rows); nP+=rows.length; }
          };
          // FOCUS
          for(const r of (grid("FOCUS")||[]).slice(1)){
            const nm=String(r[1]||"").trim(); if(nm.length<3) continue;
            const note=String(r[7]||"").trim();
            const cells=[r[2],r[3],r[4],r[5],r[6]];
            const inact=isInact(note)||cells.some(isInact);
            const arr=xlsNum(r[2]);
            const periods=[["I",isPag(r[3])?0:xlsNum(r[3]),isPag(r[3])],["II",isPag(r[4])?0:xlsNum(r[4]),isPag(r[4])],["III",isPag(r[5])?0:xlsNum(r[5]),isPag(r[5])],["IV",isPag(r[6])?0:xlsNum(r[6]),isPag(r[6])]];
            await pushClient(nm,"focus",arr,note,inact,periods);
          }
          // ALTRI (mesi GEN.. da col4)
          const mcodes=PERIODI.altri;
          for(const r of (grid("ALTRI")||[]).slice(1)){
            const nm=String(r[1]||"").trim(); if(nm.length<3||["MENSILI","BIMESTRALE"].includes(nm.toUpperCase())) continue;
            const note=String(r[2]||"").trim(); const arr=xlsNum(r[3]);
            const inact=isInact(note);
            const periods=[]; for(let i=0;i<mcodes.length;i++){ const v=r[4+i]; if(v===undefined) break; periods.push([mcodes[i], isPag(v)?0:xlsNum(v), isPag(v)]); }
            await pushClient(nm,"altri",arr,note,inact,periods);
          }
          // RAGAZZI (lista semestre col1 + lista annuale: nome col5, importo col4)
          for(const r of (grid("RAGAZZI")||[]).slice(1)){
            const a=String(r[1]||"").trim();
            if(a.length>2) await pushClient(a,"ragazzi",0,"semestre",false,[["I_SEM",isPag(r[2])?0:xlsNum(r[2]),isPag(r[2])],["II_SEM",isPag(r[3])?0:xlsNum(r[3]),isPag(r[3])]]);
            const b=String(r[5]||"").trim();
            if(b.length>2) await pushClient(b,"ragazzi",0,"annuale",false,[["ANNO",xlsNum(r[4]),false]]);
          }
          // BILANCIO (foglio dedicato: 600 per azienda, pagato se flag PAGATO/DEPOSITATO)
          for(const r of (grid("BILANCIO")||[]).slice(1)){
            const nm=String(r[0]||"").trim(); if(nm.length<2) continue;
            const flags=r.slice(1).join(" ").toUpperCase(); const paid=flags.includes("PAGAT")||flags.includes("DEPOSIT");
            await pushClient(nm,"bilancio",0,"",false,[["BILANCIO",600,paid]]);
          }
          // NUOVI (foglio dedicato: solo nomi)
          for(const r of (grid("nuovi")||[]).slice(1)){
            const nm=String(r[0]||"").trim(); if(nm.length<3||nm.toUpperCase().includes("NUOVI")) continue;
            await pushClient(nm,"nuovi",0,"",false,[]);
          }
          setFoglioSeed("done"); setFoglioMsg(`Importati ${nC} clienti e ${nP} proforma nel database.`);
          await loadFoglio();
        }catch(e){ setFoglioSeed("error"); setFoglioMsg("Errore seed: "+e.message); }
      };

      // ── ALLINEA NUOVI: aggiunge SOLO i clienti dell'Excel non ancora nel Foglio ──
      // Non tocca clienti/proforme/pagamenti esistenti (sicuro da usare in qualsiasi momento).
      const allineaNuovi = async(file)=>{
        if(!sbReady()){ setFoglioMsg("Configura prima Supabase."); return; }
        if(!window.XLSX){ setFoglioMsg("Libreria Excel non caricata, riprova."); return; }
        setFoglioAlign("running"); setFoglioMsg("Confronto Excel ↔ Foglio in corso...");
        try{
          const buf=await file.arrayBuffer(); const wb=XLSX.read(buf,{type:"array"});
          const grid=n=>{ const ws=wb.Sheets[n]; return ws?XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""}):[]; };
          const dbNorm = foglio.clienti.map(c=>normName(c.nome)).filter(Boolean);
          const esiste = nm => { const n=normName(nm); if(!n) return true;
            return dbNorm.some(k=> k===n || k.startsWith(n.slice(0,8)) || n.startsWith(k.slice(0,8)) || (n.length>6&&k.includes(n)) || (k.length>6&&n.includes(k))); };
          const bilset=new Set();
          (grid("BILANCIO")||[]).slice(1).forEach(r=>{ const nm=String(r[0]||"").trim(); if(nm.length<2) return; const fl=r.slice(1).join(" ").toUpperCase(); if(!fl.includes("PAGAT")&&!fl.includes("DEPOSIT")) bilset.add(normName(nm)); });
          const hasBil=nm=>{ const n=normName(nm); return [...bilset].some(b=>b===n||b.startsWith(n.slice(0,6))||n.startsWith(b.slice(0,6))); };
          const aggiunti=[];

            const cid=ins[0].id; const rows=[];

            if(cat==="focus"&&hasBil(nome)) rows.push({cliente_id:cid,anno:2026,periodo:"BILANCIO",importo:600,pagato:false});

          };
          for(const r of (grid("FOCUS")||[]).slice(1)){ const nm=String(r[1]||"").trim(); if(nm.length<3)continue; const note=String(r[7]||"").trim(); const cells=[r[2],r[3],r[4],r[5],r[6]]; const inact=isInact(note)||cells.some(isInact);
            await pushNew(nm,"focus",xlsNum(r[2]),note,inact,[["I",isPag(r[3])?0:xlsNum(r[3]),isPag(r[3])],["II",isPag(r[4])?0:xlsNum(r[4]),isPag(r[4])],["III",isPag(r[5])?0:xlsNum(r[5]),isPag(r[5])],["IV",isPag(r[6])?0:xlsNum(r[6]),isPag(r[6])]]); }
          const MCal=PERIODI.altri;
          for(const r of (grid("ALTRI")||[]).slice(1)){ const nm=String(r[1]||"").trim(); if(nm.length<3||["MENSILI","BIMESTRALE"].includes(nm.toUpperCase()))continue; const pr=[]; for(let i=0;i<MCal.length;i++){const v=r[4+i];if(v===undefined)break;pr.push([MCal[i],isPag(v)?0:xlsNum(v),isPag(v)]);} await pushNew(nm,"altri",xlsNum(r[3]),String(r[2]||"").trim(),isInact(String(r[2]||"")),pr); }
          for(const r of (grid("RAGAZZI")||[]).slice(1)){ const a=String(r[1]||"").trim(); if(a.length>2) await pushNew(a,"ragazzi",0,"semestre",false,[["I_SEM",isPag(r[2])?0:xlsNum(r[2]),isPag(r[2])],["II_SEM",isPag(r[3])?0:xlsNum(r[3]),isPag(r[3])]]); const b=String(r[5]||"").trim(); if(b.length>2) await pushNew(b,"ragazzi",0,"annuale",false,[["ANNO",xlsNum(r[4]),false]]); }
          for(const r of (grid("BILANCIO")||[]).slice(1)){ const nm=String(r[0]||"").trim(); if(nm.length<2)continue; const fl=r.slice(1).join(" ").toUpperCase(); await pushNew(nm,"bilancio",0,"",false,[["BILANCIO",600,fl.includes("PAGAT")||fl.includes("DEPOSIT")]]); }
          for(const r of (grid("nuovi")||[]).slice(1)){ const nm=String(r[0]||"").trim(); if(nm.length<3||nm.toUpperCase().includes("NUOVI"))continue; await pushNew(nm,"nuovi",0,"",false,[]); }

      // ── Modifica / eliminazione pagamenti registrati ──
      const salvaEditPag = async()=>{
        if(!editPag) return;

          const patch={data:editPag.data||null,importo:parseFloat(editPag.importo)||0,fonte:editPag.fonte,descrizione:editPag.descrizione||""};
          await sbUpdate("pagamenti",`id=eq.${editPag.id}`,patch);
          setFoglio(f=>({...f,pagamenti:f.pagamenti.map(p=>p.id===editPag.id?{...p,...patch}:p)}));
          setIncMsg("✓ Pagamento aggiornato. Nota: la modifica NON ricalcola le proforme già segnate (sistemale dal Foglio se serve).");
          setEditPag(null);
        }catch(e){ setIncMsg("Errore modifica: "+e.message); }
      };
      const eliminaPag = async(p)=>{
        const c=foglio.clienti.find(x=>x.id===p.cliente_id);
        if(!confirm(`Eliminare il pagamento di ${fmt(p.importo)} (${p.fonte}) di ${c?.nome||"?"} del ${p.data?fmtD(p.data):"—"}?`)) return;
        try{
          let riaperta="";
          const prof=p.proforma_id ? foglio.proforme.find(x=>x.id===p.proforma_id) : null;
          if(prof && prof.pagato && confirm(`Riaprire anche la proforma collegata (${PLABEL[prof.periodo]||prof.periodo} · ${fmt(prof.importo)})?\nOK = torna DA PAGARE · Annulla = resta pagata`)){
            await sbUpdate("proforme",`id=eq.${prof.id}`,{pagato:false,data_pagamento:null});
            setFoglio(f=>({...f,proforme:f.proforme.map(x=>x.id===prof.id?{...x,pagato:false,data_pagamento:null}:x)}));
            riaperta=` · proforma ${PLABEL[prof.periodo]||prof.periodo} riaperta`;
          }
          await sbDelete("pagamenti",`id=eq.${p.id}`);
          setFoglio(f=>({...f,pagamenti:f.pagamenti.filter(x=>x.id!==p.id)}));
          setIncMsg(`✓ Pagamento eliminato${riaperta}.`);
        }catch(e){ setIncMsg("Errore eliminazione: "+e.message); }
      };

      // ── INCASSI: estratto conto BPER + contanti ──
      const ITMESI={gennaio:0,febbraio:1,marzo:2,aprile:3,maggio:4,giugno:5,luglio:6,agosto:7,settembre:8,ottobre:9,novembre:10,dicembre:11};
      const parseItDate = s => { const m=String(s).trim().match(/(\d{1,2})\s+([a-zà]+)\s+(\d{4})/i); if(!m) return null; const mm=ITMESI[m[2].toLowerCase()]; if(mm==null) return null; return `${m[3]}-${String(mm+1).padStart(2,"0")}-${String(m[1]).padStart(2,"0")}`; };
      // Nome "core": senza forme societarie e congiunzioni, per matchare
      // es. "ASIF TRASPORTI DI NAWAZ MUHAMMAD" con "ASIF TRASPORTI NAWAZ"
      const normCore = s => String(s||"").toUpperCase().replace(/[^A-Z ]+/g," ")
        .replace(/\b(DI|DEL|DELLA|DELLE|DEI|E|C|CO|SRL|SRLS|SNC|SAS|SS|SPA|SOCIETA|DITTA|IMPRESA|FRATELLI|F\.?LLI)\b/g," ")
        .replace(/\s+/g,"");
      const matchClienteBanca = (nome) => {
        const n=normName(nome); if(!n) return null;
        const al=(foglio.alias||[]).find(a=>{ const t=normName(a.testo_banca); return t===n || (t.length>6&&n.includes(t)) || (n.length>6&&t.includes(n)); });
        if(al){ const c=foglio.clienti.find(x=>x.id===al.cliente_id); if(c) return c; }
        const nc=normCore(nome);
        return foglio.clienti.find(c=>{ const k=normName(c.nome); if(!k) return false;
          if(k===n || k.startsWith(n.slice(0,8)) || n.startsWith(k.slice(0,8)) || (n.length>6&&k.includes(n)) || (k.length>6&&n.includes(k))) return true;
          const kc=normCore(c.nome); if(!kc||!nc) return false;
          return kc===nc || (kc.length>7&&nc.startsWith(kc)) || (nc.length>7&&kc.startsWith(nc)); })||null;
      };
      // Collega un movimento a un cliente SENZA registrare il pagamento:
      // memorizza l'alias banca->cliente e abbina la riga (poi si conferma normalmente)
      const collegaMov = async(mov, cliente)=>{
        const testo=(mov.nome||mov.desc||"").slice(0,120);
        try{ await sbInsert("alias_banca",[{testo_banca:testo,cliente_id:cliente.id}]);
          setFoglio(f=>({...f,alias:[...(f.alias||[]),{testo_banca:testo,cliente_id:cliente.id}]}));
        }catch(e){}
        setIncMovs(prev=>prev.map(x=>x.key===mov.key?{...x,cliente}:x));
        setIncMsg(`🔗 "${(mov.nome||mov.desc||"").slice(0,40)}" collegato a ${cliente.nome} e memorizzato per il futuro. Controlla la riga e premi Conferma.`);
      };
      const caricaEstratto = async(file)=>{
        if(!sbReady()){ setIncMsg("⚠ Connetti prima Supabase (tab Foglio)."); return; }
        setIncBusy(true); setIncMsg("");
        try{
          const buf=await file.arrayBuffer(); const wb=XLSX.read(buf,{type:"array"});
          const g=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true,defval:""});
          let h=-1; for(let i=0;i<g.length;i++){ if(g[i].some(c=>String(c).includes("Data operazione"))){h=i;break;} }
          if(h<0) throw new Error("Formato non riconosciuto: manca la riga 'Data operazione'");
          const hr=g[h]; const col={};
          hr.forEach((c,i)=>{ const t=String(c).toLowerCase(); if(t.includes("data operazione"))col.data=i; else if(t.includes("descrizione"))col.desc=i; else if(t.includes("entrate"))col.ent=i; });
          // Esclusi dal perimetro CED (non clienti): compensi partner, fornitori, ecc.
          const EXCL_BANCA=/METIS\s*CONSULTING|TEAMSYSTEM|CONTI\s+GEREMIA/i;
          const movs=[]; let saltatiData=0;
          for(let i=h+1;i<g.length;i++){
            const r=g[i]; const ent=parseFloat(r[col.ent]); if(!(ent>0)) continue;
            const data=parseItDate(r[col.data]); const desc=String(r[col.desc]||"").trim();
            if(incDaData && data && data<incDaData){ saltatiData++; continue; }
            const m=desc.match(/o\/c:\s*(.+?)(?:\s+ABI-CAB|\s{2,}|$)/);
            const nome=(m?m[1]:desc.slice(0,45)).trim();
            const key=(data||"")+"|"+ent.toFixed(2)+"|"+desc.slice(0,40);
            const escl=EXCL_BANCA.test(nome)||EXCL_BANCA.test(desc);
            const dup=(foglio.pagamenti||[]).some(pg=>pg.mov_key===key);
            movs.push({data,desc,nome,importo:ent,key,dup,escl,cliente:(dup||escl)?null:matchClienteBanca(nome),fonte:"estratto",state:dup?"dup":escl?"skip":undefined});
          }
          setIncMovs(movs);
          LS.setRaw("ced_inc_dadata", incDaData||"");
          const nuovi=movs.filter(m=>!m.state);
          setIncMsg(`Letti ${movs.length} incassi (${fmt(movs.reduce((s,m)=>s+m.importo,0))}) · ${nuovi.length} da gestire · ${movs.filter(m=>m.dup).length} già registrati · ${movs.filter(m=>m.escl).length} esclusi (non CED)${saltatiData?` · ${saltatiData} prima del ${fmtD(incDaData)}`:""} · ${nuovi.filter(m=>m.cliente).length} abbinati automaticamente.`);
        }catch(e){ setIncMsg("Errore lettura estratto: "+e.message); }
        setIncBusy(false);
      };
      // Regola A + CASCATA: importo uguale → quella; altrimenti alloca sulle aperte in ordine
      // di scadenza (FIFO): salda le più vecchie finché il pagamento copre, l'ultima parte è ACCONTO.
      // Se il pagamento è inferiore alla prima → acconto (residuo ridotto, resta aperta).
      const confermaIncasso = async(mov, cliente, learnAlias, pfChosen)=>{
        const nota=(mov.nota||"").trim();
        // SOLO PER RECORD: incassi non legati a proforma (rinnovi CNS, Fatture in Cloud, ecc.)
        // o notule già in "pagato": vanno a registro con promemoria, senza toccare il dovuto.
        if(mov.soloRecord){
          const pag={cliente_id:cliente.id,proforma_id:null,data:mov.data||todayStr(),importo:mov.importo,fonte:mov.fonte||"estratto",
            descrizione:((mov.desc||mov.nome||"")+(nota?` — 📝 ${nota}`:"")+" (solo per record)").slice(0,300),mov_key:mov.key};
          const ins=await sbInsert("pagamenti",[pag]);
          if(learnAlias && mov.nome){ try{ await sbInsert("alias_banca",[{testo_banca:mov.nome,cliente_id:cliente.id}]); }catch(e){} }
          setFoglio(f=>({...f,pagamenti:[ins[0],...(f.pagamenti||[])]}));
          return {pf:null,esito:"SOLO PER RECORD · dovuto invariato"+(nota?` · ${nota}`:"")};
        }
        const open=foglio.proforme.filter(p=>p.cliente_id===cliente.id && !p.pagato && Number(p.importo)>0)
          .sort((a,b)=>String(PERIOD_DEADLINE[a.periodo]||"9999").localeCompare(String(PERIOD_DEADLINE[b.periodo]||"9999")));
        // coda di allocazione: proforma scelta a mano, oppure match esatto, oppure FIFO su tutte
        let coda;
        if(pfChosen) coda=[pfChosen];
        else { const esatta=open.find(p=>Math.abs(Number(p.importo)-mov.importo)<0.01); coda = esatta ? [esatta] : open; }
        const pag={cliente_id:cliente.id,proforma_id:coda[0]?.id||null,data:mov.data||todayStr(),importo:mov.importo,fonte:mov.fonte||"estratto",descrizione:((mov.desc||mov.nome||"")+(nota?` — 📝 ${nota}`:"")).slice(0,300),mov_key:mov.key};
        const ins=await sbInsert("pagamenti",[pag]);
        let resto=mov.importo; const esiti=[]; const patchLocal=[];
        const isSconto = mov.fonte==="sconto";
        for(const pf of coda){
          if(resto<=0.009) break;
          const imp=Number(pf.importo)||0;
          if(resto >= imp-0.01){
            const patch={pagato:true,data_pagamento:pag.data};
            if(isSconto) patch.note=((pf.note||"")+` · saldata con sconto ${fmt(imp)} il ${fmtD(pag.data)}`).slice(0,500);
            await sbUpdate("proforme",`id=eq.${pf.id}`,patch);
            patchLocal.push({id:pf.id,patch});
            esiti.push((isSconto?"SALDATA CON SCONTO ":"PAGATA ")+(PLABEL[pf.periodo]||pf.periodo));
            resto=Math.round((resto-imp)*100)/100;
          } else if(mov.riduzione){
            // RIDUZIONE DEBITO: il pagamento inferiore salda la proforma; l'importo a sistema
            // viene ridotto al pagato (la proforma NON viene ristampata, resta traccia in nota).
            const nota=((pf.note||"")+` · importo ridotto da ${fmt(imp)} a ${fmt(resto)} il ${fmtD(pag.data)} (pagamento a saldo)`).slice(0,500);
            await sbUpdate("proforme",`id=eq.${pf.id}`,{importo:resto,pagato:true,data_pagamento:pag.data,note:nota});
            patchLocal.push({id:pf.id,patch:{importo:resto,pagato:true,data_pagamento:pag.data,note:nota}});
            esiti.push(`RIDOTTA E SALDATA ${PLABEL[pf.periodo]||pf.periodo} (da ${fmt(imp)} a ${fmt(resto)})`);
            resto=0;
          } else {
            const residuo=Math.round((imp-resto)*100)/100;
            const nota=((pf.note||"")+` · ${isSconto?"sconto":"acconto"} ${fmt(resto)} il ${fmtD(pag.data)}`).slice(0,500);
            await sbUpdate("proforme",`id=eq.${pf.id}`,{importo:residuo,note:nota});
            patchLocal.push({id:pf.id,patch:{importo:residuo,note:nota}});
            esiti.push(`${isSconto?"SCONTO":"ACCONTO"} su ${PLABEL[pf.periodo]||pf.periodo} (residuo ${fmt(residuo)})`);
            resto=0;
          }
        }
        if(resto>0.009 && esiti.length) esiti.push(`eccedenza ${fmt(resto)} non allocata`);
        if(learnAlias && mov.nome){ try{ await sbInsert("alias_banca",[{testo_banca:mov.nome,cliente_id:cliente.id}]); }catch(e){} }
        setFoglio(f=>({...f,pagamenti:[ins[0],...(f.pagamenti||[])],
          proforme:f.proforme.map(p=>{ const pl=patchLocal.find(x=>x.id===p.id); return pl?{...p,...pl.patch}:p; }),
          alias:learnAlias&&mov.nome?[...(f.alias||[]),{testo_banca:mov.nome,cliente_id:cliente.id}]:f.alias}));
        return {pf:coda[0]||null,esito:esiti.join(" · ")};
      };
      const confermaMov = async(mov, cliente, learn, pfChosen)=>{
        setIncBusy(true);
        try{ const {pf,esito}=await confermaIncasso(mov,cliente,learn,pfChosen);
          setIncMovs(prev=>prev.map(m=>m.key===mov.key?{...m,state:"done",cliente,pfInfo:esito||"nessuna proforma aperta"}:m));
          setIncMsg(`✓ ${cliente.nome}: ${fmt(mov.importo)} registrato${esito?` · ${esito}`:" (nessuna proforma aperta abbinata)"}`);
        }catch(e){ setIncMsg("Errore: "+e.message); }
        setIncBusy(false);
      };
      const confermaTuttiSicuri = async()=>{
        const sicuri=incMovs.filter(m=>!m.dup && !m.state && m.cliente);
        if(!sicuri.length){ setIncMsg("Nessun movimento abbinato da confermare."); return; }
        if(!confirm(`Confermare ${sicuri.length} incassi abbinati automaticamente?`)) return;
        setIncBusy(true); let ok=0,err=0;
        for(const m of sicuri){ try{ const {esito}=await confermaIncasso(m,m.cliente,false); setIncMovs(prev=>prev.map(x=>x.key===m.key?{...x,state:"done",pfInfo:esito||""}:x)); ok++; }catch(e){ err++; } }
        setIncMsg(`✓ Registrati ${ok} incassi${err?` · ${err} errori`:""}. Dashboard aggiornata.`);
        setIncBusy(false);
      };
      const TIPI_CASH={contanti:"Incasso contanti",pos:"Incasso POS",assegno:"Incasso assegno",sconto:"Sconto concesso",altro:"Incasso (altro)"};
      // Registrazione manuale multi-riga: applica in sequenza tutte le righe (es. contanti + sconto)
      // su una copia locale delle proforme aperte. Se soloRecord=true NON tocca le proforme (dovuto invariato).
      const confermaIncassoMulti = async(rows, cliente, pfChosen, record, data, riduzione, nota)=>{
        nota=(nota||"").trim();
        const esiti=[]; const patchLocal=[]; const nuovi=[];
        let working = foglio.proforme.filter(p=>p.cliente_id===cliente.id && !p.pagato && Number(p.importo)>0)
          .map(p=>({...p}))
          .sort((a,b)=>String(PERIOD_DEADLINE[a.periodo]||"9999").localeCompare(String(PERIOD_DEADLINE[b.periodo]||"9999")));
        if(pfChosen && !record) working=[...working.filter(p=>p.id===pfChosen.id), ...working.filter(p=>p.id!==pfChosen.id)];
        for(let ri=0; ri<rows.length; ri++){
          const row=rows[ri]; const isSconto=row.tipo==="sconto";
          const primo = record ? (pfChosen?.id||null) : (working.find(p=>!p.pagato && Number(p.importo)>0)?.id||null);
          const pag={cliente_id:cliente.id,proforma_id:primo,data,importo:row.importo,fonte:row.tipo,
            descrizione:((TIPI_CASH[row.tipo]||"Incasso")+(nota?` — 📝 ${nota}`:"")+(record?" (solo per record)":"")).slice(0,300),
            mov_key:`CASH|${cliente.id}|${data}|${row.importo}|${row.tipo}|${Date.now()}|${ri}`};
          const ins=await sbInsert("pagamenti",[pag]); nuovi.push(ins[0]);
          if(record){ esiti.push(`${TIPI_CASH[row.tipo]||"Incasso"} ${fmt(row.importo)} SOLO PER RECORD`); continue; }
          let resto=row.importo;
          for(const pf of working){
            if(resto<=0.009) break;
            if(pf.pagato || Number(pf.importo)<=0) continue;
            const imp=Number(pf.importo)||0;
            if(resto >= imp-0.01){
              const patch={pagato:true,data_pagamento:data};
              if(isSconto) patch.note=((pf.note||"")+` · saldata con sconto ${fmt(imp)} il ${fmtD(data)}`).slice(0,500);
              await sbUpdate("proforme",`id=eq.${pf.id}`,patch);
              Object.assign(pf,patch); patchLocal.push({id:pf.id,patch});
              esiti.push((isSconto?"SALDATA CON SCONTO ":"PAGATA ")+(PLABEL[pf.periodo]||pf.periodo));
              resto=Math.round((resto-imp)*100)/100;
            } else if(riduzione && !isSconto){
              const nota=((pf.note||"")+` · importo ridotto da ${fmt(imp)} a ${fmt(resto)} il ${fmtD(data)} (pagamento a saldo)`).slice(0,500);
              const patch={importo:resto,pagato:true,data_pagamento:data,note:nota};
              await sbUpdate("proforme",`id=eq.${pf.id}`,patch);
              Object.assign(pf,patch); patchLocal.push({id:pf.id,patch});
              esiti.push(`RIDOTTA E SALDATA ${PLABEL[pf.periodo]||pf.periodo} (da ${fmt(imp)} a ${fmt(resto)})`);
              resto=0;
            } else {
              const residuo=Math.round((imp-resto)*100)/100;
              const nota=((pf.note||"")+` · ${isSconto?"sconto":"acconto"} ${fmt(resto)} il ${fmtD(data)}`).slice(0,500);
              const patch={importo:residuo,note:nota};
              await sbUpdate("proforme",`id=eq.${pf.id}`,patch);
              Object.assign(pf,patch); patchLocal.push({id:pf.id,patch});
              esiti.push(`${isSconto?"SCONTO":"ACCONTO"} su ${PLABEL[pf.periodo]||pf.periodo} (residuo ${fmt(residuo)})`);
              resto=0;
            }
          }
          if(resto>0.009) esiti.push(`eccedenza ${fmt(resto)} non allocata`);
        }
        setFoglio(f=>({...f,pagamenti:[...nuovi.slice().reverse(),...(f.pagamenti||[])],
          proforme:f.proforme.map(p=>{ const pls=patchLocal.filter(x=>x.id===p.id); return pls.length?{...p,...Object.assign({},...pls.map(x=>x.patch))}:p; })}));
        return esiti.join(" · ");
      };
      const registraContanti = async()=>{
        const cli=foglio.clienti.find(c=>c.nome===cashCliName.trim());
        if(!cli){ setIncMsg("⚠ Cliente non trovato: scrivi e seleziona un nome dall'elenco."); return; }
        const imp=parseFloat(cashImp);
        const rows=[...cashRows]; if(imp>0) rows.push({tipo:cashTipo,importo:imp});
        if(!rows.length){ setIncMsg("⚠ Nessuna riga: inserisci un importo."); return; }
        const pfChosen = cashPf!=="auto" ? foglio.proforme.find(p=>p.id===cashPf) : null;
        setIncBusy(true);
        try{
          const esito=await confermaIncassoMulti(rows,cli,pfChosen,soloRecord,cashData||todayStr(),cashMode==="riduzione",cashNota);
          const tot=rows.reduce((s,r)=>s+r.importo,0);
          setIncMsg(`✓ ${cli.nome}: ${fmt(tot)} registrato (${rows.length} rig${rows.length>1?"he":"a"})${esito?` · ${esito}`:" (nessuna proforma aperta abbinata)"}`);
          setCashImp(""); setCashRows([]); setCashPf("auto"); setSoloRecord(false); setCashNota("");
        }catch(e){ setIncMsg("Errore: "+e.message); }
        setIncBusy(false);
      };

      const ydBrowse = useCallback(async(path, token)=>{
        const t=token||ydToken; if(!t) return;
        setYdLoading(true); setYdError("");
        try {
          const data=await ydList(t,path);
          setYdItems((data._embedded?.items||[]).filter(it=>it.type==="dir"||(it.type==="file"&&it.name.toLowerCase().endsWith(".pdf"))));
          setYdPath(path);
        } catch(e) { setYdError(e.message); }
        setYdLoading(false);
      },[ydToken]);

      const saveToken=()=>{ LS.setRaw("yd_token",ydToken); LS.setRaw("yd_sync_path",ydSyncPath); ydBrowse("/",ydToken); };

      const navTo=(path)=>{
        const parts=path.split("/").filter(Boolean);
        setYdCrumb(["/",...parts]);
        ydBrowse(path||"/");
      };

      const loadPdfForViewer = async(inv)=>{
        if (blobMap[inv.id]) { setViewerInv(inv); setTab("viewer"); return; }
        if (!inv.pdfPath || !ydToken) { alert("PDF non disponibile. Verifica connessione Yandex."); return; }

          setBlobMap(m=>({...m,[inv.id]:{ url, name }}));
          setViewerInv(inv);
          setTab("viewer");
        } catch(e) { setYdError("Errore caricamento PDF: "+e.message); }
        setPdfLoading(false);
      };

      const addPayment=()=>{
        const amt=parseFloat(payAmt); if(!amt||!selected) return;
        setInvoices(p=>p.map(inv=>{
          if(inv.id!==selected.id) return inv;
          const newPaid=Math.min(inv.paid+amt,inv.amount);
          const u={...inv,paid:newPaid,status:newPaid>=inv.amount?"pagato":"parziale",
            payments:[...inv.payments,{date:todayStr(),amount:amt,method:payMth}]};

      };

      const addNote=()=>{
        if(!noteText.trim()||!selected) return;
        setInvoices(p=>p.map(inv=>{
          if(inv.id!==selected.id) return inv;
          const u={...inv,notes:[...inv.notes,{text:noteText,author:"Utente",scanned:false}]};
          setSelected(u); return u;
        }));
        setNoteText("");
      };

      const analyzeAI=async(type)=>{
        setAiLoading(true); setAiResult("");
        const snap={invoices:invoices.map(i=>({id:i.id,client:i.client,amount:i.amount,paid:i.paid,status:i.status,due:i.due,giorni_ritardo:daysOverdue(i)})),totale,incassato,residuo,scadutiV,storicoV,storicoN,data_oggi:todayStr()};
        const prompts={
          cashflow:`Sei un controller finanziario di uno studio CED. Analizza il cash flow sui dati reali (data odierna ${todayStr()}): ${JSON.stringify(snap)}.
Struttura la risposta con sezioni e titoli chiari:
1. SINTESI ESECUTIVA (3 righe)
2. PROIEZIONE INCASSI mese per mese sui prossimi 6 mesi (con importi €)
3. CREDITI GIÀ SCADUTI da recuperare subito (elenco clienti + €)
4. CREDITI STORICI >24 MESI: valuta separatamente (probabile inesigibilità, eventuale svalutazione/stralcio) — ${fmt(storicoV)} su ${storicoN} proforma

                            const inv = invs.find(i=>i.pdfPath===item.path);
                            return (
                              <div key={item.path} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                                <i className="ti ti-file-type-pdf" style={{fontSize:15,color:paid?C.green:C.amber,flexShrink:0}}/>
                                <span style={{flex:1,minWidth:0,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={item.name}>{item.name}</span>
                                {inv && inv.amount>0 && <span style={{fontSize:11,fontWeight:500,color:paid?C.green:C.amber}}>{fmt(inv.amount-(paid?inv.amount:inv.paid)||inv.amount)}</span>}
                                <button onClick={()=>viewYdFile(item, cl.name)} disabled={pdfLoading} style={{padding:"3px 8px",background:C.purpleL,color:C.purple,border:`1px solid ${C.purple}33`,borderRadius:6,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-eye" style={{fontSize:11}}/>Vedi</button>
                                {!paid && <button onClick={()=>parsePdf(item)} disabled={pdfLoading} style={{padding:"3px 8px",background:C.blueL,color:C.blue,border:`1px solid ${C.blue}33`,borderRadius:6,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-sparkles" style={{fontSize:11}}/>AI</button>}
                              </div>
                            );
                          };
                          return (
                          <div style={{borderTop:"0.5px solid var(--color-border-tertiary)",padding:"10px 13px"}}>
                            {!cf || cf.loading ? (
                              <p style={{textAlign:"center",fontSize:11,color:"var(--color-text-secondary)",padding:"8px 0"}}><i className="ti ti-loader-2 ti-spin" style={{marginRight:5}}/>Carico proforma da Yandex...</p>
                            ) : (<>
                              {/* DA PAGARE */}
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                                <span style={{fontSize:11,fontWeight:600,color:C.amber,textTransform:"uppercase",letterSpacing:.3}}><i className="ti ti-clock" style={{marginRight:4}}/>Da pagare ({cf.open.length})</span>
                                {cf.open.length>0 && <button onClick={()=>readClientAmounts(cl)} disabled={cliAiLoading===cl.name} style={{padding:"3px 9px",background:cliAiLoading===cl.name?C.grayL:C.blue,color:cliAiLoading===cl.name?C.gray:"white",border:"none",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:500}}>{cliAiLoading===cl.name?"Leggo...":"Leggi importi AI"}</button>}
                              </div>
                              {cf.open.length===0 ? <p style={{fontSize:11,color:"var(--color-text-secondary)",margin:"0 0 8px"}}>Nessuna proforma da pagare.</p> : cf.open.map(it=>fileRow(it,false))}
