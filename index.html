              )}
              <div style={{marginTop:10,background:"var(--color-background-secondary)",borderRadius:10,padding:"12px 14px"}}>
                <button onClick={exportCSV} style={{padding:"7px 14px",background:C.greenL,color:C.green,border:`1px solid ${C.green}33`,borderRadius:7,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontWeight:500}}><i className="ti ti-file-spreadsheet"/>Esporta Excel (.xlsx)</button>
              </div>
            </div>
          )}

          {/* ══ OCR NOTE ══ */}
          {tab==="ocr" && (
            <div>
              <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                <h3 style={{margin:"0 0 4px",fontSize:13,fontWeight:500}}>Note a mano e testo scansionato</h3>
                <p style={{margin:"0 0 10px",fontSize:11,color:"var(--color-text-secondary)"}}>Incolla testo trascritto o output OCR grezzo. L'AI struttura le informazioni di pagamento.</p>
                <textarea value={ocrText} onChange={e=>setOcrText(e.target.value)} rows={5} placeholder={"Esempio:\n\"Cliente Beta ha chiamato, conferma saldo 6.500€ entro 30/05 via bonifico. Accordo sig. Rossi.\""} style={{width:"100%",padding:"7px 9px",borderRadius:8,border:"0.5px solid var(--color-border-secondary)",fontSize:12,lineHeight:1.6,resize:"vertical",boxSizing:"border-box"}}/>
                <div style={{display:"flex",gap:6,marginTop:7}}>
                  <button onClick={analyzeOcr} disabled={ocrLoading||!ocrText.trim()} style={{padding:"6px 14px",background:C.blue,color:"white",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:4,opacity:ocrLoading?.6:1}}>
                    {ocrLoading?<><i className="ti ti-loader-2"/>Elaboro...</>:<><i className="ti ti-scan"/>Analizza</>}
                  </button>
                  <button onClick={()=>{setOcrText("");setOcrResult("");}} style={{padding:"6px 10px",background:"transparent",border:"0.5px solid var(--color-border-tertiary)",borderRadius:7,fontSize:12,cursor:"pointer",color:"var(--color-text-secondary)"}}>Cancella</button>
                </div>
              </div>
              {ocrResult && !ocrLoading && (
                <div style={{background:C.amberL,border:`1px solid ${C.amber}44`,borderRadius:12,padding:"12px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><i className="ti ti-note-off" style={{color:C.amber,fontSize:15}}/><span style={{fontSize:12,fontWeight:500,color:C.amber}}>Informazioni estratte</span></div>
                  <pre style={{margin:0,fontSize:11,lineHeight:1.7,color:C.coral,whiteSpace:"pre-wrap",fontFamily:"inherit"}}>{ocrResult}</pre>
                </div>
              )}
            </div>
          )}

          {/* ══ PDF VIEWER ══ */}
          {/* Scheda cliente globale: riepilogo situazione + PDF Yandex (apribile da qualsiasi tab) */}
          {incPdfCli && (()=>{
            const cf=cliFiles[incPdfCli];
            const nomeUp=incPdfCli.trim().toUpperCase();
            const _n=normName(incPdfCli), _nc=normCore(incPdfCli);
            const _al=(foglio.alias||[]).find(a=>{ const t=normName(a.testo_banca); return t&&_n&&(t===_n||(t.length>6&&_n.includes(t))||(_n.length>6&&t.includes(_n))); });
            const cliObj = (_al && foglio.clienti.find(c=>c.id===_al.cliente_id))
              || foglio.clienti.find(c=>c.nome.trim().toUpperCase()===nomeUp)
              || foglio.clienti.find(c=>{const n=c.nome.trim().toUpperCase(); return n.includes(nomeUp)||nomeUp.includes(n);})
              || foglio.clienti.find(c=>{const kc=normCore(c.nome); return kc&&_nc&&(kc===_nc||(kc.length>7&&_nc.startsWith(kc))||(_nc.length>7&&kc.startsWith(_nc)));});
            const pfs = cliObj ? foglio.proforme.filter(p=>p.cliente_id===cliObj.id) : [];
            const aperte = pfs.filter(p=>!p.pagato && Number(p.importo)>0)
              .sort((a,b)=>String(PERIOD_DEADLINE[a.periodo]||"9999").localeCompare(String(PERIOD_DEADLINE[b.periodo]||"9999")));
            const pagate = pfs.filter(p=>p.pagato).sort((a,b)=>String(b.data_pagamento||"").localeCompare(String(a.data_pagamento||"")));
            const oggi = todayStr();
            const scadEff = p => p.scadenza || PERIOD_DEADLINE[p.periodo] || "";
            const dovuto = aperte.reduce((s,p)=>s+(Number(p.importo)||0),0);
            const scaduto = aperte.filter(p=>scadEff(p) && scadEff(p)<oggi).reduce((s,p)=>s+(Number(p.importo)||0),0);
            const pags = cliObj ? (foglio.pagamenti||[]).filter(p=>p.cliente_id===cliObj.id).slice(0,5) : [];
            return (
            <div onClick={()=>setIncPdfCli(null)} style={{position:"fixed",inset:0,background:"rgba(15,23,42,.45)",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"40px 16px",overflowY:"auto"}}>
              <div onClick={e=>e.stopPropagation()} style={{background:"var(--color-surface)",border:`1px solid ${C.purple}44`,borderRadius:14,padding:"14px 16px",boxShadow:"0 12px 40px rgba(0,0,0,.25)",width:"100%",maxWidth:760,maxHeight:"85vh",overflowY:"auto"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <p style={{margin:0,fontSize:14,fontWeight:700,color:C.purple}}>📂 {incPdfCli}</p>
                  <button onClick={()=>setIncPdfCli(null)} style={{background:"var(--color-background-secondary)",border:"none",borderRadius:7,padding:"4px 10px",color:"var(--color-text-primary)",cursor:"pointer",fontSize:13,fontWeight:600}}>✕ Chiudi</button>
                </div>
                {cliObj ? (<>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
                    <div style={{flex:"1 1 120px",padding:"8px 12px",borderRadius:10,background:S.warn+"12",border:`1px solid ${S.warn}33`}}>
                      <p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)",fontWeight:600}}>DA INCASSARE</p>
                      <p style={{margin:0,fontSize:16,fontWeight:700,color:S.warnD}}>{fmt(dovuto)}</p>
                    </div>
                    <div style={{flex:"1 1 120px",padding:"8px 12px",borderRadius:10,background:C.red+"10",border:`1px solid ${C.red}33`}}>
                      <p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)",fontWeight:600}}>DI CUI SCADUTO</p>
                      <p style={{margin:0,fontSize:16,fontWeight:700,color:C.red}}>{fmt(scaduto)}</p>
                    </div>
                    <div style={{flex:"1 1 120px",padding:"8px 12px",borderRadius:10,background:S.good+"12",border:`1px solid ${S.good}33`}}>
                      <p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)",fontWeight:600}}>PROFORME</p>
                      <p style={{margin:0,fontSize:16,fontWeight:700,color:S.good}}>{aperte.length} aperte · {pagate.length} pagate</p>
                    </div>
                  </div>
                  {pfs.length>0 && (
                    <div style={{marginBottom:10,border:"0.5px solid var(--color-border-tertiary)",borderRadius:10,overflow:"hidden"}}>
                      {[...aperte,...pagate].map(p=>{ const sc=scadEff(p); const isScad=!p.pagato && sc && sc<oggi; return (
                        <div key={p.id} style={{display:"flex",gap:8,alignItems:"center",padding:"5px 10px",borderTop:"0.5px solid var(--color-border-tertiary)",fontSize:12,background:p.pagato?"transparent":(isScad?C.red+"08":S.warn+"08")}}>
                          <span style={{minWidth:16}}>{p.pagato?"✅":(isScad?"🔴":"🟡")}</span>
                          <span style={{minWidth:60,fontWeight:600}}>{PLABEL[p.periodo]||p.periodo}</span>
                          <span style={{minWidth:80,fontWeight:600,color:p.pagato?S.good:(isScad?C.red:S.warnD)}}>{fmt(p.importo)}</span>
                          {p.pagato ? (
                            <span style={{minWidth:120,fontSize:11,color:"var(--color-text-secondary)"}}>{`pagata ${p.data_pagamento?fmtD(p.data_pagamento):""}`}</span>
                          ) : (
                            <span style={{display:"inline-flex",alignItems:"center",gap:4,minWidth:170}}>
                              <input type="date" value={p.scadenza||""} onChange={async e=>{ const v=e.target.value||null;
                                try{ await sbUpdate("proforme",`id=eq.${p.id}`,{scadenza:v});
                                  setFoglio(f=>({...f,proforme:f.proforme.map(x=>x.id===p.id?{...x,scadenza:v}:x)}));
                                }catch(err){ alert("Errore salvataggio scadenza: "+err.message); } }}
                                title="Scadenza personalizzata: i solleciti WhatsApp contano i giorni da questa data (vuota = scadenza standard del periodo)"
                                style={{padding:"2px 5px",borderRadius:5,border:`1px solid ${p.scadenza?S.warnD:"var(--color-border-secondary)"}`,background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:10,width:112}}/>
                              <span style={{fontSize:10,color:"var(--color-text-secondary)"}}>{p.scadenza?"":(sc?`std ${fmtD(sc)}`:"")}</span>
                            </span>
                          )}
                          {p.note && <span style={{flex:1,fontSize:10,fontStyle:"italic",color:S.warnD,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={p.note}>📌 {p.note}</span>}
                        </div>
                      );})}
                    </div>
                  )}
                  {pags.length>0 && (
                    <div style={{marginBottom:10,fontSize:11,color:"var(--color-text-secondary)"}}>
                      <b>Ultimi incassi:</b> {pags.map(p=>`${fmtD(p.data)} ${fmt(p.importo)} (${p.fonte||"—"})`).join(" · ")}
                    </div>
                  )}
                </>) : <p style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:0}}>Cliente non presente nel Foglio cloud — mostro solo i PDF della cartella Yandex.</p>}
                <p style={{margin:"0 0 4px",fontSize:12,fontWeight:700,color:C.purple}}>Documenti in cartella Yandex</p>
                {!cf||cf.loading ? <p style={{fontSize:12,color:"var(--color-text-secondary)"}}>Carico l'elenco da Yandex...</p> : (<>
                  {cf.error && <p style={{fontSize:12,color:C.red}}>Errore: {cf.error}</p>}
                  {cf.open.length>0 && <p style={{margin:"4px 0 2px",fontSize:11,fontWeight:600,color:S.warn}}>DA PAGARE ({cf.open.length})</p>}
                  {cf.open.map((f,i)=>(
                    <button key={"o"+i} onClick={()=>viewYdFile(f,incPdfCli)} disabled={pdfLoading} style={{display:"flex",alignItems:"center",gap:6,width:"100%",textAlign:"left",padding:"5px 8px",background:"transparent",border:"none",borderTop:"0.5px solid var(--color-border-tertiary)",cursor:"pointer",fontSize:12,color:"var(--color-text-primary)"}}>
                      <span style={{color:C.purple}}>📄</span>
                      <span style={{minWidth:74,fontWeight:600,color:S.slateD}}>{pdfEmissDate(f)?fmtD(pdfEmissDate(f)):"—"}</span>
                      <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                    </button>
                  ))}
                  {cf.paid.length>0 && <p style={{margin:"8px 0 2px",fontSize:11,fontWeight:600,color:S.good}}>PAGATE ({cf.paid.length})</p>}
                  {cf.paid.map((f,i)=>(
                    <button key={"p"+i} onClick={()=>viewYdFile(f,incPdfCli)} disabled={pdfLoading} style={{display:"flex",alignItems:"center",gap:6,width:"100%",textAlign:"left",padding:"5px 8px",background:"transparent",border:"none",borderTop:"0.5px solid var(--color-border-tertiary)",cursor:"pointer",fontSize:12,color:"var(--color-text-secondary)"}}>
                      <span style={{color:S.good}}>✅</span>
                      <span style={{minWidth:74,fontWeight:600,color:S.good}}>{pdfEmissDate(f)?fmtD(pdfEmissDate(f)):"—"}</span>
                      <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                    </button>
                  ))}
                  {!cf.error && cf.open.length===0 && cf.paid.length===0 && <p style={{fontSize:12,color:"var(--color-text-secondary)"}}>Nessun PDF nella cartella.</p>}
                </>)}
                {pdfLoading && <p style={{margin:"6px 0 0",fontSize:11,color:C.purple}}>⏳ Apro il PDF nel viewer...</p>}
              </div>
            </div>
            );})()}

          {tab==="viewer" && viewerInv && blobMap[viewerInv.id] && (
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <i className="ti ti-file-type-pdf" style={{fontSize:18,color:C.purple}}/>
                  <div>
                    <p style={{margin:0,fontSize:13,fontWeight:500,color:C.purple}}>{blobMap[viewerInv.id].name}</p>
                    {viewerInv.id!=="__preview__" && <p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)"}}>{viewerInv.client}</p>}
                  </div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <a href={blobMap[viewerInv.id].url} download={blobMap[viewerInv.id].name} style={{padding:"5px 12px",background:C.purpleL,color:C.purple,border:`1px solid ${C.purple}33`,borderRadius:7,fontSize:11,textDecoration:"none",display:"flex",alignItems:"center",gap:4}}><i className="ti ti-download"/>Scarica</a>
                  <button onClick={()=>{setViewerInv(null);setTab("fatture");}} style={{padding:"5px 10px",background:"transparent",border:"0.5px solid var(--color-border-tertiary)",borderRadius:7,fontSize:11,cursor:"pointer",color:"var(--color-text-secondary)",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-x"/>Chiudi</button>
                </div>
              </div>
              <div style={{border:`1px solid ${C.purple}44`,borderRadius:12,overflow:"hidden",background:"#525659"}}>
                <iframe src={blobMap[viewerInv.id].url} title="Visualizzatore PDF" style={{width:"100%",height:640,border:"none",display:"block"}}/>
              </div>
              <p style={{margin:"7px 0 0",fontSize:10,color:"var(--color-text-secondary)",textAlign:"center"}}>Se il PDF non si visualizza nel browser, usa il pulsante Scarica.</p>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CEDDashboard />);
  </script>
  <script>
    // Trasforma ed esegue lo script JSX forzando il runtime CLASSICO (React.createElement),
    // evitando l'import automatico di "react/jsx-runtime" non risolvibile nel browser.
    (function () {
      try {
        var code = document.getElementById("app-code").textContent;
        var out = Babel.transform(code, { presets: [["react", { runtime: "classic" }]] }).code;
        (0, eval)(out);
      } catch (e) {
        document.getElementById("root").innerHTML =
          '<div style="padding:20px;font-family:sans-serif;color:#a32d2d">Errore di avvio: ' + (e && e.message) + '</div>';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
