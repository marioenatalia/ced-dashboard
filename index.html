                      <div style={{width:7,height:7,borderRadius:"50%",background:v.c}}/><span style={{fontSize:11,color:v.c,fontWeight:600}}>{v.label}: {invoices.filter(i=>i.status===k).length}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* ── INCASSI (ultimi 6 mesi) + previsione ── */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12,marginBottom:12}}>
                <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:16,padding:"16px 18px",boxShadow:"0 2px 12px -5px rgba(0,0,0,.14)"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <span style={{display:"flex",alignItems:"center",gap:7,fontSize:13,fontWeight:600}}><i className="ti ti-cash" style={{fontSize:16,color:S.good}}/>Incassi ultimi 6 mesi</span>
                    <span style={{fontSize:12,fontWeight:600,color:S.good}}>{fmt(ANA.incassato6m)}</span>
                  </div>
                  <VBars series={ANA.incassiMensili} height={130}/>
                </div>
                <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:16,padding:"16px 18px",boxShadow:"0 2px 12px -5px rgba(0,0,0,.14)"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <span style={{display:"flex",alignItems:"center",gap:7,fontSize:13,fontWeight:600}}><i className="ti ti-trending-up" style={{fontSize:16,color:S.slateD}}/>Incassi previsti</span>
                    <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>DSO {ANA.dso}gg</span>
                  </div>
                  <VBars series={ANA.cashflow} height={130}/>
                </div>
              </div>

              {/* ── SOFFERENZE: aging + top clienti ── */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12,marginBottom:12}}>
                <div style={{background:"var(--color-background-primary)",border:`1px solid ${S.warn}33`,borderRadius:16,padding:"16px 18px",boxShadow:"0 2px 12px -5px rgba(46,66,87,.16)"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <span style={{display:"flex",alignItems:"center",gap:7,fontSize:13,fontWeight:600}}><i className="ti ti-alert-octagon" style={{fontSize:16,color:S.warn}}/>Sofferenze · anzianità crediti</span>
                  </div>
                  <VBars series={ANA.aging} height={130}/>
                  <div style={{display:"flex",justifyContent:"space-around",marginTop:10,paddingTop:10,borderTop:"0.5px solid var(--color-border-tertiary)"}}>
                    <div style={{textAlign:"center"}}><p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)"}}>Scaduto</p><p style={{margin:0,fontSize:14,fontWeight:600,color:S.warn}}>{fmt(scadutiV)}</p></div>
                    <div style={{textAlign:"center"}}><p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)"}}>Storico &gt;24m</p><p style={{margin:0,fontSize:14,fontWeight:600,color:S.warnD}}>{fmt(storicoV)}</p></div>
                  </div>
                </div>
                <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:16,padding:"16px 18px",boxShadow:"0 2px 12px -5px rgba(0,0,0,.14)"}}>
                  <span style={{display:"flex",alignItems:"center",gap:7,fontSize:13,fontWeight:600,marginBottom:12}}><i className="ti ti-user-exclamation" style={{fontSize:16,color:S.slate}}/>Top clienti in sofferenza</span>
                  {ANA.topSoff.length>0 ? <HBars rows={ANA.topSoff}/> : <p style={{fontSize:12,color:"var(--color-text-secondary)",textAlign:"center",padding:14}}>Nessun credito aperto. Leggi gli importi dalla tab Clienti.</p>}
                </div>
              </div>

              <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px"}}>
                <h3 style={{margin:"0 0 10px",fontSize:13,fontWeight:500}}>Scadenze critiche</h3>
                {invoices.filter(i=>i.status!=="pagato").sort((a,b)=>new Date(a.due||0)-new Date(b.due||0)).slice(0,5).map(inv=>(
                  <div key={inv.id} onClick={()=>{setSelected(inv);setTab("fatture");}} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"0.5px solid var(--color-border-tertiary)",cursor:"pointer",gap:10}}>
                    <div style={{width:32,height:32,borderRadius:8,background:STATUS[inv.status].bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <i className={`ti ${STATUS[inv.status].icon}`} style={{fontSize:14,color:STATUS[inv.status].c}}/>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{margin:0,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inv.client}</p>
                      <p style={{margin:0,fontSize:11,color:"var(--color-text-secondary)"}}>{inv.id} · Scad. {inv.due?fmtD(inv.due):"—"}</p>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <p style={{margin:0,fontSize:13,fontWeight:500,color:STATUS[inv.status].c}}>{fmt(inv.amount-inv.paid)}</p>
                      {inv.pdfPath && <span style={{fontSize:10,color:C.purple,display:"flex",alignItems:"center",justifyContent:"flex-end",gap:2}}><i className="ti ti-paperclip" style={{fontSize:10}}/>PDF</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ══ FATTURE ══ */}
          {tab==="fatture" && (
            <div>
              <div style={{position:"relative",marginBottom:10}}>
                <i className="ti ti-search" style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,color:"var(--color-text-secondary)"}}/>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cerca cliente o numero proforma..." style={{width:"100%",padding:"9px 34px 9px 34px",borderRadius:10,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:13,boxSizing:"border-box"}}/>
                {search && <button onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--color-text-secondary)",cursor:"pointer",fontSize:15}}><i className="ti ti-x"/></button>}
              </div>
              {search && <p style={{margin:"0 0 10px",fontSize:11,color:"var(--color-text-secondary)"}}>{filtered.length} risultati per "{search}"</p>}
              <div style={{display:"flex",gap:5,marginBottom:12,flexWrap:"wrap"}}>
                {["tutti","pagato","parziale","attesa","scaduto","storico"].map(s=>{
                  const col = s==="tutti"?C.blue : s==="storico"?C.coral : STATUS[s]?.c;
                  const bgc = s==="tutti"?C.blueL : s==="storico"?C.coralL : STATUS[s]?.bg;
                  const lbl = s==="tutti"?"Tutte" : s==="storico"?`Storico >24m${storicoN?` (${storicoN})`:""}` : STATUS[s]?.label;
                  return (
                  <button key={s} onClick={()=>setFilterS(s)} style={{padding:"4px 12px",borderRadius:20,border:filterS===s?`1.5px solid ${col}`:"0.5px solid var(--color-border-tertiary)",background:filterS===s?bgc:"transparent",color:filterS===s?col:"var(--color-text-secondary)",fontSize:12,cursor:"pointer",fontWeight:filterS===s?500:400}}>
                    {lbl}
                  </button>
                  );
                })}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {filtered.map(inv=>(
                  <div key={inv.id} onClick={()=>setSelected(selected?.id===inv.id?null:inv)} style={{background:"var(--color-background-primary)",border:`0.5px solid ${selected?.id===inv.id?C.blue:"var(--color-border-tertiary)"}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",transition:"border-color .15s"}}>
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",gap:5,marginBottom:3,flexWrap:"wrap",alignItems:"center"}}>
                          <span style={{fontSize:10,color:C.gray,fontFamily:"monospace"}}>{inv.id}</span>
                          <span style={{fontSize:10,padding:"1px 6px",borderRadius:8,background:STATUS[inv.status].bg,color:STATUS[inv.status].c,fontWeight:500}}>{STATUS[inv.status].label}</span>
                          {inv.notes.length>0 && <span style={{fontSize:10,padding:"1px 6px",borderRadius:8,background:C.amberL,color:C.amber}}><i className="ti ti-note" style={{fontSize:10}}/> {inv.notes.length}</span>}
                          {inv.pdfPath && <span style={{fontSize:10,padding:"1px 6px",borderRadius:8,background:C.purpleL,color:C.purple,cursor:"pointer"}} onClick={e=>{e.stopPropagation();loadPdfForViewer(inv);}}><i className="ti ti-eye" style={{fontSize:10}}/> PDF {blobMap[inv.id]?"(cached)":"(Yandex)"}</span>}
                          {inv.syncedAt && <span style={{fontSize:10,color:C.gray,opacity:.7}}>sync {fmtD(inv.syncedAt.split("T")[0])}</span>}
                        </div>
                        <p style={{margin:"0 0 2px",fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inv.client}</p>
                        <p style={{margin:0,fontSize:11,color:"var(--color-text-secondary)"}}>Emessa {fmtD(inv.date)} · Scad. {inv.due?fmtD(inv.due):"—"}</p>
                      </div>
                      <div style={{textAlign:"right",minWidth:100}}>

                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ══ CLIENTI (anagrafica da cartelle) ══ */}
          {tab==="clienti" && (
            <div>
              {folderClients.length>0 ? (()=>{
                const q = cliFilter.trim().toLowerCase();
                const list = q ? folderClients.filter(c=>c.name.toLowerCase().includes(q)) : folderClients;

                    <div style={{background:C.purpleL,borderRadius:10,padding:"10px 12px"}}><p style={{margin:"0 0 2px",fontSize:10,color:C.purple,fontWeight:500}}>PROFORMA APERTE</p><p style={{margin:0,fontSize:19,fontWeight:600,color:C.purple}}>{totApe}</p></div>
                  </div>
                  <div style={{position:"relative",marginBottom:10}}>

                    {cliFilter && <button onClick={()=>setCliFilter("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--color-text-secondary)",cursor:"pointer",fontSize:15}}><i className="ti ti-x"/></button>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {list.map(cl=>{
                      const invs = invoices.filter(i=>i.client===cl.name);

                      const totEuro = invs.reduce((s,i)=>s+i.amount,0);

                      <div key={cl.name} style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:11,overflow:"hidden"}}>

                                <span style={{flex:1,minWidth:0,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={item.name}>{item.name}</span>

                            );

                          return (
                          <div style={{borderTop:"0.5px solid var(--color-border-tertiary)",padding:"10px 13px"}}>

                <p style={{margin:"0 0 10px",fontSize:12,color:"var(--color-text-secondary)"}}>Legge le proforma 2026 da Yandex (con AI Haiku) ed estrae cliente · data · periodo · importo, poi le incrocia con l'Excel per trovare gli scostamenti. Costo stimato ~€0,003 per documento.</p>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>

                    <i className={`ti ${recoStatus==="running"?"ti-loader-2 ti-spin":"ti-scan"}`}/>{recoStatus==="running"?"Lettura in corso...":"Avvia riconciliazione"}

                const miss=fuori.filter(r=>!r.state);

                const nPagate=recoRows.filter(r=>r.state==="paid").length;
                const view = recoFilter==="mancanti" ? fuori : recoRows;
                return (<>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:12}}>

                    <div style={{background:"var(--color-surface)",border:`1px solid ${S.warn}55`,borderRadius:12,padding:"10px 12px",boxShadow:"var(--shadow-card)"}}><p style={{margin:"0 0 2px",fontSize:10,color:S.warn,fontWeight:600}}>IMPORTO FUORI EXCEL</p><p style={{margin:0,fontSize:17,fontWeight:700,color:S.warn}}>{fmt(missTot)}</p></div>
                  </div>

                        {r.state ? (

                          <button onClick={()=>setRecoRowState(r,"paid")} title="Segna pagata" style={{padding:"4px 7px",background:S.good+"18",border:`1px solid ${S.good}44`,borderRadius:6,fontSize:11,cursor:"pointer",color:S.good,display:"flex",alignItems:"center",gap:3}}><i className="ti ti-check"/></button>

                        </>)}
                      </div>
                      );
                    })}
                    {view.length===0 && <p style={{textAlign:"center",fontSize:12,color:"var(--color-text-secondary)",padding:18}}>Nessuna proforma in questa vista.</p>}
                  </div>

              </div>

              {(()=>{
                const openInv = invoices.filter(isOpen);
                // ─ Cash flow: incassi previsti prossimi 6 mesi (per mese di scadenza) ─
                const mLabels = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
                const cf = [];
                let scadutoNonStorico = 0;
                openInv.forEach(inv=>{
                  const d = daysOverdue(inv); const res = inv.amount-inv.paid;
                  if (d!=null && d>730) return;               // storico: escluso dal cashflow
                  if (d!=null && d>0) scadutoNonStorico += res; // già scaduto (incassabile)
                });
                for (let k=0;k<6;k++){
                  const dt = new Date(_today.getFullYear(), _today.getMonth()+k, 1);
                  const mEnd = new Date(_today.getFullYear(), _today.getMonth()+k+1, 1);
                  let v=0;
                  openInv.forEach(inv=>{
                    if(!inv.due) return; const due=new Date(inv.due);
                    const od=daysOverdue(inv); if(od!=null&&od>730) return;
                    if(due>=dt && due<mEnd && (od==null||od<=0)) v+=inv.amount-inv.paid;
                  });
                  cf.push({ label:`${mLabels[dt.getMonth()]}`, value:v, color:S.slate });
                }
                const cfSeries = [{label:"Scaduto",value:scadutoNonStorico,color:S.warn}, ...cf];
                // ─ Aging crediti aperti ─
                const buckets = [
                  {label:"Corrente",max:0,color:S.good,v:0},
                  {label:"1-30g",max:30,color:S.mute,v:0},
                  {label:"31-60g",max:60,color:S.slate,v:0},
                  {label:"61-90g",max:90,color:S.slateD,v:0},
                  {label:"91-180g",max:180,color:S.ink,v:0},
                  {label:"180g-24m",max:730,color:S.warn,v:0},
                  {label:">24m",max:99999,color:S.warnD,v:0},
                ];
                openInv.forEach(inv=>{
                  const d=daysOverdue(inv); const res=inv.amount-inv.paid;
                  if(d==null||d<=0){ buckets[0].v+=res; return; }
                  for(const b of buckets.slice(1)){ if(d<=b.max){ b.v+=res; break; } }
                });
                const agingSeries = buckets.map(b=>({label:b.label,value:b.v,color:b.color}));
                // ─ KPI ─
                const tasso = totale>0?Math.round((incassato/totale)*100):0;
                const pctScaduto = residuo>0?Math.round(((scadutiV+storicoV)/residuo)*100):0;
                // DSO approssimato: media giorni scaduto pesata sui crediti aperti
                let wDays=0, wSum=0;
                openInv.forEach(inv=>{ const d=daysOverdue(inv); const res=inv.amount-inv.paid; if(d!=null){ wDays+=Math.max(0,d)*res; wSum+=res; } });
                const dso = wSum>0?Math.round(wDays/wSum):0;
                // distribuzione per stato (valore residuo)
                const distRows = [
                  {label:"In attesa",value:invoices.filter(i=>i.status==="attesa").reduce((s,i)=>s+(i.amount-i.paid),0),color:S.slate},
                  {label:"Parziale", value:invoices.filter(i=>i.status==="parziale").reduce((s,i)=>s+(i.amount-i.paid),0),color:S.mute},
                  {label:"Scaduto",  value:scadutiV,color:S.warn},
                  {label:"Storico >24m",value:storicoV,color:S.warnD},
                ].map(r=>({...r,display:fmt(r.value)}));
                // top clienti per residuo
                const byClient={};
                openInv.forEach(inv=>{ const k=inv.client||"—"; byClient[k]=(byClient[k]||0)+(inv.amount-inv.paid); });
                const topRows = Object.entries(byClient).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v])=>({label:k,value:v,display:fmt(v),color:S.slate}));
                const kpis = [
                  {l:"DSO medio",v:`${dso} gg`,c:S.slateD},
                  {l:"Tasso incasso",v:`${tasso}%`,c:S.good},
                  {l:"% Scaduto",v:`${pctScaduto}%`,c:S.warn},
                  {l:"Crediti aperti",v:openInv.length,c:S.slate},
                ];
                const hasData = openInv.length>0 || invoices.length>0;
                if(!hasData) return <div style={{textAlign:"center",padding:"30px 20px",fontSize:12,color:"var(--color-text-secondary)"}}>Nessun dato. Leggi gli importi delle proforma (tab Clienti) per popolare le analisi.</div>;
                return (<>
                  {/* CASH FLOW */}
                  <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:12}}><i className="ti ti-trending-up" style={{fontSize:17,color:S.slateD}}/><h3 style={{margin:0,fontSize:13,fontWeight:600}}>Cash Flow · incassi previsti</h3></div>
                    <VBars series={cfSeries} height={150}/>
                    <p style={{margin:"10px 0 0",fontSize:10,color:"var(--color-text-secondary)",textAlign:"center"}}>Residuo da incassare per mese di scadenza · "Scaduto" = già esigibile (storico >24m escluso)</p>
                  </div>
                  {/* AGING */}
                  <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:12}}><i className="ti ti-clock-pause" style={{fontSize:17,color:S.warn}}/><h3 style={{margin:0,fontSize:13,fontWeight:600}}>Aging crediti · anzianità</h3></div>
                    <VBars series={agingSeries} height={140}/>
                  </div>
                  {/* KPI */}
                  <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:12}}><i className="ti ti-chart-bar" style={{fontSize:17,color:S.good}}/><h3 style={{margin:0,fontSize:13,fontWeight:600}}>KPI pagamenti</h3></div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8,marginBottom:14}}>
                      {kpis.map(k=>(
                        <div key={k.l} style={{background:"var(--color-background-secondary)",borderRadius:9,padding:"9px 11px"}}>
                          <p style={{margin:"0 0 2px",fontSize:10,color:"var(--color-text-secondary)",fontWeight:500}}>{k.l}</p>
                          <p style={{margin:0,fontSize:17,fontWeight:600,color:k.c}}>{k.v}</p>
                        </div>
                      ))}
                    </div>
                    <p style={{margin:"0 0 7px",fontSize:11,fontWeight:600,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:.3}}>Distribuzione crediti per stato</p>
                    <HBars rows={distRows}/>
                    <p style={{margin:"14px 0 7px",fontSize:11,fontWeight:600,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:.3}}>Top clienti per residuo</p>
                    {topRows.length>0 ? <HBars rows={topRows}/> : <p style={{fontSize:11,color:"var(--color-text-secondary)"}}>Nessun credito aperto.</p>}
                  </div>
                </>);
              })()}
              <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                <h3 style={{margin:"0 0 10px",fontSize:13,fontWeight:500}}>Approfondimento AI (testuale)</h3>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:8}}>
                  {[
                    {key:"cashflow", label:"Cash Flow 6 mesi", desc:"Proiezione + storico",  icon:"ti-trending-up", bg:C.blueL, c:C.blue},
                    {key:"solleciti",label:"Genera Solleciti",desc:"Per clienti morosi",    icon:"ti-mail",        bg:C.redL,  c:C.red},
                    {key:"analisi",  label:"Analisi KPI",    desc:"DSO, tasso incasso",     icon:"ti-chart-bar",   bg:C.greenL,c:C.green},
                  ].map(a=>(
                    <button key={a.key} onClick={()=>analyzeAI(a.key)} disabled={aiLoading} style={{padding:"11px 12px",background:a.bg,border:`1px solid ${a.c}33`,borderRadius:9,cursor:aiLoading?"wait":"pointer",textAlign:"left",opacity:aiLoading?.6:1}}>
                      <i className={`ti ${a.icon}`} style={{fontSize:18,color:a.c,display:"block",marginBottom:5}}/>
                      <p style={{margin:"0 0 1px",fontSize:12,fontWeight:500,color:a.c}}>{a.label}</p>
                      <p style={{margin:0,fontSize:10,color:a.c,opacity:.8}}>{a.desc}</p>
                    </button>
                  ))}
                </div>
              </div>
              {aiLoading && <div style={{padding:14,textAlign:"center",fontSize:12,color:"var(--color-text-secondary)",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}><i className="ti ti-loader-2"/>Analisi AI in corso...</div>}
              {aiResult && !aiLoading && (
                <div style={{background:"var(--color-background-primary)",border:`1px solid ${C.blue}44`,borderRadius:12,padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontSize:12,fontWeight:500,color:C.blue,display:"flex",alignItems:"center",gap:5}}><i className="ti ti-sparkles"/>Risultato</span>
                    <button onClick={()=>setAiResult("")} style={{background:"none",border:"none",color:"var(--color-text-secondary)",cursor:"pointer"}}><i className="ti ti-x"/></button>
                  </div>
                  <pre style={{margin:0,fontSize:12,lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:"inherit"}}>{aiResult}</pre>
                </div>
              )}
              <div style={{marginTop:10,background:"var(--color-background-secondary)",borderRadius:10,padding:"12px 14px"}}>
                <button onClick={exportCSV} style={{padding:"7px 14px",background:C.greenL,color:C.green,border:`1px solid ${C.green}33`,borderRadius:7,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontWeight:500}}><i className="ti ti-file-spreadsheet"/>Esporta Excel (.xlsx)</button>
              </div>
            </div>
          )}

          {/* ══ OCR NOTE ══ */}
          {tab==="ocr" && (
            <div>
              <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                <h3 style={{margin:"0 0 4px",fontSize:13,fontWeight:500}}>Note a mano e testo scansionato</h3>
                <p style={{margin:"0 0 10px",fontSize:11,color:"var(--color-text-secondary)"}}>Incolla testo trascritto o output OCR grezzo. L'AI struttura le informazioni di pagamento.</p>
                <textarea value={ocrText} onChange={e=>setOcrText(e.target.value)} rows={5} placeholder={"Esempio:\n\"Cliente Beta ha chiamato, conferma saldo 6.500€ entro 30/05 via bonifico. Accordo sig. Rossi.\""} style={{width:"100%",padding:"7px 9px",borderRadius:8,border:"0.5px solid var(--color-border-secondary)",fontSize:12,lineHeight:1.6,resize:"vertical",boxSizing:"border-box"}}/>
                <div style={{display:"flex",gap:6,marginTop:7}}>
                  <button onClick={analyzeOcr} disabled={ocrLoading||!ocrText.trim()} style={{padding:"6px 14px",background:C.blue,color:"white",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:4,opacity:ocrLoading?.6:1}}>
                    {ocrLoading?<><i className="ti ti-loader-2"/>Elaboro...</>:<><i className="ti ti-scan"/>Analizza</>}
                  </button>
                  <button onClick={()=>{setOcrText("");setOcrResult("");}} style={{padding:"6px 10px",background:"transparent",border:"0.5px solid var(--color-border-tertiary)",borderRadius:7,fontSize:12,cursor:"pointer",color:"var(--color-text-secondary)"}}>Cancella</button>
                </div>
              </div>
              {ocrResult && !ocrLoading && (
                <div style={{background:C.amberL,border:`1px solid ${C.amber}44`,borderRadius:12,padding:"12px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><i className="ti ti-note-off" style={{color:C.amber,fontSize:15}}/><span style={{fontSize:12,fontWeight:500,color:C.amber}}>Informazioni estratte</span></div>
                  <pre style={{margin:0,fontSize:11,lineHeight:1.7,color:C.coral,whiteSpace:"pre-wrap",fontFamily:"inherit"}}>{ocrResult}</pre>
                </div>
              )}
            </div>
          )}

          {/* ══ PDF VIEWER ══ */}
          {tab==="viewer" && viewerInv && blobMap[viewerInv.id] && (
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <i className="ti ti-file-type-pdf" style={{fontSize:18,color:C.purple}}/>
                  <div>
                    <p style={{margin:0,fontSize:13,fontWeight:500,color:C.purple}}>{blobMap[viewerInv.id].name}</p>
                    {viewerInv.id!=="__preview__" && <p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)"}}>{viewerInv.client}</p>}
                  </div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <a href={blobMap[viewerInv.id].url} download={blobMap[viewerInv.id].name} style={{padding:"5px 12px",background:C.purpleL,color:C.purple,border:`1px solid ${C.purple}33`,borderRadius:7,fontSize:11,textDecoration:"none",display:"flex",alignItems:"center",gap:4}}><i className="ti ti-download"/>Scarica</a>
                  <button onClick={()=>{setViewerInv(null);setTab("fatture");}} style={{padding:"5px 10px",background:"transparent",border:"0.5px solid var(--color-border-tertiary)",borderRadius:7,fontSize:11,cursor:"pointer",color:"var(--color-text-secondary)",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-x"/>Chiudi</button>
                </div>
              </div>
              <div style={{border:`1px solid ${C.purple}44`,borderRadius:12,overflow:"hidden",background:"#525659"}}>
                <iframe src={blobMap[viewerInv.id].url} title="Visualizzatore PDF" style={{width:"100%",height:640,border:"none",display:"block"}}/>
              </div>
              <p style={{margin:"7px 0 0",fontSize:10,color:"var(--color-text-secondary)",textAlign:"center"}}>Se il PDF non si visualizza nel browser, usa il pulsante Scarica.</p>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CEDDashboard />);
  </script>
</body>
</html>
