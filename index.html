                            </p>
                          </div>
                          {resid>0 && <span style={{fontSize:13,fontWeight:600,color:C.amber}}>{fmt(resid)}</span>}
                          <i className={`ti ti-chevron-${open?"down":"right"}`} style={{fontSize:14,color:"var(--color-text-secondary)"}}/>
                        </div>
                        {open && (()=>{
                          const cf = cliFiles[cl.name];
                          const fileRow = (item, paid)=>{
                            const inv = invs.find(i=>i.pdfPath===item.path);
                            return (
                              <div key={item.path} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                                <i className="ti ti-file-type-pdf" style={{fontSize:15,color:paid?C.green:C.amber,flexShrink:0}}/>
                                <span style={{flex:1,minWidth:0,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={item.name}>{item.name}</span>
                                {inv && inv.amount>0 && <span style={{fontSize:11,fontWeight:500,color:paid?C.green:C.amber}}>{fmt(inv.amount-(paid?inv.amount:inv.paid)||inv.amount)}</span>}
                                <button onClick={()=>viewYdFile(item, cl.name)} disabled={pdfLoading} style={{padding:"3px 8px",background:C.purpleL,color:C.purple,border:`1px solid ${C.purple}33`,borderRadius:6,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-eye" style={{fontSize:11}}/>Vedi</button>
                                {!paid && <button onClick={()=>parsePdf(item)} disabled={pdfLoading} style={{padding:"3px 8px",background:C.blueL,color:C.blue,border:`1px solid ${C.blue}33`,borderRadius:6,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-sparkles" style={{fontSize:11}}/>AI</button>}
                              </div>
                            );
                          };
                          return (
                          <div style={{borderTop:"0.5px solid var(--color-border-tertiary)",padding:"10px 13px"}}>
                            {!cf || cf.loading ? (
                              <p style={{textAlign:"center",fontSize:11,color:"var(--color-text-secondary)",padding:"8px 0"}}><i className="ti ti-loader-2 ti-spin" style={{marginRight:5}}/>Carico proforma da Yandex...</p>
                            ) : (<>
                              {/* DA PAGARE */}
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                                <span style={{fontSize:11,fontWeight:600,color:C.amber,textTransform:"uppercase",letterSpacing:.3}}><i className="ti ti-clock" style={{marginRight:4}}/>Da pagare ({cf.open.length})</span>
                                {cf.open.length>0 && <button onClick={()=>readClientAmounts(cl)} disabled={cliAiLoading===cl.name} style={{padding:"3px 9px",background:cliAiLoading===cl.name?C.grayL:C.blue,color:cliAiLoading===cl.name?C.gray:"white",border:"none",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:500}}>{cliAiLoading===cl.name?"Leggo...":"Leggi importi AI"}</button>}
                              </div>
                              {cf.open.length===0 ? <p style={{fontSize:11,color:"var(--color-text-secondary)",margin:"0 0 8px"}}>Nessuna proforma da pagare.</p> : cf.open.map(it=>fileRow(it,false))}
                              {resid>0 && <div style={{textAlign:"right",fontSize:12,color:C.amber,margin:"6px 0 0"}}>Residuo: <b>{fmt(resid)}</b></div>}

                              {/* PAGATE */}
                              <div style={{marginTop:12,marginBottom:4}}>
                                <span style={{fontSize:11,fontWeight:600,color:C.green,textTransform:"uppercase",letterSpacing:.3}}><i className="ti ti-circle-check" style={{marginRight:4}}/>Pagate ({cf.paid.length})</span>
                              </div>
                              {cf.paid.length===0 ? <p style={{fontSize:11,color:"var(--color-text-secondary)",margin:0}}>Nessuna proforma pagata.</p> : cf.paid.map(it=>fileRow(it,true))}
                            </>)}
                          </div>
                          );
                        })()}
                      </div>
                      );
                    })}
                    {list.length===0 && <p style={{textAlign:"center",fontSize:12,color:"var(--color-text-secondary)",padding:20}}>Nessun cliente trovato per "{cliFilter}".</p>}
                  </div>
                </>);
              })() : (
                <div style={{textAlign:"center",padding:"40px 20px"}}>
                  <i className="ti ti-users" style={{fontSize:36,color:"var(--color-text-secondary)",opacity:.4}}/>
                  <p style={{margin:"12px 0 4px",fontSize:14,fontWeight:500}}>Anagrafica vuota</p>
                  <p style={{margin:"0 0 14px",fontSize:12,color:"var(--color-text-secondary)"}}>Lancia la <b>Scansione anagrafica</b> dalla tab Sync Auto per costruire la lista clienti dalle cartelle Yandex (veloce, senza AI).</p>
                  <button onClick={()=>setTab("sync")} style={{padding:"8px 16px",background:C.teal,color:"white",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500}}>Vai a Sync Auto</button>
                </div>
              )}
            </div>
          )}

          {/* ══ PAGAMENTI ══ */}
          {tab==="pagamenti" && (
            <div>
              <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                <h3 style={{margin:"0 0 10px",fontSize:13,fontWeight:500}}>Registro incassi</h3>
                {invoices.filter(i=>i.payments.length>0).flatMap(i=>i.payments.map(p=>({...p,client:i.client,invoice:i.id}))).sort((a,b)=>new Date(b.date)-new Date(a.date)).map((p,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",padding:"7px 0",borderBottom:"0.5px solid var(--color-border-tertiary)",gap:9}}>
                    <div style={{width:30,height:30,borderRadius:7,background:C.greenL,display:"flex",alignItems:"center",justifyContent:"center"}}><i className="ti ti-arrow-down" style={{color:C.green,fontSize:13}}/></div>
                    <div style={{flex:1}}><p style={{margin:0,fontSize:12,fontWeight:500}}>{p.client}</p><p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)"}}>{p.invoice} · {p.method} · {fmtD(p.date)}</p></div>
                    <span style={{fontSize:13,fontWeight:500,color:C.green}}>{fmt(p.amount)}</span>
                  </div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div style={{background:C.greenL,borderRadius:12,padding:"12px 14px"}}><p style={{margin:"0 0 2px",fontSize:10,color:C.teal,fontWeight:500}}>INCASSATO</p><p style={{margin:0,fontSize:20,fontWeight:500,color:C.green}}>{fmt(incassato)}</p></div>
                <div style={{background:C.amberL,borderRadius:12,padding:"12px 14px"}}><p style={{margin:"0 0 2px",fontSize:10,color:C.amber,fontWeight:500}}>DA INCASSARE</p><p style={{margin:0,fontSize:20,fontWeight:500,color:C.amber}}>{fmt(residuo)}</p></div>
              </div>
            </div>
          )}

          {/* ══ YANDEX ══ */}
          {tab==="yandex" && (
            <div>
              <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
                  <i className="ti ti-cloud" style={{fontSize:18,color:C.blue}}/><h3 style={{margin:0,fontSize:13,fontWeight:500}}>Connessione Yandex Disk</h3>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:6,marginBottom:8}}>
                  <input type="password" value={ydToken} onChange={e=>setYdToken(e.target.value)} placeholder="OAuth token Yandex..." style={{padding:"6px 9px",borderRadius:7,border:"0.5px solid var(--color-border-secondary)",fontSize:12,fontFamily:"monospace"}}/>
                  <button onClick={saveToken} style={{padding:"6px 14px",background:C.blue,color:"white",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:500}}>Connetti</button>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>Cartella sync:</span>
                  <input value={ydSyncPath} onChange={e=>setYdSyncPath(e.target.value)} style={{flex:1,padding:"4px 8px",borderRadius:7,border:"0.5px solid var(--color-border-secondary)",fontSize:12,fontFamily:"monospace"}} placeholder="/Proforma"/>
                  <button onClick={()=>{LS.setRaw("yd_sync_path",ydSyncPath);}} style={{padding:"4px 10px",background:C.tealL,color:C.teal,border:`1px solid ${C.teal}33`,borderRadius:7,fontSize:11,cursor:"pointer"}}>Salva</button>
                </div>
                {ydError && <p style={{margin:"7px 0 0",fontSize:11,color:C.red,background:C.redL,padding:"5px 9px",borderRadius:6}}><i className="ti ti-alert-circle" style={{marginRight:4}}/>{ydError}</p>}
              </div>

              {ydToken && <>
                <div style={{display:"flex",alignItems:"center",gap:3,marginBottom:8,padding:"5px 10px",background:"var(--color-background-secondary)",borderRadius:8,border:"0.5px solid var(--color-border-tertiary)",flexWrap:"wrap"}}>
                  <i className="ti ti-folder" style={{fontSize:12,color:C.blue}}/>
                  {ydCrumb.map((b,i)=>(
                    <span key={i} style={{display:"flex",alignItems:"center",gap:2}}>
                      {i>0 && <span style={{color:"var(--color-text-secondary)",fontSize:11}}>›</span>}
                      <button onClick={()=>{ const p="/"+ydCrumb.slice(1,i+1).join("/"); navTo(p||"/"); }} style={{background:"none",border:"none",color:i===ydCrumb.length-1?C.blue:"var(--color-text-secondary)",fontSize:11,cursor:"pointer",padding:"0 2px",fontWeight:i===ydCrumb.length-1?500:400}}>{b}</button>
                    </span>
                  ))}
                  <button onClick={()=>ydBrowse(ydPath,ydToken)} style={{marginLeft:"auto",background:"none",border:"none",color:C.blue,cursor:"pointer",fontSize:13}}><i className={`ti ti-refresh ${ydLoading?"ti-spin":""}`}/></button>
                </div>

                <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,overflow:"hidden",marginBottom:12}}>
                  {ydLoading && <div style={{padding:18,textAlign:"center",fontSize:12,color:"var(--color-text-secondary)"}}><i className="ti ti-loader-2" style={{marginRight:5}}/>Caricamento...</div>}
                  {!ydLoading && ydItems.length===0 && <div style={{padding:18,textAlign:"center",fontSize:12,color:"var(--color-text-secondary)"}}>Nessun PDF trovato. <button onClick={()=>ydBrowse("/",ydToken)} style={{color:C.blue,background:"none",border:"none",cursor:"pointer",fontSize:12}}>Vai alla radice</button></div>}
                  {!ydLoading && ydItems.map((item,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",padding:"9px 12px",borderBottom:"0.5px solid var(--color-border-tertiary)",gap:9,cursor:item.type==="dir"?"pointer":"default"}}
                      onClick={item.type==="dir"?()=>{navTo(item.path); setYdCrumb(p=>[...p,item.name]);}:undefined}>
                      <div style={{width:30,height:30,borderRadius:7,background:item.type==="dir"?C.blueL:C.purpleL,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <i className={`ti ${item.type==="dir"?"ti-folder":"ti-file-type-pdf"}`} style={{fontSize:14,color:item.type==="dir"?C.blue:C.purple}}/>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{margin:0,fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</p>
                        {item.type==="file" && <p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)"}}>{item.size?(Math.round(item.size/1024)+"KB"):"—"} · {item.modified?fmtD(item.modified.split("T")[0]):"—"}</p>}
                      </div>
                      {item.type==="file" && (
                        <div style={{display:"flex",gap:5}}>
                          <button onClick={e=>{e.stopPropagation();parsePdf(item);}} disabled={pdfLoading} style={{padding:"5px 10px",background:pdfLoading?C.grayL:C.purpleL,color:pdfLoading?C.gray:C.purple,border:`1px solid ${C.purple}33`,borderRadius:7,fontSize:11,cursor:pdfLoading?"wait":"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:4}}>
                            {pdfLoading?<><i className="ti ti-loader-2" style={{fontSize:11}}/>Leggo...</>:<><i className="ti ti-scan" style={{fontSize:11}}/>Leggi AI</>}
                          </button>
                        </div>
                      )}
                      {item.type==="dir" && <i className="ti ti-chevron-right" style={{fontSize:13,color:"var(--color-text-secondary)"}}/>}
                    </div>
                  ))}
                </div>

                {pdfResult && (
                  <div style={{background:"var(--color-background-primary)",border:`1px solid ${C.purple}44`,borderRadius:12,padding:"14px 16px"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                      <span style={{fontSize:13,fontWeight:500,color:C.purple,display:"flex",alignItems:"center",gap:6}}><i className="ti ti-sparkles"/>Estratto: {pdfResult.fileName}</span>
                      <div style={{display:"flex",gap:6}}>
                        {!pdfResult.data.parse_error && <button onClick={importInvoice} style={{padding:"5px 12px",background:C.blue,color:"white",border:"none",borderRadius:7,fontSize:11,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:4}}><i className="ti ti-plus"/>Importa</button>}
                        <button onClick={()=>{setViewerInv({id:"__preview__",pdfPath:pdfResult.path}); setBlobMap(m=>({...m,__preview__:{url:pdfResult.url,name:pdfResult.fileName}})); setTab("viewer");}} style={{padding:"5px 10px",background:C.purpleL,color:C.purple,border:`1px solid ${C.purple}33`,borderRadius:7,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><i className="ti ti-eye"/>Visualizza</button>
                        <button onClick={()=>setPdfResult(null)} style={{background:"none",border:"none",color:"var(--color-text-secondary)",cursor:"pointer"}}><i className="ti ti-x"/></button>
                      </div>
                    </div>
                    {pdfResult.data.parse_error ? <pre style={{margin:0,fontSize:11,whiteSpace:"pre-wrap",fontFamily:"inherit"}}>{pdfResult.data.raw_text}</pre> : (
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                        {[["Tipo",pdfResult.data.tipo],["Numero",pdfResult.data.numero],["Data emissione",pdfResult.data.data_emissione],["Scadenza",pdfResult.data.data_scadenza],["Cliente",pdfResult.data.cliente?.ragione_sociale],["P.IVA",pdfResult.data.cliente?.piva],["Totale",pdfResult.data.importo_totale!=null?fmt(pdfResult.data.importo_totale):null],["Imponibile",pdfResult.data.importo_imponibile!=null?fmt(pdfResult.data.importo_imponibile):null],["IVA",pdfResult.data.importo_iva!=null?fmt(pdfResult.data.importo_iva):null],["Metodo pag.",pdfResult.data.metodo_pagamento_indicato],["Affidabilità OCR",pdfResult.data.affidabilita_estrazione]].filter(([,v])=>v!=null&&v!=="").map(([l,v],i)=>(
                          <div key={i} style={{padding:"5px 8px",background:"var(--color-background-secondary)",borderRadius:7}}>
                            <p style={{margin:"0 0 1px",fontSize:10,color:"var(--color-text-secondary)"}}>{l}</p>
                            <p style={{margin:0,fontSize:12,fontWeight:500}}>{v}</p>
                          </div>
                        ))}
                      </div>
                    )}
                    {pdfResult.data.righe?.length>0 && (
                      <div style={{marginTop:8}}>
                        <p style={{margin:"0 0 4px",fontSize:11,fontWeight:500,color:"var(--color-text-secondary)"}}>Righe</p>
                        {pdfResult.data.righe.map((r,i)=>(
                          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"3px 8px",background:"var(--color-background-secondary)",borderRadius:5,marginBottom:2,fontSize:11}}>
                            <span>{r.descrizione}</span><span style={{fontWeight:500}}>{r.totale!=null?fmt(r.totale):""}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </>}
            </div>
          )}

          {/* ══ SYNC AUTO ══ */}
          {tab==="sync" && (
            <div>
              <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <i className="ti ti-refresh" style={{fontSize:18,color:C.blue}}/><h3 style={{margin:0,fontSize:13,fontWeight:500}}>Sincronizzazione automatica</h3>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:10,marginBottom:14}}>
                  <div style={{padding:"10px 14px",background:autoSync?C.greenL:C.grayL,borderRadius:10,border:`1px solid ${autoSync?C.green:C.gray}22`}}>
                    <p style={{margin:"0 0 6px",fontSize:11,fontWeight:500,color:autoSync?C.green:C.gray}}>SYNC GIORNALIERA</p>
                    <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
                      <div onClick={()=>{ const v=!autoSync; setAutoSync(v); LS.set("ced_auto_sync",v); }} style={{width:36,height:20,borderRadius:10,background:autoSync?C.green:C.grayL,border:`1px solid ${autoSync?C.green:C.gray}44`,position:"relative",cursor:"pointer",transition:"background .2s"}}>
                        <div style={{position:"absolute",top:2,left:autoSync?17:2,width:16,height:16,borderRadius:8,background:autoSync?"white":C.gray,transition:"left .2s"}}/>
                      </div>
                      <span style={{fontSize:12,color:autoSync?C.green:C.gray,fontWeight:500}}>{autoSync?"Attiva":"Disattiva"}</span>
                    </label>
                    <p style={{margin:"6px 0 0",fontSize:10,color:"var(--color-text-secondary)"}}>Scansione ricorsiva di "{ydSyncPath}" e sottocartelle (escluse le cartelle "pagato"). Legge note/acconti e calcola il residuo. Controllo ogni ora, una volta al giorno.</p>
                  </div>
                  <div style={{padding:"10px 14px",background:C.blueL,borderRadius:10,border:`1px solid ${C.blue}22`}}>
                    <p style={{margin:"0 0 2px",fontSize:11,fontWeight:500,color:C.blue}}>ULTIMA SYNC</p>
                    <p style={{margin:"0 0 6px",fontSize:13,fontWeight:500,color:C.blue}}>{lastSync?new Date(lastSync).toLocaleString("it-IT"):"Mai eseguita"}</p>
                    <p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)"}}>Prossima: {autoSync&&lastSync?new Date(new Date(lastSync.split("T")[0]+"T00:00:00").getTime()+86400000).toLocaleDateString("it-IT"):"—"}</p>
                  </div>
                </div>
                <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                  <button onClick={scanAnagrafica} disabled={scanStatus==="running"||!ydToken} style={{padding:"8px 18px",background:scanStatus==="running"?C.grayL:C.teal,color:scanStatus==="running"?C.gray:"white",border:"none",borderRadius:8,fontSize:12,cursor:scanStatus==="running"||!ydToken?"not-allowed":"pointer",fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                    <i className={`ti ti-users ${scanStatus==="running"?"ti-spin":""}`}/>{scanStatus==="running"?"Scansione in corso...":"Scansiona anagrafica (veloce)"}
                  </button>
                  {scanStatus==="running" && <button onClick={()=>{scanRef.current.stop=true; setScanStatus("idle");}} style={{padding:"8px 14px",background:C.redL,color:C.red,border:`1px solid ${C.red}33`,borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500}}>Stop</button>}
                  <label style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"var(--color-text-secondary)",cursor:"pointer"}}>
                    <input type="checkbox" checked={excludeEx} onChange={e=>{setExcludeEx(e.target.checked); LS.set("ced_exclude_ex",e.target.checked);}}/> Escludi "EX CLIENTI"
                  </label>
                </div>
                {/* Lettura massiva importi */}
                <div style={{display:"flex",gap:7,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
                  <button onClick={readAllAmounts} disabled={readAllStatus==="running"||!ydToken||folderClients.length===0} style={{padding:"8px 16px",background:readAllStatus==="running"?C.grayL:C.purple,color:readAllStatus==="running"?C.gray:"white",border:"none",borderRadius:8,fontSize:12,cursor:(readAllStatus==="running"||folderClients.length===0)?"not-allowed":"pointer",fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                    <i className={`ti ti-sparkles ${readAllStatus==="running"?"ti-spin":""}`}/>{readAllStatus==="running"?"Lettura importi...":"Leggi importi di TUTTI (da pagare)"}
                  </button>
                  {readAllStatus==="running" && <button onClick={()=>{readAllRef.current.stop=true; setReadAllStatus("idle");}} style={{padding:"8px 14px",background:C.redL,color:C.red,border:`1px solid ${C.red}33`,borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500}}>Stop</button>}
                  {readAllStatus==="running" && readAllProg.total>0 && <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>{readAllProg.done}/{readAllProg.total} clienti · {readAllProg.cli}</span>}
                </div>
                {folderClients.length===0 && <p style={{margin:"6px 0 0",fontSize:10,color:"var(--color-text-secondary)"}}>Per la lettura massiva, esegui prima la <b>Scansione anagrafica</b>.</p>}
                <div style={{display:"flex",gap:7,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
                  <button onClick={runSync} disabled={syncStatus==="running"||!ydToken} style={{padding:"7px 14px",background:"transparent",color:C.blue,border:`1px solid ${C.blue}55`,borderRadius:8,fontSize:12,cursor:syncStatus==="running"||!ydToken?"not-allowed":"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:5}}>
                    <i className={`ti ti-sparkles ${syncStatus==="running"?"ti-spin":""}`}/>{syncStatus==="running"?"AI in corso...":"Lettura AI completa (lenta)"}
                  </button>
                  {syncStatus==="running" && <button onClick={()=>setSyncStatus("idle")} style={{padding:"7px 14px",background:C.redL,color:C.red,border:`1px solid ${C.red}33`,borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500}}>Annulla / Sblocca</button>}
                  <button onClick={()=>{setSyncLog([]); LS.set("ced_sync_log",[]);}} style={{padding:"7px 12px",background:"transparent",border:"0.5px solid var(--color-border-tertiary)",borderRadius:8,fontSize:12,cursor:"pointer",color:"var(--color-text-secondary)"}}>Pulisci log</button>
                </div>
                <div style={{display:"flex",gap:7,marginTop:8,flexWrap:"wrap"}}>
                  <button onClick={()=>{
                    if(!confirm("Eliminare le 6 proforma di esempio (PRF-2025-001…006)?")) return;
                    const sampleIds=["PRF-2025-001","PRF-2025-002","PRF-2025-003","PRF-2025-004","PRF-2025-005","PRF-2025-006"];
                    setInvoices(p=>p.filter(i=>!sampleIds.includes(i.id))); setSelected(null);
                  }} style={{padding:"7px 12px",background:C.amberL,color:C.amber,border:`1px solid ${C.amber}33`,borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:5}}>
                    <i className="ti ti-eraser"/> Cancella dati esempio
                  </button>
                  <button onClick={()=>{
                    if(!confirm("ATTENZIONE: eliminare TUTTE le proforma e ripartire da zero? Operazione irreversibile.")) return;
                    setInvoices([]); setSelected(null);
                  }} style={{padding:"7px 12px",background:C.redL,color:C.red,border:`1px solid ${C.red}33`,borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:5}}>
                    <i className="ti ti-trash"/> Svuota tutto
                  </button>
                </div>
                {!ydToken && <p style={{margin:"8px 0 0",fontSize:11,color:C.red}}>⚠ Configura il token Yandex nella tab Archivio prima di usare la sync.</p>}
              </div>
              {syncLog.length>0 && (
                <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px"}}>
                  <h3 style={{margin:"0 0 10px",fontSize:13,fontWeight:500}}>Log operazioni</h3>
                  <div style={{maxHeight:280,overflowY:"auto",fontFamily:"monospace",fontSize:11,lineHeight:1.8}}>
                    {syncLog.map((l,i)=>(
                      <div key={i} style={{display:"flex",gap:8,padding:"1px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                        <span style={{color:"var(--color-text-secondary)",minWidth:52}}>{l.ts}</span>
                        <span style={{color:logC[l.type]||"var(--color-text-primary)"}}>{l.msg}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <div style={{marginTop:12,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8}}>
                {[
                  {label:"PDF collegati",value:invoices.filter(i=>i.pdfPath).length,c:C.purple,bg:C.purpleL},
                  {label:"Sincronizzati",value:invoices.filter(i=>i.syncedAt).length,c:C.teal,bg:C.tealL},
                  {label:"Totale proforma",value:invoices.length,c:C.blue,bg:C.blueL},
                ].map(k=>(
                  <div key={k.label} style={{background:k.bg,borderRadius:10,padding:"10px 12px",border:`1px solid ${k.c}22`}}>
                    <p style={{margin:"0 0 2px",fontSize:10,color:k.c,fontWeight:500}}>{k.label}</p>
                    <p style={{margin:0,fontSize:20,fontWeight:500,color:k.c}}>{k.value}</p>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ══ AI REPORT / ANALISI ══ */}
          {tab==="ai" && (
            <div>
              {(()=>{
                const openInv = invoices.filter(isOpen);
                // ─ Cash flow: incassi previsti prossimi 6 mesi (per mese di scadenza) ─
                const mLabels = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
                const cf = [];
                let scadutoNonStorico = 0;
                openInv.forEach(inv=>{
                  const d = daysOverdue(inv); const res = inv.amount-inv.paid;
                  if (d!=null && d>730) return;               // storico: escluso dal cashflow
                  if (d!=null && d>0) scadutoNonStorico += res; // già scaduto (incassabile)
                });
                for (let k=0;k<6;k++){
                  const dt = new Date(_today.getFullYear(), _today.getMonth()+k, 1);
                  const mEnd = new Date(_today.getFullYear(), _today.getMonth()+k+1, 1);
                  let v=0;
                  openInv.forEach(inv=>{
                    if(!inv.due) return; const due=new Date(inv.due);
                    const od=daysOverdue(inv); if(od!=null&&od>730) return;
                    if(due>=dt && due<mEnd && (od==null||od<=0)) v+=inv.amount-inv.paid;
                  });
                  cf.push({ label:`${mLabels[dt.getMonth()]}`, value:v, color:C.blue });
                }
                const cfSeries = [{label:"Scaduto",value:scadutoNonStorico,color:C.red}, ...cf];
                // ─ Aging crediti aperti ─
                const buckets = [
                  {label:"Corrente",max:0,color:C.green,v:0},
                  {label:"1-30g",max:30,color:C.amber,v:0},
                  {label:"31-60g",max:60,color:C.amber,v:0},
                  {label:"61-90g",max:90,color:C.coral,v:0},
                  {label:"91-180g",max:180,color:C.red,v:0},
                  {label:"180g-24m",max:730,color:C.red,v:0},
                  {label:">24m",max:99999,color:C.coral,v:0},
                ];
                openInv.forEach(inv=>{
                  const d=daysOverdue(inv); const res=inv.amount-inv.paid;
                  if(d==null||d<=0){ buckets[0].v+=res; return; }
                  for(const b of buckets.slice(1)){ if(d<=b.max){ b.v+=res; break; } }
                });
                const agingSeries = buckets.map(b=>({label:b.label,value:b.v,color:b.color}));
                // ─ KPI ─
                const tasso = totale>0?Math.round((incassato/totale)*100):0;
                const pctScaduto = residuo>0?Math.round(((scadutiV+storicoV)/residuo)*100):0;
                // DSO approssimato: media giorni scaduto pesata sui crediti aperti
                let wDays=0, wSum=0;
                openInv.forEach(inv=>{ const d=daysOverdue(inv); const res=inv.amount-inv.paid; if(d!=null){ wDays+=Math.max(0,d)*res; wSum+=res; } });
                const dso = wSum>0?Math.round(wDays/wSum):0;
                // distribuzione per stato (valore residuo)
                const distRows = [
                  {label:"In attesa",value:invoices.filter(i=>i.status==="attesa").reduce((s,i)=>s+(i.amount-i.paid),0),color:C.blue},
                  {label:"Parziale", value:invoices.filter(i=>i.status==="parziale").reduce((s,i)=>s+(i.amount-i.paid),0),color:C.amber},
                  {label:"Scaduto",  value:scadutiV,color:C.red},
                  {label:"Storico >24m",value:storicoV,color:C.coral},
                ].map(r=>({...r,display:fmt(r.value)}));
                // top clienti per residuo
                const byClient={};
                openInv.forEach(inv=>{ const k=inv.client||"—"; byClient[k]=(byClient[k]||0)+(inv.amount-inv.paid); });
                const topRows = Object.entries(byClient).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v])=>({label:k,value:v,display:fmt(v),color:C.purple}));
                const kpis = [
                  {l:"DSO medio",v:`${dso} gg`,c:C.blue},
                  {l:"Tasso incasso",v:`${tasso}%`,c:C.green},
                  {l:"% Scaduto",v:`${pctScaduto}%`,c:C.red},
                  {l:"Crediti aperti",v:openInv.length,c:C.amber},
                ];
                const hasData = openInv.length>0 || invoices.length>0;
                if(!hasData) return <div style={{textAlign:"center",padding:"30px 20px",fontSize:12,color:"var(--color-text-secondary)"}}>Nessun dato. Leggi gli importi delle proforma (tab Clienti) per popolare le analisi.</div>;
                return (<>
                  {/* CASH FLOW */}
                  <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:12}}><i className="ti ti-trending-up" style={{fontSize:17,color:C.blue}}/><h3 style={{margin:0,fontSize:13,fontWeight:600}}>Cash Flow · incassi previsti</h3></div>
                    <VBars series={cfSeries} height={150}/>
                    <p style={{margin:"10px 0 0",fontSize:10,color:"var(--color-text-secondary)",textAlign:"center"}}>Residuo da incassare per mese di scadenza · "Scaduto" = già esigibile (storico >24m escluso)</p>
                  </div>
                  {/* AGING */}
                  <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:12}}><i className="ti ti-clock-pause" style={{fontSize:17,color:C.amber}}/><h3 style={{margin:0,fontSize:13,fontWeight:600}}>Aging crediti · anzianità</h3></div>
                    <VBars series={agingSeries} height={140}/>
                  </div>
                  {/* KPI */}
                  <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:12}}><i className="ti ti-chart-bar" style={{fontSize:17,color:C.green}}/><h3 style={{margin:0,fontSize:13,fontWeight:600}}>KPI pagamenti</h3></div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8,marginBottom:14}}>
                      {kpis.map(k=>(
                        <div key={k.l} style={{background:"var(--color-background-secondary)",borderRadius:9,padding:"9px 11px"}}>
                          <p style={{margin:"0 0 2px",fontSize:10,color:"var(--color-text-secondary)",fontWeight:500}}>{k.l}</p>
                          <p style={{margin:0,fontSize:17,fontWeight:600,color:k.c}}>{k.v}</p>
                        </div>
                      ))}
                    </div>
                    <p style={{margin:"0 0 7px",fontSize:11,fontWeight:600,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:.3}}>Distribuzione crediti per stato</p>
                    <HBars rows={distRows}/>
                    <p style={{margin:"14px 0 7px",fontSize:11,fontWeight:600,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:.3}}>Top clienti per residuo</p>
                    {topRows.length>0 ? <HBars rows={topRows}/> : <p style={{fontSize:11,color:"var(--color-text-secondary)"}}>Nessun credito aperto.</p>}
                  </div>
                </>);
              })()}
              <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                <h3 style={{margin:"0 0 10px",fontSize:13,fontWeight:500}}>Approfondimento AI (testuale)</h3>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:8}}>
                  {[
                    {key:"cashflow", label:"Cash Flow 6 mesi", desc:"Proiezione + storico",  icon:"ti-trending-up", bg:C.blueL, c:C.blue},
                    {key:"solleciti",label:"Genera Solleciti",desc:"Per clienti morosi",    icon:"ti-mail",        bg:C.redL,  c:C.red},
                    {key:"analisi",  label:"Analisi KPI",    desc:"DSO, tasso incasso",     icon:"ti-chart-bar",   bg:C.greenL,c:C.green},
                  ].map(a=>(
                    <button key={a.key} onClick={()=>analyzeAI(a.key)} disabled={aiLoading} style={{padding:"11px 12px",background:a.bg,border:`1px solid ${a.c}33`,borderRadius:9,cursor:aiLoading?"wait":"pointer",textAlign:"left",opacity:aiLoading?.6:1}}>
                      <i className={`ti ${a.icon}`} style={{fontSize:18,color:a.c,display:"block",marginBottom:5}}/>
                      <p style={{margin:"0 0 1px",fontSize:12,fontWeight:500,color:a.c}}>{a.label}</p>
                      <p style={{margin:0,fontSize:10,color:a.c,opacity:.8}}>{a.desc}</p>
                    </button>
                  ))}
                </div>
              </div>
              {aiLoading && <div style={{padding:14,textAlign:"center",fontSize:12,color:"var(--color-text-secondary)",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}><i className="ti ti-loader-2"/>Analisi AI in corso...</div>}
              {aiResult && !aiLoading && (
                <div style={{background:"var(--color-background-primary)",border:`1px solid ${C.blue}44`,borderRadius:12,padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontSize:12,fontWeight:500,color:C.blue,display:"flex",alignItems:"center",gap:5}}><i className="ti ti-sparkles"/>Risultato</span>
                    <button onClick={()=>setAiResult("")} style={{background:"none",border:"none",color:"var(--color-text-secondary)",cursor:"pointer"}}><i className="ti ti-x"/></button>
                  </div>
                  <pre style={{margin:0,fontSize:12,lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:"inherit"}}>{aiResult}</pre>
                </div>
              )}
              <div style={{marginTop:10,background:"var(--color-background-secondary)",borderRadius:10,padding:"12px 14px"}}>
                <button onClick={exportCSV} style={{padding:"7px 14px",background:C.greenL,color:C.green,border:`1px solid ${C.green}33`,borderRadius:7,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontWeight:500}}><i className="ti ti-table-export"/>Esporta CSV / Excel</button>
              </div>
            </div>
          )}

          {/* ══ OCR NOTE ══ */}
          {tab==="ocr" && (
            <div>
              <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                <h3 style={{margin:"0 0 4px",fontSize:13,fontWeight:500}}>Note a mano e testo scansionato</h3>
                <p style={{margin:"0 0 10px",fontSize:11,color:"var(--color-text-secondary)"}}>Incolla testo trascritto o output OCR grezzo. L'AI struttura le informazioni di pagamento.</p>
                <textarea value={ocrText} onChange={e=>setOcrText(e.target.value)} rows={5} placeholder={"Esempio:\n\"Cliente Beta ha chiamato, conferma saldo 6.500€ entro 30/05 via bonifico. Accordo sig. Rossi.\""} style={{width:"100%",padding:"7px 9px",borderRadius:8,border:"0.5px solid var(--color-border-secondary)",fontSize:12,lineHeight:1.6,resize:"vertical",boxSizing:"border-box"}}/>
                <div style={{display:"flex",gap:6,marginTop:7}}>
                  <button onClick={analyzeOcr} disabled={ocrLoading||!ocrText.trim()} style={{padding:"6px 14px",background:C.blue,color:"white",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:4,opacity:ocrLoading?.6:1}}>
                    {ocrLoading?<><i className="ti ti-loader-2"/>Elaboro...</>:<><i className="ti ti-scan"/>Analizza</>}
                  </button>
                  <button onClick={()=>{setOcrText("");setOcrResult("");}} style={{padding:"6px 10px",background:"transparent",border:"0.5px solid var(--color-border-tertiary)",borderRadius:7,fontSize:12,cursor:"pointer",color:"var(--color-text-secondary)"}}>Cancella</button>
                </div>
              </div>
              {ocrResult && !ocrLoading && (
                <div style={{background:C.amberL,border:`1px solid ${C.amber}44`,borderRadius:12,padding:"12px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><i className="ti ti-note-off" style={{color:C.amber,fontSize:15}}/><span style={{fontSize:12,fontWeight:500,color:C.amber}}>Informazioni estratte</span></div>
                  <pre style={{margin:0,fontSize:11,lineHeight:1.7,color:C.coral,whiteSpace:"pre-wrap",fontFamily:"inherit"}}>{ocrResult}</pre>
                </div>
              )}
            </div>
          )}

          {/* ══ PDF VIEWER ══ */}
          {tab==="viewer" && viewerInv && blobMap[viewerInv.id] && (
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <i className="ti ti-file-type-pdf" style={{fontSize:18,color:C.purple}}/>
                  <div>
                    <p style={{margin:0,fontSize:13,fontWeight:500,color:C.purple}}>{blobMap[viewerInv.id].name}</p>
                    {viewerInv.id!=="__preview__" && <p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)"}}>{viewerInv.client}</p>}
                  </div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <a href={blobMap[viewerInv.id].url} download={blobMap[viewerInv.id].name} style={{padding:"5px 12px",background:C.purpleL,color:C.purple,border:`1px solid ${C.purple}33`,borderRadius:7,fontSize:11,textDecoration:"none",display:"flex",alignItems:"center",gap:4}}><i className="ti ti-download"/>Scarica</a>
                  <button onClick={()=>{setViewerInv(null);setTab("fatture");}} style={{padding:"5px 10px",background:"transparent",border:"0.5px solid var(--color-border-tertiary)",borderRadius:7,fontSize:11,cursor:"pointer",color:"var(--color-text-secondary)",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-x"/>Chiudi</button>
                </div>
              </div>
              <div style={{border:`1px solid ${C.purple}44`,borderRadius:12,overflow:"hidden",background:"#525659"}}>
                <iframe src={blobMap[viewerInv.id].url} title="Visualizzatore PDF" style={{width:"100%",height:640,border:"none",display:"block"}}/>
              </div>
              <p style={{margin:"7px 0 0",fontSize:10,color:"var(--color-text-secondary)",textAlign:"center"}}>Se il PDF non si visualizza nel browser, usa il pulsante Scarica.</p>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CEDDashboard />);
  </script>
</body>
</html>
