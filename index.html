<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    /* TEMA CHIARO (default) — sfondo bianco */
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f1f2f4;
      --color-surface: #ffffff;
      --color-border-tertiary: #e8e9ec;
      --color-border-secondary: #d8dade;
      --color-text-secondary: #6b6967;
      --color-text-primary: #1a1917;
      --shadow-card: 0 1px 3px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04);
      --page-bg: #f6f7f9;
    }
    /* TEMA NOTTURNO — attivato manualmente con data-theme="dark" */
    :root[data-theme="dark"] {
      --color-background-primary: #1c1f26;
      --color-background-secondary: #232733;
      --color-surface: #1c1f26;
      --color-border-tertiary: #333845;

    }
    body {
      margin: 0;
      padding: 16px;
      background: var(--page-bg);
      color: var(--color-text-primary);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    input, select, textarea, button {
      font-family: inherit;
    }
    textarea { font-family: 'Segoe UI', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* LOGIN */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: -16px;
      background: linear-gradient(135deg, #0f2744 0%, #185FA5 100%);
    }
    #login-box {
      background: #1e1e1e; border-radius: 16px; padding: 40px 36px;
      width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    #login-box h2 { margin: 0 0 6px; color: #E6F1FB; font-size: 20px; font-weight: 600; }
    #login-box p  { margin: 0 0 28px; color: #85B7EB; font-size: 13px; }
    #login-box label { display: block; font-size: 11px; color: #a0a0a0; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }

      width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #3a3a3a;
      background: #2a2a2a; color: #f0f0f0; font-size: 14px; margin-bottom: 16px;
      outline: none; transition: border-color .2s;

    #login-btn {
      width: 100%; padding: 11px; background: #185FA5; color: white; border: none;

      transition: background .2s; margin-top: 4px;
    }
    #login-btn:hover { background: #1470c0; }
    #login-error {
      display: none; margin-top: 12px; padding: 8px 12px;
      background: #3a1a1a; border-radius: 7px; color: #f08080; font-size: 12px; text-align: center;

<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div id="login-box">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
        <div style="width:40px;height:40px;border-radius:10px;background:#185FA5;display:flex;align-items:center;justify-content:center">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#E6F1FB" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 21h18M3 10h18M3 7l9-4 9 4M4 10v11M20 10v11M8 10v11M16 10v11M12 10v11"/></svg>
        </div>
        <div>
          <h2>FocusData CED</h2>
          <p style="margin:0">Monitor Pagamenti</p>
        </div>
      </div>
      <label>Utente</label>
      <input type="text" id="login-user" placeholder="mario@focusdata" autocomplete="username"/>
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
      <button id="login-btn" onclick="doLogin()">Accedi</button>
      <div id="login-error">❌ Credenziali non valide</div>
    </div>
  </div>

  <div id="root" style="display:none"></div>

  <script>
    // Tema: default CHIARO. Applicato subito per evitare flash.
    (function(){ try { document.documentElement.setAttribute("data-theme", localStorage.getItem("ced_theme")||"light"); } catch(e){ document.documentElement.setAttribute("data-theme","light"); } })();
    const USERS = { "mario@focusdata": "mario-2026" };

    function doLogin() {
      const u = document.getElementById("login-user").value.trim().toLowerCase();
      const p = document.getElementById("login-pass").value;
      if (USERS[u] && USERS[u] === p) {
        sessionStorage.setItem("ced_auth", "1");
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("root").style.display = "block";
      } else {
        document.getElementById("login-error").style.display = "block";
        document.getElementById("login-pass").value = "";
      }
    }

    // Invio con Enter
    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

    // Controlla se già autenticato
    if (sessionStorage.getItem("ced_auth") === "1") {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("root").style.display = "block";
    }
  </script>

  <script type="text/plain" id="app-code">
    const { useState, useCallback, useRef, useEffect } = React;

    const C = {
      blue:"#185FA5", blueL:"#E6F1FB",
      teal:"#0F6E56", tealL:"#E1F5EE",
      amber:"#BA7517", amberL:"#FAEEDA",
      red:"#A32D2D",  redL:"#FCEBEB",
      green:"#3B6D11",greenL:"#EAF3DE",
      gray:"#5F5E5A", grayL:"#F1EFE8",
      coral:"#993C1D",coralL:"#FAECE7",
      purple:"#534AB7",purpleL:"#EEEDFE",
    };

    // Palette SOBRIA blu-grigio per tutta la grafica (grafici, accenti)
    const S = {
      good:  "#4A7A8C",   // incassi / positivo (blu-petrolio)
      slate: "#54708A",   // neutro
      slateD:"#3E5C76",   // neutro scuro
      ink:   "#2E4257",   // più scuro
      mute:  "#8CA0B3",   // chiaro
      warn:  "#8C6A6A",   // attenzione (clay sobrio)
      warnD: "#6E5258",   // attenzione scuro
      gray:  "#6E7E92",
    };

    const fmt  = n => new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n||0);
    const fmtD = d => { try { return new Date(d).toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric"}); } catch { return "—"; }};
    const now  = () => new Date().toISOString();
    const todayStr = () => new Date().toISOString().split("T")[0];

    // ── Supabase (REST) — URL + publishable key salvati in localStorage ──
    const sbCfg = () => ({ url:(localStorage.getItem("ced_sb_url")||"").replace(/\/+$/,""), key:localStorage.getItem("ced_sb_key")||"" });
    const sbReady = () => { const c=sbCfg(); return !!(c.url && c.key); };
    async function sbReq(method, pathQ, body) {
      const c = sbCfg(); if(!c.url||!c.key) throw new Error("Supabase non configurato");
      const h = { "apikey":c.key, "Authorization":"Bearer "+c.key, "Content-Type":"application/json" };
      if (method!=="GET") h["Prefer"]="return=representation";
      const r = await fetch(c.url+"/rest/v1/"+pathQ, { method, headers:h, body: body?JSON.stringify(body):undefined });
      if (!r.ok) throw new Error("Supabase "+r.status+": "+(await r.text()).slice(0,200));
      const t = await r.text(); return t?JSON.parse(t):null;
    }
    const sbGet    = (table,q="") => sbReq("GET", table+"?"+q);
    const sbInsert = (table,rows)  => sbReq("POST", table, rows);
    const sbUpdate = (table,q,patch)=> sbReq("PATCH", table+"?"+q, patch);
    const sbDelete = (table,q)     => sbReq("DELETE", table+"?"+q);

    // Giorni di ritardo (riferimento: scadenza, fallback emissione). Negativo = non ancora scaduta.
    const overdueDays = inv => {
      const ref = inv.due || inv.date; if(!ref) return null;
      const t = new Date(); t.setHours(0,0,0,0);
      const r = new Date(ref); if(isNaN(r)) return null;
      return Math.floor((t - r)/86400000);
    };
    // Stato effettivo calcolato dalla data: una proforma aperta con scadenza passata è "scaduto".
    const effStatus = inv => {
      if (inv.status==="pagato" || (inv.amount>0 && inv.paid>=inv.amount)) return "pagato";
      const d = overdueDays(inv);
      if (d!=null && d>0) return "scaduto";
      return inv.paid>0 ? "parziale" : "attesa";
    };

    const STATUS = {
      pagato:  { label:"Pagato",    bg:C.greenL, c:C.green,  icon:"ti-circle-check"   },
      parziale:{ label:"Parziale",  bg:C.amberL, c:C.amber,  icon:"ti-clock-hour-4"   },
      attesa:  { label:"In attesa", bg:C.blueL,  c:C.blue,   icon:"ti-hourglass"      },
      scaduto: { label:"Scaduto",   bg:C.redL,   c:C.red,    icon:"ti-alert-triangle" },
    };

    const LS = {
      get:  (k, fb) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } },
      set:  (k, v)  => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
      raw:  (k)     => localStorage.getItem(k) || "",
      setRaw:(k,v)  => localStorage.setItem(k, v),
    };

    const SAMPLE = [
      { id:"PRF-2025-001", client:"Alfa Trasporti Srl",    amount:4800,  paid:4800,  date:"2025-03-15", due:"2025-04-15", status:"pagato",  notes:[], payments:[{date:"2025-04-10",amount:4800,method:"bonifico"}], pdfPath:null, pdfBlob:null, syncedAt:null },
      { id:"PRF-2025-002", client:"Beta Logistica Spa",    amount:12500, paid:6000,  date:"2025-03-20", due:"2025-04-20", status:"parziale",notes:[{text:"Cliente conferma saldo entro 30/05",author:"Staff",scanned:true}], payments:[{date:"2025-04-18",amount:6000,method:"bonifico"}], pdfPath:null, pdfBlob:null, syncedAt:null },
      { id:"PRF-2025-003", client:"Gamma Costruzioni Srl", amount:7200,  paid:0,     date:"2025-04-01", due:"2025-05-01", status:"scaduto", notes:[], payments:[], pdfPath:null, pdfBlob:null, syncedAt:null },
      { id:"PRF-2025-004", client:"Delta Service Srl",     amount:3600,  paid:0,     date:"2025-04-10", due:"2025-05-10", status:"attesa",  notes:[{text:"Pagamento previsto 15/05",author:"Mario",scanned:false}], payments:[], pdfPath:null, pdfBlob:null, syncedAt:null },
      { id:"PRF-2025-005", client:"Epsilon Tech Srl",      amount:9800,  paid:9800,  date:"2025-04-05", due:"2025-05-05", status:"pagato",  notes:[], payments:[{date:"2025-04-28",amount:9800,method:"assegno"}], pdfPath:null, pdfBlob:null, syncedAt:null },
      { id:"PRF-2025-006", client:"Zeta Industries Spa",   amount:22000, paid:11000, date:"2025-04-12", due:"2025-05-12", status:"parziale",notes:[{text:"II rata accordata 01/06",author:"Staff",scanned:true}], payments:[{date:"2025-05-01",amount:11000,method:"bonifico"}], pdfPath:null, pdfBlob:null, syncedAt:null },
    ];

    const YD = "https://cloud-api.yandex.net/v1/disk";
    const ydHeaders = t => ({ Authorization:`OAuth ${t}` });

    async function ydList(token, path="/") {
      const r = await fetchWithTimeout(`${YD}/resources?path=${encodeURIComponent(path)}&limit=200&sort=name`, 30000, { headers:ydHeaders(token) });
      if (!r.ok) { const e = await r.json().catch(()=>{}); throw new Error(e?.message || `Errore ${r.status}`); }
      return r.json();
    }
    async function ydDownloadUrl(token, path) {
      const r = await fetchWithTimeout(`${YD}/resources/download?path=${encodeURIComponent(path)}`, 30000, { headers:ydHeaders(token) });
      if (!r.ok) throw new Error(`Download URL: ${r.status}`);
      return (await r.json()).href;
    }
    async function fetchWithTimeout(url, ms=45000, opts={}) {
      const ctrl = new AbortController();
      const t = setTimeout(()=>ctrl.abort(), ms);
      try { return await fetch(url, {...opts, signal:ctrl.signal}); }
      finally { clearTimeout(t); }
    }
    async function fetchPdfBuffer(url) {
      // Usa proxy dedicato su Render, con retry (il free tier a volte risponde a vuoto)
      const proxyUrl = "https://ced-proxy.onrender.com/proxy?url=" + encodeURIComponent(url);
      let lastErr = "";
      for (let attempt=1; attempt<=3; attempt++) {
        try {
          const r = await fetchWithTimeout(proxyUrl, 50000);
          if (!r.ok) { lastErr = "HTTP "+r.status; await new Promise(s=>setTimeout(s,800*attempt)); continue; }
          const buf = await r.arrayBuffer();
          if (buf.byteLength === 0) { lastErr = "vuoto"; await new Promise(s=>setTimeout(s,800*attempt)); continue; }
          return buf;
        } catch(e) { lastErr = e.message; await new Promise(s=>setTimeout(s,800*attempt)); }
      }
      throw new Error("Download PDF fallito ("+lastErr+")");
    }
    function bufToB64(buf) {
      let b=""; const u=new Uint8Array(buf); for (let i=0;i<u.byteLength;i++) b+=String.fromCharCode(u[i]); return btoa(b);
    }

    async function callAI(messages, system) {
      const body = { model:"claude-opus-4-5", max_tokens:1200, messages };
      if (system) body.system = system;
      const r = await fetch("https://api.anthropic.com/v1/messages",{ method:"POST", headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"}, body:JSON.stringify(body) });
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      return d.content?.[0]?.text ?? "";
    }

    async function parsePdfWithAI(b64) {
      const raw = await callAI([{ role:"user", content:[
        { type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 } },
        { type:"text", text:`Sei un assistente contabile italiano. Analizza questo PDF (proforma, fattura o scansione).
Rispondi SOLO con JSON valido, nessun testo fuori dal JSON:
{
  "tipo":"proforma|fattura|nota_credito|sconosciuto",
  "numero":"...",
  "data_emissione":"YYYY-MM-DD",
  "data_scadenza":"YYYY-MM-DD",
  "cliente":{"ragione_sociale":"...","piva":"...","indirizzo":"..."},
  "importo_totale":0.00,
  "importo_iva":0.00,
  "importo_imponibile":0.00,
  "righe":[{"descrizione":"...","quantita":0,"prezzo_unitario":0,"totale":0}],
  "note":"...",
  "stato_pagamento":"non_pagato|parziale|pagato|sconosciuto",
  "metodo_pagamento_indicato":"...",
  "affidabilita_estrazione":"alta|media|bassa",
  "note_ocr":"eventuali problemi lettura o testo manoscritto"
}` }
      ]}]);
      try { return JSON.parse(raw.replace(/```json|```/g,"").trim()); }
      catch { return { parse_error:true, raw_text:raw }; }
    }

    // ── Componenti grafici (no librerie) ──
    function VBars({ series, height=150, money=true }) {
      const max = Math.max(1, ...series.map(s=>s.value));
      return (
        <div style={{display:"flex",alignItems:"stretch",gap:6,height}}>
          {series.map((s,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,minWidth:0}}>
              <div style={{fontSize:9,fontWeight:600,color:s.color||C.blue,whiteSpace:"nowrap"}}>{s.value>0?(money?fmt(s.value):s.value):""}</div>
              <div style={{flex:1,width:"100%",display:"flex",alignItems:"flex-end"}}>
                <div title={(money?fmt(s.value):s.value)+""} style={{width:"100%",height:`${(s.value/max)*100}%`,minHeight:s.value>0?4:0,background:s.color||C.blue,borderRadius:"5px 5px 0 0",transition:"height .4s"}}/>
              </div>
              <div style={{fontSize:9,color:"var(--color-text-secondary)",textAlign:"center",lineHeight:1.15,wordBreak:"break-word"}}>{s.label}</div>
            </div>
          ))}
        </div>
      );
    }
    function HBars({ rows }) {
      const max = Math.max(1, ...rows.map(r=>r.value));
      return (
        <div>
          {rows.map((r,i)=>(
            <div key={i} style={{marginBottom:7}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3,gap:8}}>
                <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.label}</span>
                <span style={{fontWeight:600,color:r.color||C.blue,whiteSpace:"nowrap"}}>{r.display}</span>
              </div>
              <div style={{background:"var(--color-background-secondary)",borderRadius:5,height:8,overflow:"hidden"}}>
                <div style={{width:`${(r.value/max)*100}%`,height:"100%",background:r.color||C.blue,borderRadius:5,transition:"width .4s"}}/>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function CEDDashboard() {
      const [invoices, setInvoicesRaw] = useState(() => {
        const saved = LS.get("ced_invoices", null);
        const base = saved ? saved.map(i=>({...i, pdfBlob:null})) : SAMPLE;
        return base.map(i=>({...i, status:effStatus(i)}));   // ricalcola lo scaduto dalla data ad ogni avvio
      });
      const [blobMap, setBlobMap] = useState({});

      const setInvoices = useCallback(updater => {
        setInvoicesRaw(prev => {
          const next = typeof updater==="function" ? updater(prev) : updater;
          LS.set("ced_invoices", next.map(i=>{ const {pdfBlob,...rest}=i; return rest; }));
          return next;
        });
      }, []);

      const [tab, setTab]               = useState("dashboard");
      const [selected, setSelected]     = useState(null);
      const [filterS, setFilterS]       = useState("tutti");
      const [search, setSearch]         = useState("");
      const [showPay, setShowPay]       = useState(false);
      const [payAmt, setPayAmt]         = useState("");
      const [payMth, setPayMth]         = useState("bonifico");
      const [noteText, setNoteText]     = useState("");
      const [aiLoading, setAiLoading]   = useState(false);
      const [aiResult, setAiResult]     = useState("");
      const [ocrText, setOcrText]       = useState("");
      const [ocrResult, setOcrResult]   = useState("");
      const [ocrLoading, setOcrLoading] = useState(false);
      const [apiKey, setApiKey]         = useState(()=>LS.raw("ced_api_key"));
      const [showApiKey, setShowApiKey] = useState(false);
      const [theme, setTheme] = useState(()=>{ try { return localStorage.getItem("ced_theme")||"light"; } catch { return "light"; } });
      const toggleTheme = ()=>{ const t = theme==="dark"?"light":"dark"; setTheme(t); try{localStorage.setItem("ced_theme",t);}catch{} document.documentElement.setAttribute("data-theme",t); };

      const [ydToken, setYdToken]       = useState(()=>LS.raw("yd_token"));
      const [ydSyncPath, setYdSyncPath] = useState(()=>LS.raw("yd_sync_path")||"/Proforma");
      const [ydPath, setYdPath]         = useState("/");
      const [ydItems, setYdItems]       = useState([]);
      const [ydLoading, setYdLoading]   = useState(false);
      const [ydError, setYdError]       = useState("");
      const [ydCrumb, setYdCrumb]       = useState(["/"]);
      const [pdfLoading, setPdfLoading] = useState(false);
      const [pdfResult, setPdfResult]   = useState(null);
      const [viewerInv, setViewerInv]   = useState(null);
      const [syncStatus, setSyncStatus] = useState("idle");
      const [syncLog, setSyncLog]       = useState(()=>LS.get("ced_sync_log",[]));
      const [lastSync, setLastSync]     = useState(()=>LS.raw("ced_last_sync"));
      const [autoSync, setAutoSync]     = useState(()=>LS.get("ced_auto_sync",false));
      // Anagrafica da cartelle (veloce, senza AI)
      const [folderClients, setFolderClients] = useState(()=>LS.get("ced_folder_clients",[]));
      const [scanStatus, setScanStatus] = useState("idle");
      const [excludeEx, setExcludeEx]   = useState(()=>LS.get("ced_exclude_ex",true));
      const [cliFilter, setCliFilter]   = useState("");
      const [cliAiLoading, setCliAiLoading] = useState(null);
      const [cliFiles, setCliFiles]     = useState({});   // name -> {loading, open:[], paid:[]}
      const [excelStatus, setExcelStatus] = useState(()=>LS.raw("ced_excel_at")?("done"):"idle");
      const [excelInfo, setExcelInfo]   = useState(()=>LS.get("ced_excel_info",null)); // {attivi,usciti,totale,at}
      const [recoStatus, setRecoStatus] = useState("idle");
      const [recoSolo, setRecoSolo]     = useState("");   // riconciliazione limitata a un solo cliente/cartella
      const [recoProg, setRecoProg]     = useState({done:0,total:0});
      const [recoRows, setRecoRows]     = useState(()=>LS.get("ced_reco_rows",[]));
      const [recoFilter, setRecoFilter] = useState("mancanti"); // mancanti|tutti
      const [recoAddMsg, setRecoAddMsg] = useState("");
      // Foglio Pagamenti (Supabase)
      const [sbUrl, setSbUrl]           = useState(()=>localStorage.getItem("ced_sb_url")||"");
      const [sbKey, setSbKey]           = useState(()=>localStorage.getItem("ced_sb_key")||"");
      const [foglio, setFoglio]         = useState({clienti:[],proforme:[],pagamenti:[],alias:[]});
      // Incassi (estratto conto + contanti)
      const [incMovs, setIncMovs]       = useState(()=>LS.get("ced_inc_movs",[]));
      const [incLink, setIncLink]       = useState({});
      // La lista dell'estratto sopravvive ai refresh della pagina (Ctrl+Shift+R)
      useEffect(()=>{ LS.set("ced_inc_movs", incMovs); },[incMovs]);
      const [incMsg, setIncMsg]         = useState("");
      const [incBusy, setIncBusy]       = useState(false);
      const [incDaData, setIncDaData]   = useState(()=>LS.raw("ced_inc_dadata")||"");
      const [cashCliName, setCashCliName] = useState("");
      const [cashPf, setCashPf]         = useState("auto");
      const [cashImp, setCashImp]       = useState("");
      const [cashData, setCashData]     = useState(()=>todayStr());
      const [cashTipo, setCashTipo]     = useState("contanti");   // contanti | pos | assegno | altro
      const [cashMode, setCashMode]     = useState("acconto");    // acconto | riduzione (se importo < proforma)
      const [cashRows, setCashRows]     = useState([]);           // righe multiple in coda: [{tipo,importo}]
      const [soloRecord, setSoloRecord] = useState(false);        // registra solo a registro, NON tocca il dovuto
      const [cashNota, setCashNota]     = useState("");           // promemoria libero (es. rinnovo CNS, Fatture in Cloud)
      const [incPdfCli, setIncPdfCli]   = useState(null);         // nome cliente di cui mostrare i PDF in tab Incassi
      const [editPag, setEditPag]       = useState(null);         // {id,data,importo,fonte,descrizione} pagamento in modifica
      const [foglioCat, setFoglioCat]   = useState("focus");
      const [foglioLoad, setFoglioLoad] = useState(false);
      const [foglioSeed, setFoglioSeed] = useState("idle");
      const [foglioAlign, setFoglioAlign] = useState("idle");
      const [foglioMsg, setFoglioMsg]   = useState("");

      const _today = new Date(); _today.setHours(0,0,0,0);
      const daysOverdue = overdueDays;
      const isOpen = inv => inv.status!=="pagato" && (inv.amount-inv.paid)>0;
      const isStorico = inv => { const d=daysOverdue(inv); return isOpen(inv) && d!=null && d>730; }; // >24 mesi

      // ── FONTE DATI DASHBOARD: deriva dal Foglio (Supabase) se caricato, altrimenti invoices locali ──
      const PERIOD_DEADLINE = { I:"2026-03-31",II:"2026-06-30",III:"2026-09-30",IV:"2026-12-31",GEN:"2026-01-31",FEB:"2026-02-28",MAR:"2026-03-31",APR:"2026-04-30",MAG:"2026-05-31",GIU:"2026-06-30",LUG:"2026-07-31",AGO:"2026-08-31",SET:"2026-09-30",OTT:"2026-10-31",NOV:"2026-11-30",DIC:"2026-12-31",I_SEM:"2026-06-30",II_SEM:"2026-12-31",ANNO:"2026-12-31",BILANCIO:"2026-06-30" };
      const foglioInvoices = (()=>{
        const out=[];
        foglio.clienti.forEach(c=>{
          const arr=Number(c.arretrati)||0;
          if(arr>0) out.push({id:c.id+"-ARR",client:c.nome,amount:arr,paid:0,date:"",due:"2025-12-31",status:effStatus({amount:arr,paid:0,due:"2025-12-31"}),notes:[],payments:[],pdfPath:null});
          foglio.proforme.filter(p=>p.cliente_id===c.id && !p.pagato && (Number(p.importo)||0)>0).forEach(p=>{
            const imp=Number(p.importo)||0; const due=p.scadenza||PERIOD_DEADLINE[p.periodo]||"";
            out.push({id:p.id,client:c.nome,amount:imp,paid:0,date:p.data_emissione||"",due,status:effStatus({amount:imp,paid:0,due}),notes:[],payments:[],pdfPath:p.pdf_path||null});
          });
        });
        return out;
      })();
      const usaFoglio = foglio.clienti.length>0;
      const srcInv = usaFoglio ? foglioInvoices : invoices;

      const totale    = srcInv.reduce((s,i)=>s+i.amount,0);
      const incassato = srcInv.reduce((s,i)=>s+i.paid,0);
      const residuo   = totale-incassato;
      // Scaduto = aperto e in ritardo, MA non ancora storico (1..730 gg). Storico gestito a parte.
      const scadutiV  = srcInv.filter(i=>{ const d=daysOverdue(i); return isOpen(i)&&d!=null&&d>0&&d<=730; }).reduce((s,i)=>s+(i.amount-i.paid),0);
      const storicoV  = srcInv.filter(isStorico).reduce((s,i)=>s+(i.amount-i.paid),0);
      const storicoN  = srcInv.filter(isStorico).length;

      // ── Analytics condivise (no AI) ──
      const ANA = (()=>{
        const openInv = srcInv.filter(isOpen);
        const mLabels = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
        // Cash flow: incassi previsti prossimi 6 mesi (per mese di scadenza) + barra "Scaduto"
        let scadOra = 0;
        openInv.forEach(inv=>{ const d=daysOverdue(inv); if(d!=null&&d>0&&d<=730) scadOra += inv.amount-inv.paid; });
        const cf = [];
        for (let k=0;k<6;k++){
          const dt=new Date(_today.getFullYear(),_today.getMonth()+k,1);
          const me=new Date(_today.getFullYear(),_today.getMonth()+k+1,1);
          let v=0; openInv.forEach(inv=>{ if(!inv.due) return; const due=new Date(inv.due); const od=daysOverdue(inv); if(od!=null&&od>730) return; if(due>=dt&&due<me&&(od==null||od<=0)) v+=inv.amount-inv.paid; });
          cf.push({label:mLabels[dt.getMonth()],value:v,color:S.slate});
        }
        const cashflow = [{label:"Scaduto",value:scadOra,color:S.warn},...cf];
        // Incassi storici: pagamenti registrati per mese (ultimi 6 mesi)
        const inc = [];
        for (let k=5;k>=0;k--){
          const dt=new Date(_today.getFullYear(),_today.getMonth()-k,1);
          const me=new Date(_today.getFullYear(),_today.getMonth()-k+1,1);
          let v=0;
          if(usaFoglio) (foglio.pagamenti||[]).forEach(p=>{ if(p.fonte==="sconto") return; const pd=new Date(p.data); if(pd>=dt&&pd<me) v+=Number(p.importo)||0; });
          else srcInv.forEach(i=>(i.payments||[]).forEach(p=>{ const pd=new Date(p.date); if(pd>=dt&&pd<me) v+=p.amount; }));
          inc.push({label:mLabels[dt.getMonth()],value:v,color:S.good});
        }
        // Aging crediti aperti — scala blu-grigio che scurisce con l'anzianità (peggiore = clay)
        const B=[{label:"Corrente",max:0,color:S.good,v:0},{label:"1-30g",max:30,color:S.mute,v:0},{label:"31-60g",max:60,color:S.slate,v:0},{label:"61-90g",max:90,color:S.slateD,v:0},{label:"91-180g",max:180,color:S.ink,v:0},{label:"180g-24m",max:730,color:S.warn,v:0},{label:">24m",max:1e9,color:S.warnD,v:0}];
        openInv.forEach(inv=>{ const d=daysOverdue(inv); const res=inv.amount-inv.paid; if(d==null||d<=0){B[0].v+=res;return;} for(const b of B.slice(1)){ if(d<=b.max){b.v+=res;break;} } });
        const aging = B.map(b=>({label:b.label,value:b.v,color:b.color}));
        // Top clienti in sofferenza (residuo aperto)
        const byCli={}; openInv.forEach(inv=>{ const k=inv.client||"—"; byCli[k]=(byCli[k]||0)+(inv.amount-inv.paid); });
        const topSoff = Object.entries(byCli).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v])=>({label:k,value:v,display:fmt(v),color:S.slate}));
        const dso = (()=>{ let wd=0,ws=0; openInv.forEach(inv=>{ const d=daysOverdue(inv); const res=inv.amount-inv.paid; if(d!=null){ wd+=Math.max(0,d)*res; ws+=res; } }); return ws>0?Math.round(wd/ws):0; })();
        return { cashflow, incassiMensili:inc, aging, topSoff, dso, openCount:openInv.length, incassato6m:inc.reduce((s,x)=>s+x.value,0) };
      })();

      const _byStatus = filterS==="tutti" ? srcInv
                       : filterS==="storico" ? srcInv.filter(isStorico)
                       : filterS==="scaduto" ? srcInv.filter(i=>{ const d=daysOverdue(i); return isOpen(i)&&d!=null&&d>0&&d<=730; })
                       : srcInv.filter(i=>i.status===filterS);
      const _q = search.trim().toLowerCase();
      const filtered  = _q ? _byStatus.filter(i=>(i.client||"").toLowerCase().includes(_q) || (i.id||"").toLowerCase().includes(_q)) : _byStatus;

      // Modelli: Haiku per estrazione PDF (economico), Opus per analisi/report (ragionamento)
      const MODEL_EXTRACT = "claude-haiku-4-5-20251001";
      const MODEL_REASON  = "claude-opus-4-5";
      // Wrapper AI che inietta la API key. model opzionale (default: ragionamento)
      const callAIWithKey = async (messages, system, model) => {
        const key = LS.raw("ced_api_key");
        if (!key) throw new Error("API key Anthropic non configurata. Impostala nel pannello in alto.");
        const body = { model: model || MODEL_REASON, max_tokens:1200, messages };
        if (system) body.system = system;
        const r = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify(body)
        });
        const d = await r.json();
        if (d.error) throw new Error(d.error.message);
        return d.content?.[0]?.text ?? "";
      };

      // Verifica nuove proforma SOLO su richiesta (pulsante). Nessuna esecuzione automatica.
      // (auto-sync disattivato volutamente)

      const downloadAndStorePdf = async (token, ydPathItem, itemName) => {
        const dlUrl = await ydDownloadUrl(token, ydPathItem);
        const buf   = await fetchPdfBuffer(dlUrl);
        const blob  = new Blob([buf], { type:"application/pdf" });
        const url   = URL.createObjectURL(blob);
        return { buf, blob, url, name:itemName };
      };

      const parsePdf = async (item) => {
        setPdfLoading(true); setPdfResult(null); setYdError("");
        try {
          const { buf, url, name } = await downloadAndStorePdf(ydToken, item.path, item.name);
          const b64  = bufToB64(buf);
          const key  = LS.raw("ced_api_key");
          if (!key) throw new Error("API key Anthropic non configurata");
          const raw = await (async()=>{
            const body = { model:MODEL_EXTRACT, max_tokens:1200, messages:[{ role:"user", content:[
              { type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 } },
              { type:"text", text:`Sei un assistente contabile italiano. Analizza questo PDF.\nRispondi SOLO con JSON valido:\n{"tipo":"proforma|fattura|nota_credito|sconosciuto","numero":"...","data_emissione":"YYYY-MM-DD","data_scadenza":"YYYY-MM-DD","cliente":{"ragione_sociale":"...","piva":"...","indirizzo":"..."},"importo_totale":0.00,"importo_iva":0.00,"importo_imponibile":0.00,"righe":[{"descrizione":"...","quantita":0,"prezzo_unitario":0,"totale":0}],"note":"...","stato_pagamento":"non_pagato|parziale|pagato|sconosciuto","metodo_pagamento_indicato":"...","affidabilita_estrazione":"alta|media|bassa","note_ocr":"..."}` }
            ]}] };
            const r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
            const d = await r.json();
            if (d.error) throw new Error(d.error.message);
            return d.content?.[0]?.text ?? "";
          })();
          let data;
          try { data = JSON.parse(raw.replace(/```json|```/g,"").trim()); }
          catch { data = { parse_error:true, raw_text:raw }; }
          setPdfResult({ fileName:name, path:item.path, url, data });
        } catch(e) { setYdError("Errore lettura PDF: "+e.message); }
        setPdfLoading(false);
      };

      const importInvoice = () => {
        if (!pdfResult?.data || pdfResult.data.parse_error) return;
        const d = pdfResult.data;
        const id = d.numero || `PRF-IMP-${Date.now()}`;
        const newInv = {
          id, client:d.cliente?.ragione_sociale||"Cliente sconosciuto",
          amount:d.importo_totale||0, paid:0,
          date:d.data_emissione||todayStr(), due:d.data_scadenza||"",
          status:effStatus({amount:d.importo_totale||0,paid:0,due:d.data_scadenza||""}),
          notes:d.note?[{text:d.note,author:"Import PDF",scanned:d.affidabilita_estrazione==="bassa"}]:[],
          payments:[], pdfPath:pdfResult.path, syncedAt:now(),
        };
        setBlobMap(m=>({...m, [id]:{ url:pdfResult.url, name:pdfResult.fileName }}));
        setInvoices(p=>[newInv,...p.filter(i=>i.id!==id)]);
        setPdfResult(null);
        setTab("fatture"); setSelected(newInv);
      };

      // Scansione ricorsiva: raccoglie tutti i PDF, esclude cartelle "pagato/pagati/saldato"
      const EXCLUDE_DIRS = ["pagato","pagati","pagate","saldato","saldati","archivio pagati"];
      const isExcludedDir = name => {
        const n = (name||"").toLowerCase().trim();
        return EXCLUDE_DIRS.some(x=>n===x || n.includes(x));
      };
      // Raccoglie PDF attivi + PDF dentro cartelle "pagato" (paidSet = set di path)
      const walkFolderForPdfs = async (token, path, addLog, paidSet, depth=0) => {
        if (depth > 6) return [];                 // safety anti-loop
        let pdfs = [];
        const data  = await ydList(token, path);
        const items = data._embedded?.items || [];
        for (const it of items) {
          if (it.type === "dir") {
            if (isExcludedDir(it.name)) {
              addLog(`  ⊘ Cartella pagato: ${it.path}`,"skip");
              // raccogli i path dei PDF dentro le cartelle pagato (anche annidate)
              await collectPaidPdfs(token, it.path, paidSet, 0);
              continue;
            }
            const sub = await walkFolderForPdfs(token, it.path, addLog, paidSet, depth+1);
            pdfs = pdfs.concat(sub);
          } else if (it.type === "file" && it.name.toLowerCase().endsWith(".pdf")) {
            pdfs.push(it);
          }
        }
        return pdfs;
      };
      const collectPaidPdfs = async (token, path, paidSet, depth) => {
        if (depth > 5) return;
        const data = await ydList(token, path);
        for (const it of (data._embedded?.items||[])) {
          if (it.type === "dir") await collectPaidPdfs(token, it.path, paidSet, depth+1);
          else if (it.type === "file" && it.name.toLowerCase().endsWith(".pdf")) paidSet.add(it.name.toLowerCase());
        }
      };

      const runSync = useCallback(async()=>{
        if (!ydToken) { setYdError("Token Yandex mancante"); return; }
        setSyncStatus("running");
        const log = [];
        const addLog = (msg,type="info")=>{ log.push({msg,type,ts:new Date().toLocaleTimeString("it-IT")}); setSyncLog([...log]); };
        addLog(`Avvio sync ricorsiva da: ${ydSyncPath}`);
        try {
          const existing = new Set(invoices.map(i=>i.pdfPath).filter(Boolean));
          addLog(`Scansione sottocartelle in corso...`);
          const paidSet = new Set();
          const pdfs = await walkFolderForPdfs(ydToken, ydSyncPath, addLog, paidSet);
          addLog(`Trovati ${pdfs.length} PDF attivi · ${paidSet.size} in cartelle pagato`);

          // Riconcilia: proforma il cui PDF è stato spostato in "pagato" → segna saldata
          let saldate = 0;
          setInvoices(prev => prev.map(inv => {
            if (!inv.pdfPath || inv.status === "pagato") return inv;
            const fname = inv.pdfPath.split("/").pop().toLowerCase();
            if (paidSet.has(fname)) {
              saldate++;
              return { ...inv, paid: inv.amount, status: "pagato",
                payments: inv.amount>inv.paid ? [...inv.payments,{date:todayStr(),amount:inv.amount-inv.paid,method:"spostato in cartella pagato"}] : inv.payments };
            }
            return inv;
          }));
          if (saldate>0) addLog(`💚 ${saldate} proforma saldate (spostate in cartella pagato)`,"ok");

          let added=0, skipped=0;
          for (const item of pdfs) {
            if (existing.has(item.path)) { addLog(`↳ Già importato: ${item.name}`,"skip"); skipped++; continue; }
            const _cliFolder = item.path.replace(/\/+$/,"").split("/").slice(-2)[0]; // cartella cliente
            if (!folderAllowed(_cliFolder)) { skipped++; continue; }
            addLog(`↳ Elaborazione: ${item.name}...`);
            try {
              const { buf, url, name } = await downloadAndStorePdf(ydToken, item.path, item.name);
              const b64  = bufToB64(buf);
              const d    = await callAIWithKey([{ role:"user", content:[
                { type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 } },
                { type:"text", text:`Sei un contabile italiano. Analizza questa proforma/fattura PDF, incluse eventuali NOTE MANOSCRITTE o timbri (es. "acconto 2.000€", "pagato parziale", "saldo entro 30/06"). Rispondi SOLO con JSON valido:
{"tipo":"proforma|fattura|nota_credito|sconosciuto","numero":"...","data_emissione":"YYYY-MM-DD","data_scadenza":"YYYY-MM-DD","cliente":{"ragione_sociale":"...","piva":"..."},"importo_totale":0.00,"importo_gia_pagato":0.00,"stato_pagamento":"non_pagato|parziale|pagato|sconosciuto","note":"trascrivi qui eventuali note/acconti trovati","affidabilita_estrazione":"alta|media|bassa"}
REGOLE: importo_gia_pagato = somma degli acconti/pagamenti parziali indicati (0 se nessuno). Se la proforma risulta totalmente pagata metti importo_gia_pagato = importo_totale.` }
              ]}], null, MODEL_EXTRACT).then(raw=>{ try { return JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g,"").trim()); } catch { return { parse_error:true }; } });
              if (d.parse_error) { addLog(`  ✗ Parse fallito: ${item.name}`,"error"); continue; }
              const id     = d.numero || `PRF-SYNC-${Date.now()}-${added}`;
              const amount = d.importo_totale || 0;
              const paid   = Math.min(d.importo_gia_pagato || 0, amount);   // residuo = amount - paid
              const due = d.data_scadenza||"";
              const status = d.stato_pagamento==="pagato" ? "pagato" : effStatus({amount,paid,due,status:"attesa"});
              const payments = paid > 0 ? [{date:todayStr(),amount:paid,method:"da nota PDF"}] : [];
              const newInv = {
                id, client:d.cliente?.ragione_sociale||item.name.replace(".pdf",""),
                amount, paid,
                date:d.data_emissione||todayStr(), due,
                status,
                notes:d.note?[{text:d.note,author:"Sync auto",scanned:d.affidabilita_estrazione==="bassa"}]:[],
                payments, pdfPath:item.path, syncedAt:now(),
              };
              setBlobMap(m=>({...m,[id]:{ url, name }}));
              setInvoices(p=>[newInv,...p.filter(i=>i.id!==id)]);
              const resid = amount - paid;
              addLog(`  ✓ ${d.cliente?.ragione_sociale||id} — Tot ${fmt(amount)}${paid>0?` · Pagato ${fmt(paid)} · Residuo ${fmt(resid)}`:""}`,"ok");
              added++;
            } catch(e) { addLog(`  ✗ Errore ${item.name}: ${e.message}`,"error"); }
          }
          const ts = now();
          LS.setRaw("ced_last_sync", ts); setLastSync(ts);
          LS.set("ced_sync_log", log);
          addLog(`Sync completata: ${added} importati, ${skipped} già presenti`,"ok");
          setSyncStatus("done");
        } catch(e) {
          addLog(`Errore sync: ${e.message}`,"error");
          setSyncStatus("error");
        }
      }, [ydToken, ydSyncPath, invoices]);

      // ── SCANSIONE ANAGRAFICA (veloce, senza AI) ──
      // Costruisce la lista clienti dai nomi cartella: conta proforma aperte vs pagate.
      const scanRef = useRef({ stop:false });
      const scanAnagrafica = useCallback(async()=>{
        if (!ydToken) { setYdError("Token Yandex mancante"); return; }
        setScanStatus("running");
        scanRef.current.stop = false;
        const log = [];
        const addLog = (msg,type="info")=>{ log.push({msg,type,ts:new Date().toLocaleTimeString("it-IT")}); setSyncLog([...log]); };
        addLog(`Avvio scansione anagrafica da: ${ydSyncPath}`);
        const found = {};            // name -> {name, path, open, paid}
        const pushClient = (name, path, open, paid)=>{
          const key = name.trim();
          if (!found[key]) found[key] = { name:key, path, open:0, paid:0 };
          found[key].open += open; found[key].paid += paid;
          // aggiorna stato live (ordina per aperte desc)
          const arr = Object.values(found).filter(c=>c.open>0||c.paid>0).sort((a,b)=>b.open-a.open||a.name.localeCompare(b.name));
          setFolderClients(arr);
        };
        const countPdfsInDir = async (path,depth=0)=>{
          if(depth>3) return 0;
          try { const d = await ydList(ydToken, path); let n=0;
            for(const it of (d._embedded?.items||[])){
              if(it.type==="file"&&it.name.toLowerCase().endsWith(".pdf")) n++;
              else if(it.type==="dir") n+=await countPdfsInDir(it.path,depth+1);
            }
            return n; }
          catch { return 0; }
        };
        const basename = p => p.replace(/\/+$/,"").split("/").pop();
        // scansione: ogni cartella che contiene PDF o una sottocartella PAGATO = cliente
        const scan = async (path, depth)=>{
          if (scanRef.current.stop || depth>5) return;
          let data; try { data = await ydList(ydToken, path); } catch(e){ return; }
          const items = data._embedded?.items || [];
          const pdfsHere  = items.filter(it=>it.type==="file"&&it.name.toLowerCase().endsWith(".pdf"));
          const pagatoDirs= items.filter(it=>it.type==="dir"&&isExcludedDir(it.name));
          const otherDirs = items.filter(it=>it.type==="dir"&&!isExcludedDir(it.name));
          // questa cartella è un "cliente"?
          if (pdfsHere.length>0 || pagatoDirs.length>0) {
            const name = basename(path);
            if (!folderAllowed(name)) { addLog(`⊘ Escluso (fuori Excel): ${name}`,"skip"); }
            else {
              let paid=0;
              for (const pd of pagatoDirs) { if(scanRef.current.stop) return; paid += await countPdfsInDir(pd.path); }
              pushClient(name, path, pdfsHere.length, paid);
              if (pdfsHere.length>0) addLog(`👤 ${name}: ${pdfsHere.length} aperte · ${paid} pagate`, pdfsHere.length>0?"ok":"info");
            }
          }
          // continua nelle sottocartelle non-pagato (categorie + sub-clienti)
          for (const d of otherDirs) {
            if (scanRef.current.stop) return;
            // escludi ramo EX CLIENTI se richiesto
            if (excludeEx && /ex\s*clienti/i.test(d.name)) { addLog(`⊘ Salto ramo: ${d.name}`,"skip"); continue; }
            await scan(d.path, depth+1);
          }
        };
        try {
          await scan(ydSyncPath, 0);
          const arr = Object.values(found).filter(c=>c.open>0||c.paid>0).sort((a,b)=>b.open-a.open||a.name.localeCompare(b.name));
          setFolderClients(arr);
          LS.set("ced_folder_clients", arr);
          const totOpen = arr.reduce((s,c)=>s+c.open,0);
          addLog(`Anagrafica completata: ${arr.length} clienti · ${totOpen} proforma aperte`, "ok");
          LS.set("ced_sync_log", log);
          LS.setRaw("ced_last_sync", now()); setLastSync(now());
          setScanStatus(scanRef.current.stop?"idle":"done");
        } catch(e) { addLog(`Errore scansione: ${e.message}`,"error"); setScanStatus("error"); }
      }, [ydToken, ydSyncPath, excludeEx]);

      // Legge con AI gli importi delle proforma aperte di UN cliente (on-demand)
      const readClientAmounts = useCallback(async(cli)=>{
        if (!ydToken) return;
        setCliAiLoading(cli.name);
        try {
          const data = await ydList(ydToken, cli.path);
          const pdfs = (data._embedded?.items||[]).filter(it=>it.type==="file"&&it.name.toLowerCase().endsWith(".pdf"));
          for (const item of pdfs) {
            try {
              const { buf, url, name } = await downloadAndStorePdf(ydToken, item.path, item.name);
              const b64 = bufToB64(buf);
              const d = await callAIWithKey([{ role:"user", content:[
                { type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 } },
                { type:"text", text:`Contabile italiano. Estrai dalla proforma. SOLO JSON: {"numero":"...","data_emissione":"YYYY-MM-DD","data_scadenza":"YYYY-MM-DD","importo_totale":0.00,"importo_gia_pagato":0.00,"note":"acconti/note se presenti"}` }
              ]}], null, MODEL_EXTRACT).then(raw=>{ try { return JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g,"").trim()); } catch { return null; } });
              if (!d) continue;
              const id = d.numero || `${cli.name}-${item.name}`;
              const amount = d.importo_totale||0;
              const paid = Math.min(d.importo_gia_pagato||0, amount);
              const due = d.data_scadenza||"";
              const status = effStatus({amount,paid,due,status:"attesa"});
              const newInv = { id, client:cli.name, amount, paid, date:d.data_emissione||todayStr(), due,
                status, notes:d.note?[{text:d.note,author:"AI",scanned:false}]:[], payments:paid>0?[{date:todayStr(),amount:paid,method:"da nota PDF"}]:[], pdfPath:item.path, syncedAt:now() };
              setBlobMap(m=>({...m,[id]:{url,name}}));
              setInvoices(p=>[newInv,...p.filter(i=>i.id!==id)]);
            } catch(e){}
          }
        } catch(e) { setYdError("Errore lettura importi: "+e.message); }
        setCliAiLoading(null);
      }, [ydToken]);

      // ── LETTURA MASSIVA: legge gli importi delle proforma "da pagare" di TUTTI i clienti ──
      const readAllRef = useRef({ stop:false });
      const [readAllStatus, setReadAllStatus] = useState("idle"); // idle|running|done
      const [readAllProg, setReadAllProg]     = useState({done:0,total:0,cli:""});
      const readAllAmounts = useCallback(async()=>{
        if (!ydToken) { setYdError("Token Yandex mancante"); return; }
        if (!LS.raw("ced_api_key")) { setYdError("API key Anthropic non configurata"); return; }
        const clients = folderClients.filter(c=>c.open>0);
        if (clients.length===0) { setYdError("Nessun cliente con proforma da pagare. Lancia prima la scansione anagrafica."); return; }
        const totalPdf = clients.reduce((s,c)=>s+c.open,0);
        if (!confirm(`Leggere con AI gli importi di ${totalPdf} proforma da pagare (${clients.length} clienti)?\nPuoi fermare in qualsiasi momento; le già lette vengono saltate.`)) return;
        setReadAllStatus("running"); readAllRef.current.stop=false;
        const log=[]; const addLog=(m,t="info")=>{log.push({msg:m,type:t,ts:new Date().toLocaleTimeString("it-IT")}); setSyncLog([...log]);};
        addLog(`Lettura massiva importi: ${totalPdf} proforma da ${clients.length} clienti`);
        let doneClients=0, read=0, skip=0;
        // set per saltare quelle già lette (per pdfPath)
        let existing = new Set(invoices.map(i=>i.pdfPath).filter(Boolean));
        for (const cli of clients) {
          if (readAllRef.current.stop) { addLog("⏹ Interrotto dall'utente","skip"); break; }
          setReadAllProg({done:doneClients, total:clients.length, cli:cli.name});
          try {
            const data = await ydList(ydToken, cli.path);
            const pdfs = (data._embedded?.items||[]).filter(it=>it.type==="file"&&it.name.toLowerCase().endsWith(".pdf"));
            for (const item of pdfs) {
              if (readAllRef.current.stop) break;
              if (existing.has(item.path)) { skip++; continue; }
              try {
                const { buf, url, name } = await downloadAndStorePdf(ydToken, item.path, item.name);
                const b64 = bufToB64(buf);
                const d = await callAIWithKey([{ role:"user", content:[
                  { type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 } },
                  { type:"text", text:`Contabile italiano. Estrai dalla proforma. SOLO JSON: {"numero":"...","data_emissione":"YYYY-MM-DD","data_scadenza":"YYYY-MM-DD","importo_totale":0.00,"importo_gia_pagato":0.00,"note":"acconti/note se presenti"}` }
                ]}], null, MODEL_EXTRACT).then(raw=>{ try { return JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g,"").trim()); } catch { return null; } });
                if (!d) { addLog(`  ✗ ${cli.name}: parse fallito ${item.name}`,"error"); continue; }
                const id=d.numero||`${cli.name}-${item.name}`;
                const amount=d.importo_totale||0;
                const paid=Math.min(d.importo_gia_pagato||0,amount);
                const due=d.data_scadenza||"";
                const status=effStatus({amount,paid,due,status:"attesa"});
                const newInv={ id, client:cli.name, amount, paid, date:d.data_emissione||todayStr(), due, status,
                  notes:d.note?[{text:d.note,author:"AI massivo",scanned:false}]:[], payments:paid>0?[{date:todayStr(),amount:paid,method:"da nota PDF"}]:[], pdfPath:item.path, syncedAt:now() };
                setBlobMap(m=>({...m,[id]:{url,name}}));
                setInvoices(p=>[newInv,...p.filter(i=>i.id!==id)]);
                existing.add(item.path);
                read++;
              } catch(e){ addLog(`  ✗ ${cli.name}: ${e.message}`,"error"); }
              await new Promise(s=>setTimeout(s,250)); // pausa anti-sovraccarico proxy
            }
            addLog(`✓ ${cli.name} (${pdfs.length} file)`, "ok");
          } catch(e){ addLog(`✗ ${cli.name}: ${e.message}`,"error"); }
          doneClients++;
        }
        setReadAllProg({done:doneClients, total:clients.length, cli:""});
        addLog(`Lettura massiva completata: ${read} lette, ${skip} già presenti`,"ok");
        LS.set("ced_sync_log", log);
        setReadAllStatus("done");
      }, [ydToken, folderClients, invoices]);

      // Data di emissione stimata di un PDF: dal nome file scanner (contiene AAAAMMGG),
      // altrimenti data di creazione/caricamento su Yandex.
      const pdfEmissDate = it => {
        const m=(it.name||"").match(/(20\d{2})(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])/);
        if(m) return `${m[1]}-${m[2]}-${m[3]}`;
        return (it.created||it.modified||"").slice(0,10);
      };
      // Carica l'elenco dei PDF di un cliente: "da pagare" (cartella) + "pagate" (sottocartelle PAGATO)
      // Ordinati per data di emissione, i più recenti in alto.
      const loadClientFiles = useCallback(async(cli)=>{
        if (!ydToken) return;
        setCliFiles(m=>({...m,[cli.name]:{loading:true, open:[], paid:[]}}));
        try {
          const data  = await ydList(ydToken, cli.path);
          const items = data._embedded?.items || [];
          const byDateDesc=(a,b)=>(pdfEmissDate(b)||"").localeCompare(pdfEmissDate(a)||"");
          const openPdfs = items.filter(it=>it.type==="file"&&it.name.toLowerCase().endsWith(".pdf")).sort(byDateDesc);
          const pagatoDirs = items.filter(it=>it.type==="dir"&&isExcludedDir(it.name));
          // raccolta RICORSIVA: dentro "pagato" ci sono spesso sottocartelle per anno (es. pagato/2026/)
          let paidPdfs = [];
          const raccogli = async(path,depth)=>{
            if(depth>3) return;
            try{ const sd = await ydList(ydToken, path);
              for(const it of (sd._embedded?.items||[])){
                if(it.type==="file"&&it.name.toLowerCase().endsWith(".pdf")) paidPdfs.push(it);
                else if(it.type==="dir") await raccogli(it.path,depth+1);
              }
            }catch(e){}
          };
          for (const pd of pagatoDirs) await raccogli(pd.path,0);
          paidPdfs.sort(byDateDesc);
          setCliFiles(m=>({...m,[cli.name]:{loading:false, open:openPdfs, paid:paidPdfs}}));
        } catch(e) {
          setCliFiles(m=>({...m,[cli.name]:{loading:false, open:[], paid:[], error:e.message}}));
        }
      }, [ydToken]);

      // Visualizza un PDF Yandex (qualsiasi file) nel viewer
      const viewYdFile = useCallback(async(item, clientName)=>{
        if (!ydToken) return;
        setPdfLoading(true); setYdError("");
        try {
          const { url, name } = await downloadAndStorePdf(ydToken, item.path, item.name);
          setBlobMap(m=>({...m,[item.path]:{ url, name }}));
          setViewerInv({ id:item.path, pdfPath:item.path, client:clientName||"" });
          setTab("viewer");
        } catch(e) { setYdError("Errore apertura PDF: "+e.message); }
        setPdfLoading(false);
      }, [ydToken]);

      // ── IMPORT EXCEL (fotografia da incassare) ──
      const normName = s => (s||"").toUpperCase().replace(/[^A-Z0-9 ]/g," ").replace(/\b(SRL|SRLS|SNC|SAS|SPA|DI|E|C|ASSOC|ASSOCIAZIONE|CULTURALE)\b/g," ").replace(/\s+/g," ").trim();
      // Discriminante Excel: una cartella cliente è ammessa se in whitelist (Excel) o NUOVA (non esisteva all'allineamento). Esclusa se nota ma fuori Excel.
      const folderAllowed = name => {
        const wl = LS.get("ced_whitelist", null);
        if (!wl || wl.length===0) return true;            // nessun Excel importato → tutto ammesso
        const n = normName(name); if(!n) return true;
        if (wl.some(w => w===n || w.startsWith(n.slice(0,6)) || n.startsWith(w.slice(0,6)))) return true; // in Excel
        const known = LS.get("ced_known_folders", []);
        if (known.includes(n)) return false;              // esisteva ma fuori Excel → esclusa
        return true;                                      // cartella nuova → ammessa
      };
      const xlsNum = v => {
        if (typeof v==="number") return v;
        if (typeof v==="string"){ let s=v.trim().replace(/€/g,"").replace(/\s/g,""); if(s.includes(",")&&s.includes(".")) s=s.replace(/\./g,"").replace(",","."); else if(s.includes(",")) s=s.replace(",","."); const n=parseFloat(s); return isNaN(n)?0:n; }
        return 0;
      };
      const isPag = v => typeof v==="string" && v.toUpperCase().includes("PAGAT");
      const isInact = s => typeof s==="string" && /MANDATO VIA|INATTIV|FORFAIT CON|CHIUS/i.test(s);
      const bilAmount = note => { if(!note) return 0; let m=note.match(/(\d[\d.]*)\s*(?:€\s*)?bilanci/i)||note.match(/bilanci\w*\s*(?:di\s*)?€?\s*(\d[\d.]*)/i); return m?xlsNum(m[1]):0; };

      const importExcel = async (file) => {
        if (!window.XLSX) { alert("Libreria Excel non caricata, riprova tra un secondo."); return; }
        setExcelStatus("running");
        try {
          const buf = await file.arrayBuffer();
          const wb = XLSX.read(buf, { type:"array" });
          const grid = name => { const ws=wb.Sheets[name]; return ws?XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""}):[]; };
          const active={}, inactive={}, notemap={};
          const put=(d,nm,due,note,sheet)=>{ nm=(nm||"").trim(); if(nm.length<3) return; if(!d[nm]) d[nm]={name:nm,due:0,bil:0,note:note,sheet:sheet}; d[nm].due+=due; if(note&&!d[nm].note) d[nm].note=note; };
          // FOCUS
          (grid("FOCUS")||[]).slice(1).forEach(row=>{
            const nm=String(row[1]||"").trim(); if(nm.length<3) return;
            const cells=[row[2],row[3],row[4],row[5],row[6]]; const note=String(row[7]||"").trim(); notemap[nm]=note;
            const inact=isInact(note)||cells.some(isInact);
            const due=cells.reduce((s,c)=>s+(isPag(c)?0:xlsNum(c)),0);
            put(inact?inactive:active,nm,due,note,"FOCUS");
          });
          // ALTRI
          (grid("ALTRI")||[]).slice(1).forEach(row=>{
            const nm=String(row[1]||"").trim(); if(nm.length<3||["MENSILI","BIMESTRALE"].includes(nm.toUpperCase())) return;
            const note=String(row[2]||"").trim(); notemap[nm]=note;
            const cells=row.slice(3); const inact=isInact(note)||cells.some(isInact);
            const due=cells.reduce((s,c)=>s+(isPag(c)?0:xlsNum(c)),0);
            put(inact?inactive:active,nm,due,note,"ALTRI");
          });
          // RAGAZZI (due liste affiancate)
          (grid("RAGAZZI")||[]).slice(1).forEach(row=>{
            const a=String(row[1]||"").trim();
            if(a.length>2){ const due=[row[2],row[3]].reduce((s,c)=>s+(isPag(c)?0:xlsNum(c)),0); put(active,a,due,"semestre","RAGAZZI"); }
            const b=String(row[6]||"").trim();
            if(b.length>2){ put(active,b,xlsNum(row[5]),"annuale","RAGAZZI"); }
          });
          // BILANCIO: aggiunge parcella se non PAGATO/DEPOSITATO
          (grid("BILANCIO")||[]).slice(1).forEach(row=>{
            const nm=String(row[0]||"").trim(); if(nm.length<2) return;
            const flags=row.slice(1).join(" ").toUpperCase(); if(flags.includes("PAGAT")) return;
            let note=""; const kn=normName(nm);
            for(const k in notemap){ const nk=normName(k); if(nk.startsWith(kn.slice(0,6))||kn.startsWith(nk.slice(0,6))){ note=notemap[k]; break; } }
            const amt=bilAmount(note); if(!amt) return;
            let tgtKey=Object.keys(active).find(k=>normName(k).startsWith(kn.slice(0,6))||kn.startsWith(normName(k).slice(0,6)));
            if(!tgtKey){ put(active,nm,0,note,"BILANCIO"); tgtKey=nm; }
            active[tgtKey].bil+=amt;
          });
          // Costruisci invoices dal snapshot
          const mk=(c,inact)=>{
            const amount=(c.due||0)+(c.bil||0);
            return { id:`XLS-${c.sheet}-${c.name}`.slice(0,60), client:c.name, amount, paid:0,
              date:"", due: inact?"2025-12-31":"", status: inact?"scaduto":(amount>0?"attesa":"pagato"),
              notes: c.note?[{text:c.note+(c.bil?` · +bilancio ${fmt(c.bil)}`:""),author:"Excel",scanned:false}]:[],
              payments:[], pdfPath:null, syncedAt:now(), source:"excel", inactive:!!inact };
          };
          const invs=[...Object.values(active).map(c=>mk(c,false)), ...Object.values(inactive).filter(c=>c.due>0.5).map(c=>mk(c,true))];
          // whitelist normalizzata (attivi + usciti)
          const whitelist=[...Object.keys(active),...Object.keys(inactive)].map(normName).filter(Boolean);
          // snapshot cartelle Yandex correnti (per esclusione)
          let known=[];
          if (ydToken){
            try {
              const root=await ydList(ydToken,"/");
              for(const t of (root._embedded?.items||[]).filter(i=>i.type==="dir")){
                const sub=await ydList(ydToken,t.path);
                for(const it of (sub._embedded?.items||[])) if(it.type==="dir") known.push(normName(it.name));
              }
            } catch(e){}
          }
          const tA=Object.values(active).reduce((s,c)=>s+c.due+c.bil,0);
          const tI=Object.values(inactive).filter(c=>c.due>0.5).reduce((s,c)=>s+c.due,0);
          const info={ attivi:Object.values(active).filter(c=>c.due+c.bil>0.5).length, usciti:Object.values(inactive).filter(c=>c.due>0.5).length, totale:tA, usciti_tot:tI, at:now(), known:known.length };
          setInvoices(invs);
          LS.set("ced_whitelist", [...new Set(whitelist)]);
          LS.set("ced_known_folders", [...new Set(known)]);
          LS.setRaw("ced_excel_at", info.at); LS.set("ced_excel_info", info); LS.setRaw("ced_source","excel");
          setExcelInfo(info); setExcelStatus("done");
          alert(`Import completato!\nAttivi da incassare: ${info.attivi} (${fmt(tA)})\nUsciti con arretrato: ${info.usciti} (${fmt(tI)})\nCartelle Yandex note: ${known.length}`);
          setTab("dashboard");
        } catch(e){ setExcelStatus("error"); alert("Errore import Excel: "+e.message); }
      };

      // ── RICONCILIAZIONE: legge le proforma 2026 da Yandex e le incrocia con l'Excel ──
      const inWhitelist = name => {
        const wl = LS.get("ced_whitelist", []); if(!wl.length) return null;
        const n = normName(name); if(!n) return false;
        return wl.some(w => w===n || w.startsWith(n.slice(0,6)) || n.startsWith(w.slice(0,6)));
      };
      const recoRef = useRef({ stop:false });
      // Cambia stato di una riga riconciliazione: "excluded" | "paid" | undefined (toggle)
      // Stati riga persistenti per file (sopravvivono a una nuova riconciliazione completa)
      const recoKey = r => r.path || ((r.folder||"")+"/"+(r.file||""));
      const saveRecoState = (row, st) => { const m=LS.get("ced_reco_states",{}); const k=recoKey(row); if(st) m[k]=st; else delete m[k]; LS.set("ced_reco_states",m); };
      const setRecoRowState = (row, st) => {
        const newSt = row.state===st ? undefined : st;
        setRecoRows(prev => {
          const next = prev.map(r => r===row ? {...r, state:newSt} : r);
          LS.set("ced_reco_rows", next); return next;
        });
        saveRecoState(row, newSt);
      };

      // Mappa il periodo letto dalla proforma a (codice periodo, categoria suggerita)
      const MESI3=["GEN","FEB","MAR","APR","MAG","GIU","LUG","AGO","SET","OTT","NOV","DIC"];
      const recoPeriodMap = (row)=>{
        const p=(row.periodo||"").toLowerCase();
        if(p.includes("bilanc")) return ["BILANCIO","bilancio"];
        if(p.includes("mensil")||p.includes("mese")){ let m=5; if(row.data){ const d=new Date(row.data); if(!isNaN(d)) m=d.getMonth(); } return [MESI3[m]||"GEN","altri"]; }
        if(p.includes("semestr")){ return ["I_SEM","ragazzi"]; }
        if(p.includes("annual")||p.includes("anno")) return ["ANNO","ragazzi"];
        if(p.includes("iv")) return ["IV","focus"];
        if(p.includes("iii")) return ["III","focus"];
        if(p.includes("ii")) return ["II","focus"];
        if(p.includes("i")) return ["I","focus"];
        return ["I","focus"];
      };
      // Aggiunge una proforma letta dalla Riconcilia direttamente nel Foglio (Supabase)
      // Inserisce/aggiorna una proforma nel Foglio usando una cache clienti locale (evita duplicati nei loop)
      const _pushRecoRow = async(row, clientiCache, proformeCache)=>{
        const [per,catSug]=recoPeriodMap(row);
        // 1) alias banca (collegamenti espliciti 🔗) → 2) match esatto su nome AI o cartella → 3) prefisso
        const nb=normName(row.cliente), nf=normName(row.folder);
        let cli=null;
        const al=(foglio.alias||[]).find(a=>{ const t=normName(a.testo_banca); if(!t) return false;
          return t===nb||t===nf||(t.length>6&&(nb.includes(t)||nf.includes(t)))||(nb.length>6&&t.includes(nb))||(nf.length>6&&t.includes(nf)); });
        if(al) cli=clientiCache.find(c=>c.id===al.cliente_id)||null;
        if(!cli) cli=clientiCache.find(c=>{ const a=normName(c.nome); return a&&(a===nb||a===nf); });
        if(!cli) cli=clientiCache.find(c=>{ const a=normName(c.nome); return a&&nb&&(a.startsWith(nb.slice(0,6))||nb.startsWith(a.slice(0,6))); });
        if(!cli) cli=clientiCache.find(c=>{ const a=normName(c.nome); return a&&nf&&(a.startsWith(nf.slice(0,6))||nf.startsWith(a.slice(0,6))); });
        if(!cli){ const ins=await sbInsert("clienti",[{nome:row.cliente||row.folder,categoria:catSug}]); cli=ins[0]; clientiCache.push(cli); }
        const patch={importo:row.totale||0,pagato:!!row.paid,pdf_path:row.file||null,data_emissione:row.data||null};
        const ex=proformeCache.find(p=>p.cliente_id===cli.id && p.periodo===per && p.anno===2026);
        if(ex){ await sbUpdate("proforme",`id=eq.${ex.id}`,patch); Object.assign(ex,patch); }
        else { const ins=await sbInsert("proforme",[{cliente_id:cli.id,anno:2026,periodo:per,...patch}]); proformeCache.push(ins[0]); }
      };
      const addRecoToFoglio = async(row)=>{
        if(!sbReady()){ setRecoAddMsg("⚠ Connetti prima Supabase (tab Foglio)"); return; }
        setRecoAddMsg("Aggiunta in corso...");
        try{
          const cc=[...foglio.clienti], pc=[...foglio.proforme];
          await _pushRecoRow(row, cc, pc);
          saveRecoState(row,"added");
          setRecoRows(prev=>{ const next=prev.map(r=>r===row?{...r,state:"added"}:r); LS.set("ced_reco_rows",next); return next; });
          await loadFoglio();
          setRecoAddMsg(`✓ "${row.cliente}" aggiunta al Foglio.`);
        }catch(e){ setRecoAddMsg("Errore aggiunta: "+e.message); }
      };
      const addAllRecoToFoglio = async()=>{
        if(!sbReady()){ setRecoAddMsg("⚠ Connetti prima Supabase (tab Foglio)"); return; }
        const da=recoRows.filter(r=>!r.inExcel && !r.state && (r.totale||0)>0);
        if(da.length===0){ setRecoAddMsg("Nessuna nuova proforma da aggiungere (sono già in Excel, già aggiunte, o senza importo letto)."); return; }
        if(!confirm(`Aggiungere ${da.length} proforma al Foglio?`)) return;
        setRecoAddMsg(`Aggiunta di ${da.length} proforma in corso...`);
        const cc=[...foglio.clienti], pc=[...foglio.proforme]; let added=0, err=0;
        for(const r of da){ try{ await _pushRecoRow(r, cc, pc); saveRecoState(r,"added"); added++; }catch(e){ err++; } }
        setRecoRows(prev=>{ const next=prev.map(r=> da.includes(r)?{...r,state:"added"}:r); LS.set("ced_reco_rows",next); return next; });
        await loadFoglio();
        setRecoAddMsg(`✓ Aggiunte ${added} proforma al Foglio${err?` · ${err} errori`:""}. Controlla Dashboard/Clienti.`);
      };
      // Sincronizza TUTTE le righe lette nel Foglio: crea le proforma mancanti (es. III trim)
      // e aggiorna importo/stato pagato dalle notule. Idempotente: aggiorna se esiste, crea se manca.
      const syncAllRecoToFoglio = async()=>{
        if(!sbReady()){ setRecoAddMsg("⚠ Connetti prima Supabase (tab Foglio)"); return; }
        const da=recoRows.filter(r=>(r.totale||0)>0 && r.state!=="excluded" && !r.parseFail);

        if(!confirm(`Sincronizzare ${da.length} proforma nel Foglio?\n\n• crea quelle mancanti (es. III trimestre nuovo)\n• aggiorna importo e stato PAGATO in base alle notule di Yandex\n• per quei periodi i valori attuali del Foglio vengono sovrascritti`)) return;

        setRecoRows(prev=>{ const next=prev.map(r=> da.includes(r)?{...r,state:"added"}:r); LS.set("ced_reco_rows",next); return next; });
        await loadFoglio();
        setRecoAddMsg(`✓ Sincronizzate ${ok} proforma nel Foglio${err?` · ${err} errori`:""}. Dashboard aggiornata.`);
      };
      const runReconciliation = useCallback(async()=>{
        if (!ydToken) { setYdError("Token Yandex mancante"); return; }
        if (!LS.raw("ced_api_key")) { setYdError("API key Anthropic non configurata"); return; }
        recoRef.current.stop=false; setRecoStatus("running");
        const log=[]; const addLog=(m,t="info")=>{log.push({msg:m,type:t,ts:new Date().toLocaleTimeString("it-IT")}); setSyncLog([...log]);};
        // Filtro singolo cliente: salta direttamente le cartelle che non corrispondono (scansione veloce)
        const filt=(recoSolo||"").trim();
        const fnN=normName(filt), fnC=normCore(filt);
        const foldMatch = name => { if(!filt) return true; const k=normName(name), kc=normCore(name);
          return (k&&fnN&&(k.includes(fnN)||fnN.includes(k))) || (kc&&fnC&&(kc.slice(0,6)===fnC.slice(0,6))); };
        addLog(filt?`Riconciliazione SOLO per "${filt}"...`:"Riconciliazione: raccolta proforma 2026 da Yandex...");
        // 1) raccogli PDF 2026 (cartella cliente + sottocartelle, salta EX CLIENTI)
        const pdfs=[]; let scanCount=0;
        const walk=async(path,depth,clientFolder)=>{
          if(recoRef.current.stop||depth>5) return;
          let d; try{ d=await ydList(ydToken,path);}catch(e){return;}
          scanCount++; if(scanCount%25===0) addLog(`Scansione cartelle: ${scanCount} esaminate, ${pdfs.length} PDF 2026 trovati finora...`);
          for(const it of (d._embedded?.items||[])){
            if(it.type==="file" && it.name.toLowerCase().endsWith(".pdf")){
              // È una proforma 2026 se: anno nel nome file (doc...2026...) oppure notula
              // TeamSystem PFAT-nnn caricata/modificata nel 2026 (l'anno non è nel nome)
              const anno2026 = it.name.includes("2026") || (/pfat/i.test(it.name) && ((it.created||it.modified||"").slice(0,4)==="2026"));
              if(anno2026){
                const fold=clientFolder||basenameOf(path);
                if(foldMatch(fold)) pdfs.push({path:it.path,name:it.name,folder:fold,paid:/pagat|saldat/i.test(path)});
              }
            }
            else if(it.type==="dir"){
              if(depth===0 && /ex\s*clienti/i.test(it.name)) continue;
              // depth 1 = cartella cliente: col filtro attivo si scende solo in quelle giuste
              if(depth===1 && !clientFolder && !foldMatch(it.name)) continue;
              await walk(it.path, depth+1, depth>=1?(clientFolder||basenameOf(path)) : it.name);
            }
          }
        };
        function basenameOf(p){ return p.replace(/\/+$/,"").split("/").pop(); }
        try{
          const root=await ydList(ydToken,"/");
          for(const t of (root._embedded?.items||[]).filter(i=>i.type==="dir")){
            if(recoRef.current.stop) break;
            if(/ex\s*clienti/i.test(t.name)) continue;
            await walk(t.path,1,null);
          }
        }catch(e){ addLog("Errore scansione: "+e.message,"error"); }
        const pdfsUse=pdfs;
        if(filt && !pdfsUse.length) addLog(`⚠ Nessuna cartella/PDF 2026 corrisponde a "${filt}" — controlla il nome`,"error");
        addLog(`Trovate ${pdfsUse.length} proforma 2026. Lettura AI...`);
        setRecoProg({done:0,total:pdfsUse.length});
        const rows=[]; let done=0;
        for(const it of pdfsUse){
          if(recoRef.current.stop){ addLog("⏹ Interrotto","skip"); break; }
          try{
            const { buf } = await downloadAndStorePdf(ydToken, it.path, it.name);
            const b64=bufToB64(buf);
            const d=await callAIWithKey([{role:"user",content:[
              {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},
              {type:"text",text:`Parcella/proforma italiana studio CED. Dalla CAUSALE ricava il periodo di competenza. Rispondi SOLO JSON: {"cliente":"...","data_emissione":"YYYY-MM-DD","periodo":"I trimestre|II trimestre|III trimestre|IV trimestre|annuale|mensile|bilancio|altro","competenza":"causale","importo_imponibile":0.00,"importo_totale":0.00}`}
            ]}], null, MODEL_EXTRACT).then(raw=>{ try{return JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g,"").trim());}catch{return null;} });
            const wl=inWhitelist(it.folder);
            const savedStates=LS.get("ced_reco_states",{});
            const row={ file:it.name, folder:it.folder, path:it.path, paid:it.paid,
              cliente:d?.cliente||it.folder, data:d?.data_emissione||"", periodo:d?.periodo||"?",
              competenza:d?.competenza||"", imponibile:d?.importo_imponibile||0, totale:d?.importo_totale||0,
              inExcel: wl===true, parseFail:!d, state: savedStates[it.path] };
            rows.push(row); done++;
            if(!filt && (done%5===0||done===pdfsUse.length)){ setRecoRows([...rows]); }
            setRecoProg({done,total:pdfsUse.length});
            if(!row.inExcel) addLog(`🔴 ${row.cliente} — ${row.periodo} ${fmt(row.totale)} — NON in Excel`,"error");
          }catch(e){ done++; setRecoProg({done,total:pdfsUse.length}); }
        }
        if(filt){
          // run filtrato: aggiorna solo le righe del cliente, il resto della lista rimane
          setRecoRows(prev=>{ const others=prev.filter(r=>!rows.some(n=>recoKey(n)===recoKey(r)));
            const next=[...rows,...others]; LS.set("ced_reco_rows",next); return next; });
        } else { setRecoRows([...rows]); LS.set("ced_reco_rows", rows); }
        const miss=rows.filter(r=>!r.inExcel); const missTot=miss.reduce((s,r)=>s+(r.totale||0),0);
        addLog(`Riconciliazione completata: ${rows.length} lette${filt?` (solo "${filt}")`:""} · ${miss.length} fuori Excel (${fmt(missTot)})`,"ok");
        LS.set("ced_sync_log", log);
        setRecoStatus(recoRef.current.stop?"idle":"done");
      }, [ydToken, recoSolo]);

      // ── FOGLIO PAGAMENTI (Supabase) ──
      const PERIODI = { focus:["I","II","III","IV"], ragazzi:["I_SEM","II_SEM","ANNO"], altri:["GEN","FEB","MAR","APR","MAG","GIU","LUG","AGO","SET","OTT","NOV","DIC"], bilancio:["BILANCIO"], nuovi:[] };
      const PLABEL = { I:"I Trim",II:"II Trim",III:"III Trim",IV:"IV Trim",I_SEM:"I Sem",II_SEM:"II Sem",ANNO:"Annuale",GEN:"Gen",FEB:"Feb",MAR:"Mar",APR:"Apr",MAG:"Mag",GIU:"Giu",LUG:"Lug",AGO:"Ago",SET:"Set",OTT:"Ott",NOV:"Nov",DIC:"Dic",BILANCIO:"Bilancio" };
      const loadFoglio = useCallback(async()=>{
        if(!sbReady()){ setFoglioMsg("Configura prima URL e chiave Supabase."); return; }
        setFoglioLoad(true); setFoglioMsg("");
        try{
          const clienti = await sbGet("clienti","select=*&order=categoria,nome");
          const proforme = await sbGet("proforme","select=*&limit=20000");
          let pagamenti=[], alias=[];
          try{ pagamenti = await sbGet("pagamenti","select=*&order=data.desc&limit=20000"); }catch(e){}
          try{ alias = await sbGet("alias_banca","select=*&limit=2000"); }catch(e){}
          setFoglio({clienti,proforme,pagamenti,alias});
          setFoglioMsg(`Caricati ${clienti.length} clienti, ${proforme.length} proforme e ${pagamenti.length} pagamenti dal cloud.`);
        }catch(e){ setFoglioMsg("Errore caricamento: "+e.message); }
        setFoglioLoad(false);
      },[]);

      // Carica automaticamente i dati del Foglio quando si apre la scheda (se connesso e vuoto)
      useEffect(()=>{
        if((tab==="dashboard"||tab==="fatture"||tab==="foglio"||tab==="clienti"||tab==="riconcilia"||tab==="incassi") && sbReady() && foglio.clienti.length===0 && !foglioLoad) loadFoglio();
      }, [tab]);

      const saveCell = async(cliente, periodo, patch)=>{
        // trova proforma esistente
        const ex = foglio.proforme.find(p=>p.cliente_id===cliente.id && p.anno===2026 && p.periodo===periodo);
        try{
          if(ex){
            const upd = await sbUpdate("proforme",`id=eq.${ex.id}`,patch);
            setFoglio(f=>({...f, proforme:f.proforme.map(p=>p.id===ex.id?{...p,...patch}:p)}));
          } else {
            const ins = await sbInsert("proforme",[{cliente_id:cliente.id,anno:2026,periodo,...patch}]);
            setFoglio(f=>({...f, proforme:[...f.proforme, ins[0]]}));

        }catch(e){ setFoglioMsg("Errore salvataggio: "+e.message); }
      };
      const saveArretrati = async(cliente, val)=>{
        try{ await sbUpdate("clienti",`id=eq.${cliente.id}`,{arretrati:val});
          setFoglio(f=>({...f, clienti:f.clienti.map(c=>c.id===cliente.id?{...c,arretrati:val}:c)})); }

      const addCliente = async()=>{
        const nome = prompt("Nome nuovo cliente:"); if(!nome) return;
        try{ const ins=await sbInsert("clienti",[{nome,categoria:foglioCat}]); setFoglio(f=>({...f,clienti:[...f.clienti,ins[0]]})); }

      const delCliente = async(c)=>{

        try{ await sbDelete("clienti",`id=eq.${c.id}`); setFoglio(f=>({clienti:f.clienti.filter(x=>x.id!==c.id),proforme:f.proforme.filter(p=>p.cliente_id!==c.id)})); }
        catch(e){ setFoglioMsg("Errore: "+e.message); }
