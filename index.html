                              {/* PAGATE */}
                              <div style={{marginTop:12,marginBottom:4}}>
                                <span style={{fontSize:11,fontWeight:600,color:C.green,textTransform:"uppercase",letterSpacing:.3}}><i className="ti ti-circle-check" style={{marginRight:4}}/>Pagate ({cf.paid.length})</span>
                              </div>
                              {cf.paid.length===0 ? <p style={{fontSize:11,color:"var(--color-text-secondary)",margin:0}}>Nessuna proforma pagata.</p> : cf.paid.map(it=>fileRow(it,true))}
                            </>)}
                          </div>
                          );
                        })()}
                      </div>
                      );
                    })}
                    {list.length===0 && <p style={{textAlign:"center",fontSize:12,color:"var(--color-text-secondary)",padding:20}}>Nessun cliente trovato per "{cliFilter}".</p>}
                  </div>
                </>);
              })() : (
                <div style={{textAlign:"center",padding:"40px 20px"}}>
                  <i className="ti ti-users" style={{fontSize:36,color:"var(--color-text-secondary)",opacity:.4}}/>
                  <p style={{margin:"12px 0 4px",fontSize:14,fontWeight:500}}>Anagrafica vuota</p>
                  <p style={{margin:"0 0 14px",fontSize:12,color:"var(--color-text-secondary)"}}>Lancia la <b>Scansione anagrafica</b> dalla tab Sync Auto per costruire la lista clienti dalle cartelle Yandex (veloce, senza AI).</p>
                  <button onClick={()=>setTab("sync")} style={{padding:"8px 16px",background:C.teal,color:"white",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500}}>Vai a Sync Auto</button>
                </div>
              )}
            </div>
          )}

          {/* ══ FOGLIO PAGAMENTI (Supabase) ══ */}
          {tab==="foglio" && (
            <div>
              {/* Config Supabase */}
              {!sbReady() ? (
                <div style={{background:"var(--color-surface)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:14,padding:"16px 18px",marginBottom:12,boxShadow:"var(--shadow-card)"}}>
                  <h3 style={{margin:"0 0 6px",fontSize:14,fontWeight:600}}>Connetti Supabase</h3>
                  <p style={{margin:"0 0 10px",fontSize:12,color:"var(--color-text-secondary)"}}>Incolla Project URL e Publishable key (vengono salvati solo nel tuo browser).</p>
                  <input value={sbUrl} onChange={e=>setSbUrl(e.target.value)} placeholder="https://xxxx.supabase.co" style={{width:"100%",padding:"9px 12px",borderRadius:9,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:12,fontFamily:"monospace",marginBottom:8,boxSizing:"border-box"}}/>
                  <input value={sbKey} onChange={e=>setSbKey(e.target.value)} placeholder="sb_publishable_..." style={{width:"100%",padding:"9px 12px",borderRadius:9,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:12,fontFamily:"monospace",marginBottom:10,boxSizing:"border-box"}}/>
                  <button onClick={()=>{ localStorage.setItem("ced_sb_url",sbUrl.trim()); localStorage.setItem("ced_sb_key",sbKey.trim()); loadFoglio(); }} style={{padding:"9px 18px",background:S.slateD,color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>Connetti</button>
                </div>
              ) : (
                <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
                  <button onClick={loadFoglio} disabled={foglioLoad} style={{padding:"8px 14px",background:S.slateD,color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}><i className={`ti ti-refresh ${foglioLoad?"ti-spin":""}`}/>{foglioLoad?"Carico...":"Ricarica"}</button>
                  <button onClick={addCliente} style={{padding:"8px 14px",background:S.good+"18",color:S.good,border:`1px solid ${S.good}44`,borderRadius:8,fontSize:12,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}><i className="ti ti-user-plus"/> Cliente</button>
                  <label style={{padding:"8px 14px",background:foglioAlign==="running"?C.grayL:S.good,color:"#fff",borderRadius:8,fontSize:12,fontWeight:600,cursor:foglioAlign==="running"?"wait":"pointer",display:"inline-flex",alignItems:"center",gap:5}} title="Aggiunge SOLO i clienti dell'Excel non ancora presenti, senza toccare dati e pagamenti esistenti">
                    <i className={`ti ${foglioAlign==="running"?"ti-loader-2 ti-spin":"ti-user-plus"}`}/>{foglioAlign==="running"?"Allineo...":"Allinea nuovi da Excel"}
                    <input type="file" accept=".xls,.xlsx" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0]; if(f) allineaNuovi(f); e.target.value="";}}/>
                  </label>
                  <label style={{padding:"8px 14px",background:"transparent",border:`1px solid ${S.slateD}55`,color:S.slateD,borderRadius:8,fontSize:12,fontWeight:500,cursor:foglioSeed==="running"?"wait":"pointer",display:"inline-flex",alignItems:"center",gap:5}} title="ATTENZIONE: sostituisce TUTTI i dati del Foglio con l'Excel (usare solo per ripartire da zero)">
                    <i className={`ti ${foglioSeed==="running"?"ti-loader-2 ti-spin":"ti-database-import"}`}/>{foglioSeed==="running"?"Importo...":"Reimporta tutto"}
                    <input type="file" accept=".xls,.xlsx" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0]; if(f) seedFoglio(f); e.target.value="";}}/>
                  </label>
                  <button onClick={()=>{ localStorage.removeItem("ced_sb_url"); localStorage.removeItem("ced_sb_key"); setSbUrl(""); setSbKey(""); setFoglio({clienti:[],proforme:[]}); }} style={{marginLeft:"auto",padding:"8px 12px",background:"transparent",border:"0.5px solid var(--color-border-tertiary)",borderRadius:8,fontSize:11,cursor:"pointer",color:"var(--color-text-secondary)"}}>Disconnetti</button>
                </div>
              )}
              {foglioMsg && <p style={{margin:"0 0 10px",fontSize:11,color:foglioMsg.startsWith("Errore")?C.red:S.good,background:(foglioMsg.startsWith("Errore")?C.redL:S.good+"15"),padding:"7px 10px",borderRadius:7}}>{foglioMsg}</p>}

              {sbReady() && (()=>{
                const cats=[["focus","Focus (trim.)"],["altri","Altri (mensili)"],["ragazzi","Ragazzi"],["bilancio","Bilancio"],["nuovi","Nuovi"]];
                const periods=PERIODI[foglioCat];
                const clienti=foglio.clienti.filter(c=>c.categoria===foglioCat);
                const pf=(cid,per)=>foglio.proforme.find(p=>p.cliente_id===cid&&p.periodo===per);
                const cliDue=c=>{ let d=Number(c.arretrati)||0; foglio.proforme.forEach(p=>{ if(p.cliente_id===c.id&&!p.pagato) d+=Number(p.importo)||0; }); return d; };
                const totDue=clienti.reduce((s,c)=>s+cliDue(c),0);
                const colTot={}; periods.forEach(per=>{ colTot[per]=clienti.reduce((s,c)=>{ const p=pf(c.id,per); return s+(Number(p?.importo)||0); },0); });
                const arrTot=clienti.reduce((s,c)=>s+(Number(c.arretrati)||0),0);
                // Riepilogo per categoria (tutti)
                const riepilogo=cats.map(([k,l])=>{
                  const cls=foglio.clienti.filter(c=>c.categoria===k); const ids=new Set(cls.map(c=>c.id));
                  const pfs=foglio.proforme.filter(p=>ids.has(p.cliente_id));
                  const arr=cls.reduce((s,c)=>s+(Number(c.arretrati)||0),0);
                  const inc=pfs.filter(p=>!p.pagato).reduce((s,p)=>s+(Number(p.importo)||0),0);
                  const pagati=pfs.filter(p=>p.pagato).length;
                  const aperte=pfs.filter(p=>!p.pagato && Number(p.importo)>0).length;
                  return {k,l,n:cls.length,arr,inc,pagati,aperte,tot:arr+inc};
                });
                const RT=riepilogo.reduce((a,r)=>({n:a.n+r.n,arr:a.arr+r.arr,inc:a.inc+r.inc,pagati:a.pagati+r.pagati,aperte:a.aperte+r.aperte,tot:a.tot+r.tot}),{n:0,arr:0,inc:0,pagati:0,aperte:0,tot:0});
                return (<>
                  {/* RIEPILOGO PER CATEGORIA */}
                  <div style={{background:"var(--color-surface)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"12px 14px",marginBottom:12,boxShadow:"var(--shadow-card)"}}>
                    <p style={{margin:"0 0 8px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6}}><i className="ti ti-clipboard-check" style={{color:S.slateD}}/>Riepilogo dati caricati</p>
                    <div style={{overflowX:"auto"}}>
                      <table style={{borderCollapse:"collapse",width:"100%",fontSize:11.5,minWidth:520}}>
                        <thead><tr style={{color:"var(--color-text-secondary)",textAlign:"right"}}>
                          <th style={{textAlign:"left",padding:"4px 6px"}}>Categoria</th><th style={{padding:"4px 6px"}}>Clienti</th><th style={{padding:"4px 6px"}}>Proforme aperte</th><th style={{padding:"4px 6px"}}>Pagati</th><th style={{padding:"4px 6px"}}>Arretrati</th><th style={{padding:"4px 6px"}}>Da incassare</th><th style={{padding:"4px 6px"}}>TOTALE</th>
                        </tr></thead>
                        <tbody>
                          {riepilogo.map(r=>(
                            <tr key={r.k} style={{borderTop:"0.5px solid var(--color-border-tertiary)",textAlign:"right"}}>
                              <td style={{textAlign:"left",padding:"5px 6px",fontWeight:500}}>{r.l}</td>
                              <td style={{padding:"5px 6px"}}>{r.n}</td>
                              <td style={{padding:"5px 6px"}}>{r.aperte}</td>
                              <td style={{padding:"5px 6px",color:S.good}}>{r.pagati}</td>
                              <td style={{padding:"5px 6px"}}>{r.arr?fmt(r.arr):"—"}</td>
                              <td style={{padding:"5px 6px",color:S.warn}}>{r.inc?fmt(r.inc):"—"}</td>
                              <td style={{padding:"5px 6px",fontWeight:600,color:S.slateD}}>{fmt(r.tot)}</td>
                            </tr>
                          ))}
                          <tr style={{borderTop:`2px solid ${S.slateD}`,textAlign:"right",fontWeight:700}}>
                            <td style={{textAlign:"left",padding:"6px",color:S.slateD}}>TOTALE</td>
                            <td style={{padding:"6px"}}>{RT.n}</td><td style={{padding:"6px"}}>{RT.aperte}</td><td style={{padding:"6px",color:S.good}}>{RT.pagati}</td>
                            <td style={{padding:"6px"}}>{fmt(RT.arr)}</td><td style={{padding:"6px",color:S.warn}}>{fmt(RT.inc)}</td><td style={{padding:"6px",color:S.slateD}}>{fmt(RT.tot)}</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
                    {cats.map(([k,l])=>(
                      <button key={k} onClick={()=>setFoglioCat(k)} style={{padding:"5px 12px",borderRadius:20,border:foglioCat===k?`1.5px solid ${S.slateD}`:"0.5px solid var(--color-border-tertiary)",background:foglioCat===k?S.slateD+"15":"transparent",color:foglioCat===k?S.slateD:"var(--color-text-secondary)",fontSize:12,cursor:"pointer",fontWeight:foglioCat===k?600:400}}>{l} ({foglio.clienti.filter(c=>c.categoria===k).length})</button>
                    ))}
                    <span style={{marginLeft:"auto",fontSize:12,color:"var(--color-text-secondary)"}}>Da incassare: <b style={{color:S.warn}}>{fmt(totDue)}</b></span>
                  </div>
                  <div style={{overflowX:"auto",background:"var(--color-surface)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,boxShadow:"var(--shadow-card)"}}>
                    <table style={{borderCollapse:"collapse",width:"100%",fontSize:12,minWidth:600}}>
                      <thead>
                        <tr style={{background:S.slateD,color:"#fff"}}>
                          <th style={{padding:"8px 10px",textAlign:"left",position:"sticky",left:0,background:S.slateD,minWidth:160}}>Cliente</th>
                          <th style={{padding:"8px 8px"}}>Arretr.</th>
                          {periods.map(p=><th key={p} style={{padding:"8px 8px",minWidth:62}}>{PLABEL[p]}</th>)}
                          <th style={{padding:"8px 8px"}}>Residuo</th>
                          <th style={{padding:"8px 6px"}}></th>
                        </tr>
                      </thead>
                      <tbody>
                        {clienti.map((c,ri)=>(
                          <tr key={c.id} style={{borderBottom:"0.5px solid var(--color-border-tertiary)",background:c.stato==="uscito"?C.coralL+"55":(ri%2?"var(--color-background-secondary)":"transparent")}}>
                            <td style={{padding:"6px 10px",position:"sticky",left:0,background:"inherit",fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:180}} title={c.tariffa||""}>{c.nome}{c.stato==="uscito"&&<span style={{fontSize:9,color:C.coral,marginLeft:4}}>uscito</span>}</td>
                            <td style={{padding:"3px 4px"}}><input defaultValue={c.arretrati||""} onBlur={e=>{const v=parseFloat(e.target.value)||0; if(v!==Number(c.arretrati)) saveArretrati(c,v);}} style={{width:58,padding:"4px",borderRadius:5,border:"0.5px solid var(--color-border-tertiary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:11,textAlign:"right"}}/></td>
                            {periods.map(per=>{ const p=pf(c.id,per); const paid=p?.pagato; const imp=Number(p?.importo)||0; return (
                              <td key={per} style={{padding:"3px 4px",textAlign:"center"}}>
                                {paid ? (
                                  <button onClick={()=>saveCell(c,per,{pagato:false})} title="Annulla pagato" style={{width:62,padding:"6px 2px",borderRadius:5,border:"none",cursor:"pointer",background:S.good,color:"#fff",fontSize:9,fontWeight:600,lineHeight:1.2}}>✓ PAGATO{imp>0?<><br/>{fmt(imp)}</>:null}</button>
                                ) : (
                                  <div style={{display:"flex",flexDirection:"column",gap:2,alignItems:"center"}}>
                                    <input defaultValue={imp||""} key={imp+per+c.id} placeholder="—" onBlur={e=>{const v=parseFloat(e.target.value)||0; if(v!==imp) saveCell(c,per,{importo:v});}} style={{width:58,padding:"4px",borderRadius:5,border:"0.5px solid var(--color-border-tertiary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:11,textAlign:"right"}}/>
                                    <button onClick={()=>saveCell(c,per,{pagato:true})} title="Segna pagato" style={{fontSize:8,padding:"1px 6px",borderRadius:4,border:"none",cursor:"pointer",background:"var(--color-background-secondary)",color:"var(--color-text-secondary)"}}>paga</button>
                                  </div>
                                )}
                              </td>
                            );})}
                            <td style={{padding:"6px 8px",textAlign:"right",fontWeight:600,color:cliDue(c)>0?S.warn:S.good}}>{fmt(cliDue(c))}</td>
                            <td style={{padding:"3px 4px",textAlign:"center"}}><button onClick={()=>delCliente(c)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:13,opacity:.5}}><i className="ti ti-trash"/></button></td>
                          </tr>
                        ))}
                        {clienti.length===0 && <tr><td colSpan={periods.length+4} style={{padding:20,textAlign:"center",color:"var(--color-text-secondary)",fontSize:12}}>Nessun cliente in questa categoria. Usa "Importa da Excel" o "+ Cliente".</td></tr>}
                      </tbody>
                      {clienti.length>0 && (
                      <tfoot>
                        <tr style={{background:"var(--color-background-secondary)",borderTop:`2px solid ${S.slateD}`,fontWeight:700}}>
                          <td style={{padding:"8px 10px",position:"sticky",left:0,background:"var(--color-background-secondary)",color:S.slateD}}>TOTALE COLONNA</td>
                          <td style={{padding:"8px 4px",textAlign:"right",color:S.slateD,fontSize:11}}>{fmt(arrTot)}</td>
                          {periods.map(per=><td key={per} style={{padding:"8px 4px",textAlign:"right",color:S.slateD,fontSize:11}}>{fmt(colTot[per])}</td>)}
                          <td style={{padding:"8px 8px",textAlign:"right",color:S.warn,fontSize:12}}>{fmt(totDue)}</td>
                          <td></td>
                        </tr>
                      </tfoot>
                      )}
                    </table>
                  </div>
                  <p style={{margin:"8px 0 0",fontSize:10,color:"var(--color-text-secondary)"}}>Scrivi l'importo nelle celle (salva all'uscita dal campo) · clicca "paga/PAGATO" per segnare l'incasso · dati salvati nel cloud Supabase.</p>
                </>);
              })()}
            </div>
          )}

          {/* ══ INCASSI (estratto conto + contanti) ══ */}
          {tab==="incassi" && (
            <div>
              <div style={{background:"var(--color-surface)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:14,padding:"16px 18px",marginBottom:12,boxShadow:"var(--shadow-card)"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <i className="ti ti-cash" style={{fontSize:18,color:S.good}}/><h3 style={{margin:0,fontSize:14,fontWeight:600}}>Incassi · estratto conto e contanti</h3>
                </div>
                <p style={{margin:"0 0 10px",fontSize:12,color:"var(--color-text-secondary)"}}>Carica la Lista Movimenti BPER (.xls): i bonifici in entrata vengono abbinati ai clienti e, alla conferma, la proforma giusta viene segnata PAGATA (importo uguale → quella; altrimenti la più vecchia aperta). I duplicati vengono saltati.</p>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  <label style={{padding:"9px 16px",background:incBusy?C.grayL:S.slateD,color:"#fff",borderRadius:8,fontSize:12,fontWeight:600,cursor:incBusy?"wait":"pointer",display:"inline-flex",alignItems:"center",gap:6}}>
                    <i className={`ti ${incBusy?"ti-loader-2 ti-spin":"ti-upload"}`}/>{incBusy?"Elaboro...":"Carica estratto conto (.xls)"}
                    <input type="file" accept=".xls,.xlsx" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0]; if(f) caricaEstratto(f); e.target.value="";}}/>
                  </label>
                  <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>Solo movimenti dal:</span>
                  <input type="date" value={incDaData} onChange={e=>setIncDaData(e.target.value)} title="Ignora i movimenti precedenti a questa data (es. già registrati nell'Excel)" style={{padding:"7px 10px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:12}}/>
                  {incDaData && <button onClick={()=>setIncDaData("")} style={{background:"none",border:"none",color:"var(--color-text-secondary)",cursor:"pointer",fontSize:12}} title="Rimuovi filtro data"><i className="ti ti-x"/></button>}
                  {incMovs.length>0 && (
                    <button onClick={()=>{ if(confirm("Svuotare la lista movimenti? (i pagamenti già confermati restano registrati nel cloud)")) setIncMovs([]); }} title="Pulisce solo la lista a video: i pagamenti confermati restano nel Registro incassi" style={{padding:"7px 12px",background:"var(--color-background-secondary)",color:"var(--color-text-secondary)",border:"1px solid var(--color-border-tertiary)",borderRadius:8,fontSize:12,cursor:"pointer"}}>🧹 Svuota lista</button>
                  )}
                  {incMovs.some(m=>!m.dup&&!m.state&&m.cliente) && (
                    <button onClick={confermaTuttiSicuri} disabled={incBusy} style={{padding:"9px 16px",background:S.good,color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                      <i className="ti ti-checks"/>Conferma tutti gli abbinati ({incMovs.filter(m=>!m.dup&&!m.state&&m.cliente).length})
                    </button>
                  )}
                </div>
                {/* Contanti */}
                {(()=>{
                  const cashCliObj = foglio.clienti.find(c=>c.nome===cashCliName.trim());
                  const cashOpen = cashCliObj ? foglio.proforme.filter(p=>p.cliente_id===cashCliObj.id && !p.pagato && Number(p.importo)>0)
                    .sort((a,b)=>String(PERIOD_DEADLINE[a.periodo]||"9999").localeCompare(String(PERIOD_DEADLINE[b.periodo]||"9999"))) : [];
                  const cashPaid = (soloRecord && cashCliObj) ? foglio.proforme.filter(p=>p.cliente_id===cashCliObj.id && p.pagato) : [];
                  return (
                  <div style={{marginTop:12,paddingTop:12,borderTop:"0.5px solid var(--color-border-tertiary)"}}>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}><i className="ti ti-coin" style={{color:S.good}}/>Incasso manuale:</span>
                      <select value={cashTipo} onChange={e=>setCashTipo(e.target.value)} title="Tipologia di pagamento" style={{padding:"7px 9px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:12}}>
                        <option value="contanti">💶 Contanti</option>
                        <option value="pos">💳 POS</option>
                        <option value="assegno">🧾 Assegno</option>
                        <option value="sconto">🏷️ Sconto</option>
                        <option value="altro">Altro</option>
                      </select>
                      <div style={{position:"relative"}}>
                        <i className="ti ti-search" style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"var(--color-text-secondary)"}}/>
                        <input list="cash-cli-list" value={cashCliName} onChange={e=>{setCashCliName(e.target.value); setCashPf("auto");}} placeholder="Cerca azienda..." style={{width:250,padding:"7px 10px 7px 28px",borderRadius:8,border:`1px solid ${cashCliObj?S.good:"var(--color-border-secondary)"}`,background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:12}}/>
                        <datalist id="cash-cli-list">
                          {[...foglio.clienti].sort((a,b)=>a.nome.localeCompare(b.nome)).map(c=><option key={c.id} value={c.nome}/>)}
                        </datalist>
                      </div>
                      <input type="number" placeholder="Importo €" value={cashImp} onChange={e=>setCashImp(e.target.value)} style={{width:110,padding:"7px 10px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:12}}/>
                      <input type="date" value={cashData} onChange={e=>setCashData(e.target.value)} style={{padding:"6px 10px",borderRadius:8,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:12}}/>
                      <input value={cashNota} onChange={e=>setCashNota(e.target.value)} placeholder="📝 Promemoria (es. rinnovo CNS, Fatture in Cloud...)" title="Nota libera salvata col pagamento e visibile nel Registro incassi" style={{width:250,padding:"7px 10px",borderRadius:8,border:`1px solid ${cashNota?S.warnD+"66":"var(--color-border-secondary)"}`,background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:12}}/>
                      <button onClick={()=>{ const v=parseFloat(cashImp); if(!(v>0)){ setIncMsg("⚠ Inserisci un importo prima di aggiungere la riga."); return; } setCashRows(r=>[...r,{tipo:cashTipo,importo:v}]); setCashImp(""); }} disabled={!cashCliObj} title="Aggiungi questa riga e inseriscine un'altra (es. contanti + sconto insieme)" style={{padding:"7px 10px",background:"var(--color-surface)",color:C.purple,border:`1px solid ${C.purple}44`,borderRadius:8,fontSize:12,fontWeight:600,cursor:cashCliObj?"pointer":"not-allowed"}}>＋ riga</button>
                      <button onClick={registraContanti} disabled={incBusy||!cashCliObj} style={{padding:"7px 14px",background:cashCliObj?S.good+"18":"var(--color-background-secondary)",color:cashCliObj?S.good:"var(--color-text-secondary)",border:`1px solid ${cashCliObj?S.good+"44":"var(--color-border-tertiary)"}`,borderRadius:8,fontSize:12,fontWeight:600,cursor:cashCliObj?"pointer":"not-allowed"}}>Registra{cashRows.length?` ${cashRows.length+(parseFloat(cashImp)>0?1:0)} righe`:""}</button>
                      {cashCliObj && <button onClick={()=>openClientPdfs(cashCliObj.nome)} title="Apri le proforma PDF del cliente da Yandex" style={{padding:"7px 12px",background:C.purpleL,color:C.purple,border:`1px solid ${C.purple}33`,borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><i className="ti ti-file-search"/> Proforme PDF</button>}
                    </div>
                    {cashRows.length>0 && (
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginTop:8}}>
                        <span style={{fontSize:11,fontWeight:600,color:"var(--color-text-secondary)"}}>Righe in coda:</span>
                        {cashRows.map((r,i)=>(
                          <span key={i} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 8px",borderRadius:7,background:C.purpleL,color:C.purple,fontSize:11,fontWeight:600}}>
                            {({contanti:"💶",pos:"💳",assegno:"🧾",sconto:"🏷️",altro:"•"})[r.tipo]||"•"} {TIPI_CASH[r.tipo]||r.tipo} {fmt(r.importo)}
                            <button onClick={()=>setCashRows(rows=>rows.filter((_,j)=>j!==i))} title="Rimuovi riga" style={{background:"none",border:"none",color:C.purple,cursor:"pointer",fontSize:12,padding:0,lineHeight:1}}>✕</button>
                          </span>
                        ))}
                        <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>+ riga corrente {parseFloat(cashImp)>0?fmt(parseFloat(cashImp)):"(vuota)"} — totale {fmt(cashRows.reduce((s,r)=>s+r.importo,0)+(parseFloat(cashImp)>0?parseFloat(cashImp):0))}</span>
                      </div>
                    )}
                    {cashCliObj && (
                      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginTop:8}}>
                        <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>Applica a:</span>
                        <select value={cashPf} onChange={e=>setCashPf(e.target.value)} style={{padding:"6px 9px",borderRadius:7,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:11}}>
                          <option value="auto">{soloRecord?"Nessuna (solo registro)":"Automatico (importo uguale, altrimenti la più vecchia)"}</option>
                          {cashOpen.map(p=><option key={p.id} value={p.id}>{(PLABEL[p.periodo]||p.periodo)} — {fmt(p.importo)}</option>)}
                          {cashPaid.map(p=><option key={p.id} value={p.id}>✓ PAGATA {(PLABEL[p.periodo]||p.periodo)} — {fmt(p.importo)} (solo riferimento)</option>)}
                        </select>
                        <label title="Registra il pagamento solo a registro incassi, SENZA toccare le proforme: usalo quando la notula risulta già in pagato (il dovuto è già corretto)" style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,fontWeight:600,color:soloRecord?S.warnD:"var(--color-text-secondary)",cursor:"pointer",padding:"5px 8px",borderRadius:7,border:`1px solid ${soloRecord?S.warnD:"var(--color-border-tertiary)"}`,background:soloRecord?S.warnD+"14":"transparent"}}>
                          <input type="checkbox" checked={soloRecord} onChange={e=>{setSoloRecord(e.target.checked); setCashPf("auto");}} style={{margin:0}}/>
                          📝 Solo per record (non tocca il dovuto)
                        </label>
                        {soloRecord ? (
                          <span style={{fontSize:11,color:S.warnD,fontWeight:600}}>→ registrato solo a registro incassi · dovuto invariato (notula già in pagato)</span>
                        ) : (()=>{ const imp=parseFloat(cashImp); const pf=cashPf!=="auto"?cashOpen.find(p=>p.id===cashPf):cashOpen[0];
                          const parziale = pf && imp>0 && imp < Number(pf.importo)-0.01;
                          return (<>
                            {parziale && (
                              <select value={cashMode} onChange={e=>setCashMode(e.target.value)} title="Cosa fare se il pagamento è inferiore alla proforma" style={{padding:"6px 9px",borderRadius:7,border:`1px solid ${cashMode==="riduzione"?S.warnD:"var(--color-border-secondary)"}`,background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:11}}>
                                <option value="acconto">Acconto — il residuo resta dovuto</option>
                                <option value="riduzione">Riduzione debito — salda con importo ridotto</option>
                              </select>
                            )}
                            {parziale && cashMode==="acconto" && <span style={{fontSize:11,color:S.warn,fontWeight:600}}>→ {cashTipo==="sconto"?"sconto":"acconto"}: residuo {fmt(Number(pf.importo)-imp)}</span>}
                            {parziale && cashMode==="riduzione" && <span style={{fontSize:11,color:S.warnD,fontWeight:600}}>→ SALDATA: debito ridotto da {fmt(Number(pf.importo))} a {fmt(imp)}</span>}
                            {pf && imp>=Number(pf.importo)-0.01 && imp>0 && !cashRows.length && <span style={{fontSize:11,color:S.good,fontWeight:600}}>→ salda la proforma</span>}
                            {cashRows.length>0 && <span style={{fontSize:11,color:C.purple,fontWeight:600}}>→ le righe verranno applicate in sequenza (FIFO)</span>}
                          </>);
                        })()}
                        <span style={{fontSize:10,color:"var(--color-text-secondary)"}}>{cashOpen.length} proforme aperte</span>
                      </div>
                    )}
                    {cashCliObj && (()=>{ const tgt = cashPf!=="auto" ? [...cashOpen,...cashPaid].find(p=>p.id===cashPf) : cashOpen[0];
                      if(!tgt || !tgt.note) return null;
                      return (
                        <div style={{marginTop:6,padding:"6px 10px",borderRadius:7,background:S.warn+"10",border:`1px solid ${S.warn}33`,fontSize:11,color:"var(--color-text-primary)",maxWidth:700}}>
                          <b>📌 Nota proforma {(PLABEL[tgt.periodo]||tgt.periodo)}:</b> <span style={{fontStyle:"italic"}}>{tgt.note}</span>
                        </div>
                      );
                    })()}
                  </div>
                  );
                })()}
              </div>
              {incMsg && <p style={{margin:"0 0 10px",fontSize:12,fontWeight:500,color:incMsg.startsWith("Errore")||incMsg.startsWith("⚠")?C.red:incMsg.startsWith("✓")?S.good:S.slateD,background:"var(--color-background-secondary)",padding:"8px 12px",borderRadius:8}}>{incMsg}</p>}

              {/* Movimenti caricati */}
              {incMovs.length>0 && (
                <div style={{background:"var(--color-surface)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,overflow:"hidden",boxShadow:"var(--shadow-card)",marginBottom:12}}>
                  {incMovs.map((m,i)=>{
                    const done=m.state==="done"||m.dup||m.state==="skip";
                    return (
                    <div key={m.key+i} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderBottom:"0.5px solid var(--color-border-tertiary)",opacity:done?.55:1}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:(m.dup||m.state==="skip")?C.gray:m.state==="done"?S.good:m.cliente?S.good:S.warn,flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{margin:0,fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.nome}</p>
                        <p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)"}}>{m.data||"—"}{m.dup?" · già registrato":m.escl?" · escluso (non CED)":m.state==="done"?` · ✓ registrato${m.pfInfo?" · "+m.pfInfo:""}`:m.cliente?` · → ${m.cliente.nome}`:" · nessun abbinamento"}</p>
                      </div>
                      <span style={{fontSize:13,fontWeight:600,color:S.good}}>{fmt(m.importo)}</span>
                      {m.cliente && <button onClick={()=>openClientPdfs(m.cliente.nome)} title="Apri le proforma PDF del cliente" style={{padding:"4px 7px",background:C.purpleL,color:C.purple,border:`1px solid ${C.purple}33`,borderRadius:6,fontSize:11,cursor:"pointer"}}>📄</button>}
                      {!done && m.cliente && <button onClick={()=>confermaMov(m,m.cliente,false)} disabled={incBusy} style={{padding:"4px 10px",background:S.good,color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>Conferma</button>}
                      {!done && m.cliente && <button onClick={()=>{ const nota=prompt(`Promemoria per questo incasso di ${m.cliente.nome} (${fmt(m.importo)}):\nes. \"rinnovo CNS\", \"Fatture in Cloud 2026\", \"notula già in pagato\".\nVerrà registrato SOLO A REGISTRO, senza toccare il dovuto.`); if(nota===null) return; confermaMov({...m,soloRecord:true,nota},m.cliente,false); }} disabled={incBusy} title="Registra SOLO a registro con promemoria (non tocca le proforme): per rinnovi CNS, Fatture in Cloud, o notule già in pagato" style={{padding:"4px 8px",background:S.warnD+"14",color:S.warnD,border:`1px solid ${S.warnD}44`,borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>📝</button>}
                      {!done && m.cliente && <button onClick={()=>{ setIncMovs(prev=>prev.map(x=>x.key===m.key?{...x,cliente:null}:x)); setIncLink(v=>({...v,[m.key]:""})); }} disabled={incBusy} title="Abbinamento sbagliato? Scollega e scegli il cliente giusto (es. omonimi come i due Zanetti)" style={{padding:"4px 8px",background:"var(--color-background-secondary)",color:S.warnD,border:`1px solid ${S.warnD}44`,borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>🔁</button>}
                      {!done && !m.cliente && (<>
                        <input list="cash-cli-list" value={incLink[m.key]||""} onChange={e=>setIncLink(v=>({...v,[m.key]:e.target.value}))} placeholder="Cerca cliente..." style={{padding:"5px 8px",borderRadius:6,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:11,width:170}}/>
                        <button onClick={()=>{ const c=foglio.clienti.find(x=>x.nome===(incLink[m.key]||"").trim()); if(!c){ setIncMsg("⚠ Scrivi il nome e selezionalo dall'elenco, poi premi 🔗 Collega."); return; } collegaMov(m,c); }} disabled={incBusy} title="Collega questo nome banca al cliente (memorizzato per i prossimi estratti) SENZA registrare il pagamento" style={{padding:"4px 9px",background:C.purpleL,color:C.purple,border:`1px solid ${C.purple}44`,borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>🔗 Collega</button>
                      </>)}
                    </div>
                    );
                  })}
                </div>
              )}

              {/* Registro incassi dal cloud (con modifica/eliminazione) */}
              {(foglio.pagamenti||[]).length>0 && (
                <div style={{background:"var(--color-surface)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"12px 14px",boxShadow:"var(--shadow-card)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <p style={{margin:0,fontSize:13,fontWeight:600}}>Registro incassi ({foglio.pagamenti.length})</p>
                    <span style={{fontSize:12,fontWeight:600,color:S.good}}>{fmt(foglio.pagamenti.filter(p=>p.fonte!=="sconto").reduce((s,p)=>s+(Number(p.importo)||0),0))}{(()=>{const sc=foglio.pagamenti.filter(p=>p.fonte==="sconto").reduce((s,p)=>s+(Number(p.importo)||0),0); return sc>0?<span style={{color:S.warnD,fontWeight:500}}> · sconti {fmt(sc)}</span>:null;})()}</span>
                  </div>
                  {foglio.pagamenti.slice(0,50).map(p=>{ const c=foglio.clienti.find(x=>x.id===p.cliente_id); const inEdit=editPag?.id===p.id; return (
                    <div key={p.id} style={{borderTop:"0.5px solid var(--color-border-tertiary)"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0"}}>
                        <i className={`ti ${({contanti:"ti-coin",pos:"ti-credit-card",assegno:"ti-file-text",estratto:"ti-building-bank",sconto:"ti-discount"})[p.fonte]||"ti-cash"}`} style={{fontSize:13,color:S.good}} title={p.fonte}/>
                        <span style={{flex:1,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c?.nome||"—"} <span style={{fontSize:10,color:"var(--color-text-secondary)"}}>· {p.fonte} · {p.data?fmtD(p.data):"—"}</span>{(p.descrizione||"").includes("📝")&&<span style={{fontSize:10,color:S.warnD,fontStyle:"italic"}} title={p.descrizione}> · {p.descrizione.slice(p.descrizione.indexOf("📝"),p.descrizione.indexOf("📝")+60)}</span>}{(p.descrizione||"").includes("solo per record")&&<span style={{fontSize:9,padding:"0 5px",borderRadius:5,background:S.warnD+"18",color:S.warnD,fontWeight:600,marginLeft:4}}>RECORD</span>}</span>
                        <b style={{fontSize:12,color:S.good}}>{fmt(p.importo)}</b>
                        {c && <button onClick={()=>openClientPdfs(c.nome)} title="Proforme PDF del cliente" style={{background:C.purpleL,border:`1px solid ${C.purple}33`,borderRadius:6,padding:"2px 7px",color:C.purple,cursor:"pointer",fontSize:12}}>📄</button>}
                        <button onClick={()=>setEditPag(inEdit?null:{id:p.id,data:p.data||"",importo:p.importo,fonte:p.fonte,descrizione:p.descrizione||""})} title="Modifica pagamento" style={{background:"var(--color-background-secondary)",border:"0.5px solid var(--color-border-secondary)",borderRadius:6,padding:"2px 7px",color:S.slateD,cursor:"pointer",fontSize:12}}>✏️</button>
                        <button onClick={()=>eliminaPag(p)} title="Elimina pagamento" style={{background:C.redL,border:`1px solid ${C.red}33`,borderRadius:6,padding:"2px 7px",color:C.red,cursor:"pointer",fontSize:12}}>🗑</button>
                      </div>
                      {inEdit && (
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",padding:"4px 0 10px 20px"}}>
                          <input type="date" value={editPag.data} onChange={e=>setEditPag(s=>({...s,data:e.target.value}))} style={{padding:"5px 8px",borderRadius:7,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:11}}/>
                          <input type="number" value={editPag.importo} onChange={e=>setEditPag(s=>({...s,importo:e.target.value}))} style={{width:90,padding:"5px 8px",borderRadius:7,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:11,textAlign:"right"}}/>
                          <select value={editPag.fonte} onChange={e=>setEditPag(s=>({...s,fonte:e.target.value}))} style={{padding:"5px 8px",borderRadius:7,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:11}}>
                            <option value="contanti">Contanti</option><option value="pos">POS</option><option value="assegno">Assegno</option><option value="estratto">Bonifico</option><option value="sconto">Sconto</option><option value="altro">Altro</option>
                          </select>
                          <input value={editPag.descrizione} onChange={e=>setEditPag(s=>({...s,descrizione:e.target.value}))} placeholder="Descrizione" style={{flex:1,minWidth:120,padding:"5px 8px",borderRadius:7,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:11}}/>
                          <button onClick={salvaEditPag} style={{padding:"5px 12px",background:S.good,color:"#fff",border:"none",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer"}}>Salva</button>
                          <button onClick={()=>setEditPag(null)} style={{padding:"5px 10px",background:"transparent",border:"0.5px solid var(--color-border-tertiary)",borderRadius:7,fontSize:11,cursor:"pointer",color:"var(--color-text-secondary)"}}>Annulla</button>
                        </div>
                      )}
                    </div>
                  );})}
                </div>
              )}

              {/* Riepilogo mensile per tipologia (contanti/bonifici/POS/...) */}
              {(foglio.pagamenti||[]).length>0 && (()=>{
                const FONTI={estratto:["🏦","Bonifici"],contanti:["💶","Contanti"],pos:["💳","POS"],assegno:["🧾","Assegni"],sconto:["🏷️","Sconti"],altro:["•","Altro"]};
                const fk=f=>FONTI[f]?f:"altro";
                const MESI_IT=["","Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
                const byM={};
                (foglio.pagamenti||[]).forEach(p=>{ const m=(p.data||"").slice(0,7)||"—"; byM[m]=byM[m]||{n:0}; const f=fk(p.fonte); byM[m][f]=(byM[m][f]||0)+(Number(p.importo)||0); byM[m].n++; });
                const mesi=Object.keys(byM).sort().reverse();
                return (
                <div style={{background:"var(--color-surface)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"12px 14px",boxShadow:"var(--shadow-card)",marginTop:12}}>
                  <p style={{margin:"0 0 8px",fontSize:13,fontWeight:600}}>Riepilogo mensile per tipologia</p>
                  {mesi.map(m=>{ const d=byM[m]; const[y,mm]=m.split("-");
                    const tot=Object.keys(FONTI).filter(f=>f!=="sconto").reduce((s,f)=>s+(d[f]||0),0);
                    return (
                    <div key={m} style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",padding:"7px 0",borderTop:"0.5px solid var(--color-border-tertiary)"}}>
                      <span style={{minWidth:110,fontSize:12,fontWeight:700}}>{(MESI_IT[Number(mm)]||m)+" "+(y||"")}</span>
                      {Object.keys(FONTI).filter(f=>d[f]).map(f=>(
                        <span key={f} style={{fontSize:11,padding:"3px 9px",borderRadius:14,background:f==="sconto"?S.warnD+"14":"var(--color-background-secondary)",color:f==="sconto"?S.warnD:"var(--color-text-primary)",fontWeight:600}}>{FONTI[f][0]} {FONTI[f][1]} {fmt(d[f])}</span>
                      ))}
                      <span style={{marginLeft:"auto",fontSize:12,fontWeight:700,color:S.good}}>{fmt(tot)}</span>
                    </div>
                    );
                  })}
                  <p style={{margin:"8px 0 0",fontSize:10,color:"var(--color-text-secondary)"}}>Dettaglio completo e export Excel nella scheda <b>Pagamenti</b>. Gli sconti non entrano nel totale.</p>
                </div>
                );
              })()}
            </div>
          )}

          {/* ══ RICONCILIAZIONE ══ */}
          {tab==="riconcilia" && (
            <div>
              <div style={{background:"var(--color-surface)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:14,padding:"16px 18px",marginBottom:12,boxShadow:"var(--shadow-card)"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <i className="ti ti-arrows-diff" style={{fontSize:18,color:S.slateD}}/><h3 style={{margin:0,fontSize:14,fontWeight:600}}>Riconciliazione Yandex ↔ Excel</h3>
                </div>
                <p style={{margin:"0 0 10px",fontSize:12,color:"var(--color-text-secondary)"}}>Legge le proforma 2026 da Yandex (con AI Haiku) ed estrae cliente · data · periodo · importo, poi le incrocia con l'Excel per trovare gli scostamenti. Costo stimato ~€0,003 per documento.</p>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  <datalist id="reco-cli-list">{[...foglio.clienti].sort((a,b)=>a.nome.localeCompare(b.nome)).map(c=><option key={c.id} value={c.nome}/>)}</datalist>
                  <input list="reco-cli-list" value={recoSolo} onChange={e=>setRecoSolo(e.target.value)} placeholder="Solo un cliente (vuoto = tutti)..." title="Scrivi il nome (o parte del nome) per riconciliare SOLO quel cliente: veloce ed economico. Le altre righe della lista restano." style={{width:230,padding:"8px 10px",borderRadius:8,border:`1px solid ${recoSolo?S.slateD:"var(--color-border-secondary)"}`,background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:12}}/>
                  {recoSolo && <button onClick={()=>setRecoSolo("")} title="Togli il filtro (riconcilia tutti)" style={{background:"none",border:"none",color:"var(--color-text-secondary)",cursor:"pointer",fontSize:13}}>✕</button>}
                  <button onClick={runReconciliation} disabled={recoStatus==="running"||!ydToken} style={{padding:"9px 18px",background:recoStatus==="running"?C.grayL:S.slateD,color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:recoStatus==="running"||!ydToken?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:6}}>
                    <i className={`ti ${recoStatus==="running"?"ti-loader-2 ti-spin":"ti-scan"}`}/>{recoStatus==="running"?"Lettura in corso...":"Avvia riconciliazione"}
                  </button>
                  {recoStatus==="running" && <button onClick={()=>{recoRef.current.stop=true; setRecoStatus("idle");}} style={{padding:"9px 14px",background:C.redL,color:C.red,border:`1px solid ${C.red}33`,borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:500}}>Stop</button>}
                  {recoStatus==="running" && recoProg.total>0 && <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>{recoProg.done}/{recoProg.total}</span>}
                  {!LS.raw("ced_whitelist") && <span style={{fontSize:11,color:C.red}}>⚠ Importa prima l'Excel (tab Sync Auto)</span>}
                </div>
              </div>

              {recoRows.length>0 && (()=>{
                const fuori=recoRows.filter(r=>!r.inExcel);
                const miss=fuori.filter(r=>!r.state);
                const missTot=miss.reduce((s,r)=>s+(r.totale||0),0);
                const nPagate=recoRows.filter(r=>r.state==="paid").length;
                const view = recoFilter==="mancanti" ? fuori : recoRows;
                return (<>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:12}}>
                    <div style={{background:"var(--color-surface)",border:"1px solid var(--color-border-tertiary)",borderRadius:12,padding:"10px 12px",boxShadow:"var(--shadow-card)"}}><p style={{margin:"0 0 2px",fontSize:10,color:"var(--color-text-secondary)",fontWeight:600}}>PROFORMA LETTE</p><p style={{margin:0,fontSize:19,fontWeight:700}}>{recoRows.length}</p></div>
                    <div style={{background:"var(--color-surface)",border:`1px solid ${S.warn}55`,borderRadius:12,padding:"10px 12px",boxShadow:"var(--shadow-card)"}}><p style={{margin:"0 0 2px",fontSize:10,color:S.warn,fontWeight:600}}>FUORI EXCEL</p><p style={{margin:0,fontSize:19,fontWeight:700,color:S.warn}}>{miss.length}</p></div>
                    <div style={{background:"var(--color-surface)",border:`1px solid ${S.warn}55`,borderRadius:12,padding:"10px 12px",boxShadow:"var(--shadow-card)"}}><p style={{margin:"0 0 2px",fontSize:10,color:S.warn,fontWeight:600}}>IMPORTO FUORI EXCEL</p><p style={{margin:0,fontSize:17,fontWeight:700,color:S.warn}}>{fmt(missTot)}</p></div>
                  </div>
                  <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
                    {[["mancanti",`Solo fuori Excel (${miss.length})`],["tutti",`Tutte (${recoRows.length})`]].map(([k,l])=>(
                      <button key={k} onClick={()=>setRecoFilter(k)} style={{padding:"5px 12px",borderRadius:20,border:recoFilter===k?`1.5px solid ${S.slateD}`:"0.5px solid var(--color-border-tertiary)",background:recoFilter===k?S.slateD+"15":"transparent",color:recoFilter===k?S.slateD:"var(--color-text-secondary)",fontSize:12,cursor:"pointer",fontWeight:recoFilter===k?600:400}}>{l}</button>
                    ))}
                    {miss.length>0 && <button onClick={addAllRecoToFoglio} title="Aggiungi tutte le nuove al Foglio" style={{marginLeft:"auto",padding:"5px 12px",borderRadius:8,border:"none",background:S.slateD,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><i className="ti ti-database-plus"/>Aggiungi tutte al Foglio</button>}
                    {recoRows.length>0 && <button onClick={syncAllRecoToFoglio} title="Crea le proforma mancanti (es. III trimestre) e aggiorna importi/stato pagato dalle notule, per TUTTE le righe lette (anche quelle già in Excel)" style={{marginLeft:miss.length>0?0:"auto",padding:"5px 12px",borderRadius:8,border:`1px solid ${S.slateD}`,background:"transparent",color:S.slateD,fontSize:12,fontWeight:600,cursor:"pointer"}}>⟳ Sincronizza Foglio ({recoRows.filter(r=>(r.totale||0)>0&&r.state!=="excluded"&&!r.parseFail).length})</button>}
                  </div>
                  {recoAddMsg && <p style={{margin:"0 0 10px",fontSize:12,fontWeight:500,color:recoAddMsg.startsWith("Errore")||recoAddMsg.startsWith("⚠")?C.red:recoAddMsg.startsWith("✓")?S.good:S.slateD,background:"var(--color-background-secondary)",padding:"8px 12px",borderRadius:8}}>{recoAddMsg}</p>}
                  <div style={{background:"var(--color-surface)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,overflow:"hidden",boxShadow:"var(--shadow-card)"}}>
                    {view.map((r,i)=>{
                      const dimmed = r.state==="excluded"||r.state==="paid"||r.state==="added";
                      const dot = r.state==="paid"?S.good : r.state==="added"?S.slateD : r.state==="excluded"?C.gray : (r.inExcel?S.good:S.warn);
                      return (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderBottom:"0.5px solid var(--color-border-tertiary)",opacity:dimmed?.55:1}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:dot,flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <p style={{margin:0,fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:dimmed?"line-through":"none"}}>{r.cliente}</p>
                          <p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)"}}>{r.periodo} · {r.data||"—"} {r.paid?"· (in PAGATO)":""} {r.parseFail?"· ⚠ lettura incerta":""}{r.state==="paid"?" · ✓ segnata pagata":r.state==="excluded"?" · esclusa":r.state==="added"?" · ✓ aggiunta al Foglio":""}</p>
                        </div>
                        <span style={{fontSize:13,fontWeight:600,color:r.inExcel?"var(--color-text-primary)":S.warn,marginRight:4}}>{fmt(r.totale)}</span>
                        {r.state ? (
                          <button onClick={()=>setRecoRowState(r, r.state)} title="Annulla" style={{padding:"4px 8px",background:"transparent",border:"0.5px solid var(--color-border-tertiary)",borderRadius:6,fontSize:10,cursor:"pointer",color:"var(--color-text-secondary)"}}>Annulla</button>
                        ) : (<>
                          <button onClick={()=>addRecoToFoglio(r)} title="Aggiungi al Foglio (Supabase)" style={{padding:"4px 8px",background:S.slateD,border:"none",borderRadius:6,fontSize:10,cursor:"pointer",color:"#fff",fontWeight:600,display:"flex",alignItems:"center",gap:3}}><i className="ti ti-plus"/>Foglio</button>
                          <button onClick={()=>setRecoRowState(r,"paid")} title="Segna pagata" style={{padding:"4px 7px",background:S.good+"18",border:`1px solid ${S.good}44`,borderRadius:6,fontSize:11,cursor:"pointer",color:S.good,display:"flex",alignItems:"center",gap:3}}><i className="ti ti-check"/></button>
                          <button onClick={()=>setRecoRowState(r,"excluded")} title="Escludi dal conteggio" style={{padding:"4px 7px",background:"transparent",border:"1px solid var(--color-border-tertiary)",borderRadius:6,fontSize:11,cursor:"pointer",color:"var(--color-text-secondary)",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-eye-off"/></button>
                        </>)}
                      </div>
                      );
                    })}
                    {view.length===0 && <p style={{textAlign:"center",fontSize:12,color:"var(--color-text-secondary)",padding:18}}>Nessuna proforma in questa vista.</p>}
                  </div>
                </>);
              })()}
            </div>
          )}

          {/* ══ PAGAMENTI ══ */}
          {tab==="pagamenti" && (()=>{
            const FONTI={estratto:["🏦","Bonifici"],contanti:["💶","Contanti"],pos:["💳","POS"],assegno:["🧾","Assegni"],sconto:["🏷️","Sconti"],altro:["•","Altro"]};
            const fk=f=>FONTI[f]?f:"altro";
            const q=search.trim().toLowerCase();
            const pags=(foglio.pagamenti||[]).map(p=>({...p,cliNome:(foglio.clienti.find(c=>c.id===p.cliente_id)||{}).nome||"—"}))
              .filter(p=>!q||p.cliNome.toLowerCase().includes(q)||(p.descrizione||"").toLowerCase().includes(q));
            const MESI_IT=["","Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
            const byMonth={};
            pags.forEach(p=>{ const m=(p.data||"").slice(0,7)||"—"; (byMonth[m]=byMonth[m]||[]).push(p); });
            const mesi=Object.keys(byMonth).sort().reverse();
            const meseLabel=m=>{ const[y,mm]=m.split("-"); return (MESI_IT[Number(mm)]||m)+" "+y; };
            const esportaExcel=async()=>{
              if(!window.ExcelJS){ alert("Libreria Excel non ancora caricata, riprova tra un secondo."); return; }
              const wb=new ExcelJS.Workbook();
              for(const m of mesi){
                const ws=wb.addWorksheet(meseLabel(m).slice(0,30));
                ws.columns=[{header:"Data",width:12},{header:"Cliente",width:42},{header:"Tipologia",width:12},{header:"Importo €",width:12},{header:"Note / descrizione",width:60}];
                ws.getRow(1).font={bold:true}; ws.getRow(1).fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF334155"}}; ws.getRow(1).font={bold:true,color:{argb:"FFFFFFFF"}};
                let totMese=0;
                for(const f of Object.keys(FONTI)){
                  const rows=byMonth[m].filter(p=>fk(p.fonte)===f).sort((a,b)=>String(a.data).localeCompare(String(b.data)));
                  if(!rows.length) continue;
                  let tot=0;
                  rows.forEach(p=>{ ws.addRow([p.data?fmtD(p.data):"",p.cliNome,FONTI[f][1],Number(p.importo)||0,(p.descrizione||"")]); tot+=Number(p.importo)||0; });
                  const tr=ws.addRow(["","TOTALE "+FONTI[f][1].toUpperCase(),"",tot,""]); tr.font={bold:true};
                  if(f!=="sconto") totMese+=tot;
                }
                const gr=ws.addRow(["","TOTALE INCASSATO "+meseLabel(m).toUpperCase(),"",totMese,"(sconti esclusi)"]); gr.font={bold:true,color:{argb:"FF15803D"}};
                ws.getColumn(4).numFmt='#,##0.00';
              }
              const buf=await wb.xlsx.writeBuffer();
              const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([buf])); a.download=`Registro_incassi_${todayStr()}.xlsx`; a.click();
            };
            return (
            <div>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
                <div style={{position:"relative",flex:1}}>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cerca cliente o descrizione..." style={{width:"100%",padding:"9px 34px 9px 12px",borderRadius:10,border:"1px solid var(--color-border-secondary)",background:"var(--color-surface)",color:"var(--color-text-primary)",fontSize:13,boxSizing:"border-box"}}/>
                  {search && <button onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--color-text-secondary)",cursor:"pointer",fontSize:14}}>✕</button>}
                </div>
                <button onClick={esportaExcel} disabled={!pags.length} style={{padding:"9px 16px",background:S.good,color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>⬇️ Esporta Excel (un foglio per mese)</button>
              </div>
              {!pags.length && <p style={{fontSize:12,color:"var(--color-text-secondary)"}}>Nessun pagamento nel registro cloud. Se hai appena aperto la pagina, vai su Foglio → Ricarica dal cloud.</p>}
              {mesi.map(m=>{
                const rows=byMonth[m];
                const totF={}; rows.forEach(p=>{ const f=fk(p.fonte); totF[f]=(totF[f]||0)+(Number(p.importo)||0); });
                const totMese=Object.entries(totF).filter(([f])=>f!=="sconto").reduce((s,[,v])=>s+v,0);
                return (
                <div key={m} style={{background:"var(--color-surface)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"12px 14px",boxShadow:"var(--shadow-card)",marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6,marginBottom:6}}>
                    <p style={{margin:0,fontSize:14,fontWeight:700}}>{meseLabel(m)}</p>
                    <span style={{fontSize:12,fontWeight:700,color:S.good}}>{fmt(totMese)}{totF.sconto?<span style={{color:S.warnD,fontWeight:500}}> · sconti {fmt(totF.sconto)}</span>:null}</span>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
                    {Object.keys(FONTI).filter(f=>totF[f]).map(f=>(
                      <span key={f} style={{fontSize:11,padding:"3px 9px",borderRadius:14,background:"var(--color-background-secondary)",color:"var(--color-text-primary)",fontWeight:600}}>{FONTI[f][0]} {FONTI[f][1]}: {fmt(totF[f])}</span>
                    ))}
                  </div>
                  {Object.keys(FONTI).map(f=>{
                    const rf=rows.filter(p=>fk(p.fonte)===f).sort((a,b)=>String(b.data).localeCompare(String(a.data)));
                    if(!rf.length) return null;
                    return (
                    <div key={f} style={{marginBottom:6}}>
                      <p style={{margin:"6px 0 2px",fontSize:11,fontWeight:700,color:"var(--color-text-secondary)"}}>{FONTI[f][0]} {FONTI[f][1].toUpperCase()} ({rf.length})</p>
                      {rf.map(p=>(
                        <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0 4px 8px",borderTop:"0.5px solid var(--color-border-tertiary)"}}>
                          <span style={{minWidth:70,fontSize:11,color:"var(--color-text-secondary)"}}>{p.data?fmtD(p.data):"—"}</span>
                          <span style={{flex:1,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.cliNome}
                            {(p.descrizione||"").includes("📝")&&<span style={{fontSize:10,color:S.warnD,fontStyle:"italic"}} title={p.descrizione}> · {p.descrizione.slice(p.descrizione.indexOf("📝"),p.descrizione.indexOf("📝")+50)}</span>}
                            {(p.descrizione||"").includes("solo per record")&&<span style={{fontSize:9,padding:"0 5px",borderRadius:5,background:S.warnD+"18",color:S.warnD,fontWeight:600,marginLeft:4}}>RECORD</span>}
                          </span>
                          <b style={{fontSize:12,color:f==="sconto"?S.warnD:S.good}}>{fmt(p.importo)}</b>
                          <button onClick={()=>openClientPdfs(p.cliNome)} title="Scheda cliente" style={{background:C.purpleL,border:`1px solid ${C.purple}33`,borderRadius:6,padding:"1px 6px",color:C.purple,cursor:"pointer",fontSize:11}}>📄</button>
                        </div>
                      ))}
                    </div>
                    );
                  })}
                </div>
                );
              })}
            </div>
            );
          })()}

          {/* ══ YANDEX ══ */}
          {tab==="yandex" && (
            <div>
              <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
                  <i className="ti ti-cloud" style={{fontSize:18,color:C.blue}}/><h3 style={{margin:0,fontSize:13,fontWeight:500}}>Connessione Yandex Disk</h3>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:6,marginBottom:8}}>
                  <input type="password" value={ydToken} onChange={e=>setYdToken(e.target.value)} placeholder="OAuth token Yandex..." style={{padding:"6px 9px",borderRadius:7,border:"0.5px solid var(--color-border-secondary)",fontSize:12,fontFamily:"monospace"}}/>
                  <button onClick={saveToken} style={{padding:"6px 14px",background:C.blue,color:"white",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:500}}>Connetti</button>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>Cartella sync:</span>
                  <input value={ydSyncPath} onChange={e=>setYdSyncPath(e.target.value)} style={{flex:1,padding:"4px 8px",borderRadius:7,border:"0.5px solid var(--color-border-secondary)",fontSize:12,fontFamily:"monospace"}} placeholder="/Proforma"/>
                  <button onClick={()=>{LS.setRaw("yd_sync_path",ydSyncPath);}} style={{padding:"4px 10px",background:C.tealL,color:C.teal,border:`1px solid ${C.teal}33`,borderRadius:7,fontSize:11,cursor:"pointer"}}>Salva</button>
                </div>
                {ydError && <p style={{margin:"7px 0 0",fontSize:11,color:C.red,background:C.redL,padding:"5px 9px",borderRadius:6}}><i className="ti ti-alert-circle" style={{marginRight:4}}/>{ydError}</p>}
              </div>

              {ydToken && <>
                <div style={{display:"flex",alignItems:"center",gap:3,marginBottom:8,padding:"5px 10px",background:"var(--color-background-secondary)",borderRadius:8,border:"0.5px solid var(--color-border-tertiary)",flexWrap:"wrap"}}>
                  <i className="ti ti-folder" style={{fontSize:12,color:C.blue}}/>
                  {ydCrumb.map((b,i)=>(
                    <span key={i} style={{display:"flex",alignItems:"center",gap:2}}>
                      {i>0 && <span style={{color:"var(--color-text-secondary)",fontSize:11}}>›</span>}
                      <button onClick={()=>{ const p="/"+ydCrumb.slice(1,i+1).join("/"); navTo(p||"/"); }} style={{background:"none",border:"none",color:i===ydCrumb.length-1?C.blue:"var(--color-text-secondary)",fontSize:11,cursor:"pointer",padding:"0 2px",fontWeight:i===ydCrumb.length-1?500:400}}>{b}</button>
                    </span>
                  ))}
                  <button onClick={()=>ydBrowse(ydPath,ydToken)} style={{marginLeft:"auto",background:"none",border:"none",color:C.blue,cursor:"pointer",fontSize:13}}><i className={`ti ti-refresh ${ydLoading?"ti-spin":""}`}/></button>
                </div>

                <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,overflow:"hidden",marginBottom:12}}>
                  {ydLoading && <div style={{padding:18,textAlign:"center",fontSize:12,color:"var(--color-text-secondary)"}}><i className="ti ti-loader-2" style={{marginRight:5}}/>Caricamento...</div>}
                  {!ydLoading && ydItems.length===0 && <div style={{padding:18,textAlign:"center",fontSize:12,color:"var(--color-text-secondary)"}}>Nessun PDF trovato. <button onClick={()=>ydBrowse("/",ydToken)} style={{color:C.blue,background:"none",border:"none",cursor:"pointer",fontSize:12}}>Vai alla radice</button></div>}
                  {!ydLoading && ydItems.map((item,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",padding:"9px 12px",borderBottom:"0.5px solid var(--color-border-tertiary)",gap:9,cursor:item.type==="dir"?"pointer":"default"}}
                      onClick={item.type==="dir"?()=>{navTo(item.path); setYdCrumb(p=>[...p,item.name]);}:undefined}>
                      <div style={{width:30,height:30,borderRadius:7,background:item.type==="dir"?C.blueL:C.purpleL,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <i className={`ti ${item.type==="dir"?"ti-folder":"ti-file-type-pdf"}`} style={{fontSize:14,color:item.type==="dir"?C.blue:C.purple}}/>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{margin:0,fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</p>
                        {item.type==="file" && <p style={{margin:0,fontSize:10,color:"var(--color-text-secondary)"}}>{item.size?(Math.round(item.size/1024)+"KB"):"—"} · {item.modified?fmtD(item.modified.split("T")[0]):"—"}</p>}
                      </div>
                      {item.type==="file" && (
                        <div style={{display:"flex",gap:5}}>
                          <button onClick={e=>{e.stopPropagation();parsePdf(item);}} disabled={pdfLoading} style={{padding:"5px 10px",background:pdfLoading?C.grayL:C.purpleL,color:pdfLoading?C.gray:C.purple,border:`1px solid ${C.purple}33`,borderRadius:7,fontSize:11,cursor:pdfLoading?"wait":"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:4}}>
                            {pdfLoading?<><i className="ti ti-loader-2" style={{fontSize:11}}/>Leggo...</>:<><i className="ti ti-scan" style={{fontSize:11}}/>Leggi AI</>}
                          </button>
                        </div>
                      )}
                      {item.type==="dir" && <i className="ti ti-chevron-right" style={{fontSize:13,color:"var(--color-text-secondary)"}}/>}
                    </div>
                  ))}
                </div>

                {pdfResult && (
                  <div style={{background:"var(--color-background-primary)",border:`1px solid ${C.purple}44`,borderRadius:12,padding:"14px 16px"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                      <span style={{fontSize:13,fontWeight:500,color:C.purple,display:"flex",alignItems:"center",gap:6}}><i className="ti ti-sparkles"/>Estratto: {pdfResult.fileName}</span>
                      <div style={{display:"flex",gap:6}}>
                        {!pdfResult.data.parse_error && <button onClick={importInvoice} style={{padding:"5px 12px",background:C.blue,color:"white",border:"none",borderRadius:7,fontSize:11,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:4}}><i className="ti ti-plus"/>Importa</button>}

                const cf = [];

                for (let k=0;k<6;k++){

                  openInv.forEach(inv=>{
                    if(!inv.due) return; const due=new Date(inv.due);
                    const od=daysOverdue(inv); if(od!=null&&od>730) return;
                    if(due>=dt && due<mEnd && (od==null||od<=0)) v+=inv.amount-inv.paid;
                  });
                  cf.push({ label:`${mLabels[dt.getMonth()]}`, value:v, color:S.slate });
                }
